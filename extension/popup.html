<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="title">FEFL Beat</div>
      <div class="updated" id="updated">—</div>
    </div>

    <!-- Paired user (FEFL Beat system identity) -->
    <div class="pair-card" id="pair-card">
      <div class="pair-avatar" id="pair-avatar">?</div>
      <div class="pair-body">
        <div class="pair-row">
          <span class="pair-label">Paired:</span>
          <span class="pair-name" id="pair-name">—</span>
        </div>
        <div class="pair-meta" id="pair-meta"></div>
      </div>
    </div>

    <!-- Freepik profile (จาก scrape) — แยกให้ชัด -->
    <div class="profile" id="profile" style="display:none">
      <span class="profile-icon">👤</span>
      <span class="profile-name" id="profile-name" title=""></span>
    </div>

    <div class="balance">
      <div class="balance-num" id="balance">—</div>
      <div class="balance-label" id="balance-label">เครดิตคงเหลือ</div>
      <div class="balance-time" id="balance-time"></div>
    </div>

    <!-- Tentative banner — โผล่เมื่อ scrape ได้แต่ confidence-lock ปฏิเสธ -->
    <div id="tentative-banner" style="display:none;background:rgba(245,158,11,.10);border:1px solid #f59e0b;border-radius:8px;padding:8px 10px;margin-top:6px;font-size:11.5px;color:#92400e;line-height:1.45">
      <div style="font-weight:700;margin-bottom:2px">⚠ ค่าที่ scrape ได้แต่ถูก lock ปฏิเสธ</div>
      <div id="tentative-detail" style="font-family:ui-monospace,Menlo,monospace;font-size:11px"></div>
      <button id="reset-lock-btn" style="margin-top:6px;padding:4px 10px;border:1px solid #f59e0b;background:#fff;color:#92400e;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">🔓 Reset detect (ยอมรับค่านี้)</button>
    </div>

    <div class="status-row">
      <span class="dot" id="alert-dot"></span>
      <span id="alert-text">รอข้อมูล…</span>
    </div>

    <div class="actions">
      <button class="primary" id="dashboard-btn">เปิด Dashboard</button>
      <button id="options-btn">ตั้งค่า</button>
    </div>

    <div class="footer">
      <span class="dot" id="conn-dot"></span>
      <span id="conn-text">กำลังตรวจสอบ…</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
