<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FEFL Beat · เข้าสู่ระบบ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f6f9ff;
      --bg-card: #ffffff;
      --border: #e3eaf5;
      --border-strong: #c8d4ec;
      --text: #0f172a;
      --text-muted: #5b6b85;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #dbeafe;
      --critical: #dc2626;
      --green: #10b981;
      --shadow-md: 0 10px 40px rgba(37, 99, 235, .12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(900px 400px at 80% -10%, rgba(124, 58, 237, .08), transparent 60%),
        radial-gradient(700px 350px at 10% 110%, rgba(37, 99, 235, .10), transparent 60%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 420px;
      max-width: 92vw;
      box-shadow: var(--shadow-md);
    }
    .brand { margin-bottom: 22px; }
    .brand a.logo {
      display: inline-block;
      font-size: 1.35rem; font-weight: 600;
      color: var(--text); text-decoration: none;
      letter-spacing: -0.01em;
    }
    .brand a.logo strong { color: var(--primary); font-weight: 700; }

    h1 { margin: 0 0 6px; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 18px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px;
      background: var(--bg-soft);
      padding: 4px;
      border-radius: 10px;
      margin-bottom: 22px;
    }
    .tab {
      flex: 1;
      background: transparent;
      border: none;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: #fff;
      color: var(--primary);
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(15,23,42,.08);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .field input {
      width: 100%;
      background: #fff; color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 12px; font-size: 14.5px; font-family: inherit;
      transition: border .15s, box-shadow .15s;
    }
    .field input:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
    }
    .field input.otp {
      letter-spacing: 0.4em; font-size: 18px;
      text-align: center; font-weight: 600;
    }
    .hint { color: var(--text-muted); font-size: 12px; margin-top: 4px; }

    button.primary-btn {
      width: 100%;
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      color: #fff; border: none; border-radius: 10px;
      padding: 12px; font-size: 14.5px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 8px;
      transition: transform .1s, box-shadow .15s;
    }
    button.primary-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37, 99, 235, .3); }
    button.primary-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    button.secondary-btn {
      width: 100%;
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px; font-size: 13.5px; font-family: inherit;
      cursor: pointer; margin-top: 6px;
    }
    button.secondary-btn:hover { background: var(--bg-soft); }

    .alert {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .alert.err {
      background: rgba(220, 38, 38, .08);
      border: 1px solid rgba(220, 38, 38, .25);
      color: var(--critical);
    }
    .alert.ok {
      background: rgba(16, 185, 129, .08);
      border: 1px solid rgba(16, 185, 129, .25);
      color: var(--green);
    }
    .info-box {
      background: rgba(37, 99, 235, .06);
      border: 1px solid rgba(37, 99, 235, .25);
      color: var(--primary-dark);
      padding: 11px 13px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .footer-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
    .footer-link a { color: var(--primary); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    #recaptcha-container { margin-top: 6px; }

    .step { display: none; }
    .step.active { display: block; }

    .phone-row { display: flex; gap: 8px; }
    .phone-row .country-code {
      width: 84px; flex-shrink: 0;
      background: var(--bg-soft); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 11px 10px; font-size: 14.5px; font-family: inherit;
      text-align: center; font-weight: 500;
    }
    .phone-row input { flex: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <a href="/" class="logo">FEFL<strong>Beat</strong></a>
    </div>

    <h1 id="page-title">เข้าสู่ระบบ</h1>
    <div class="sub" id="page-sub">ใช้อีเมล + รหัสผ่าน หรือลงทะเบียนด้วยเบอร์มือถือ</div>

    <div class="tabs">
      <button class="tab active" data-tab="email">อีเมล / Username + รหัสผ่าน</button>
      <button class="tab" data-tab="phone">เบอร์มือถือ + OTP</button>
    </div>

    <div class="alert err" id="err"></div>
    <div class="alert ok" id="ok"></div>

    <!-- info banner สำหรับ admin setup mode -->
    <div class="info-box" id="setup-banner" style="display:none">
      🛠️ <strong>ตั้งค่า Admin ครั้งแรก</strong> — ระบบยังไม่มี admin กรอก username/password ด้านล่างเพื่อสร้าง
    </div>

    <!-- ============== Panel: email/username + password ============== -->
    <div class="panel active" id="panel-email">
      <form id="emailForm">
        <div class="field">
          <label for="email">อีเมล หรือ Username</label>
          <input id="email" type="text" autocomplete="username" placeholder="you@example.com หรือ admin@gmail.com" />
        </div>
        <div class="field">
          <label for="password">รหัสผ่าน</label>
          <input id="password" type="password" autocomplete="current-password" />
        </div>
        <!-- ช่องยืนยัน password (โผล่เฉพาะ setup admin mode) -->
        <div class="field" id="confirm-field" style="display:none">
          <label for="confirm-password">ยืนยันรหัสผ่าน</label>
          <input id="confirm-password" type="password" autocomplete="new-password" />
        </div>
        <button type="submit" class="primary-btn" id="emailLoginBtn">เข้าสู่ระบบ</button>
      </form>
      <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--text-muted)">
        ยังไม่มีบัญชี? <a href="#" id="goPhoneBtn" style="color:var(--primary);text-decoration:none">สมัครด้วยเบอร์มือถือ</a>
      </div>
    </div>

    <!-- ============== Panel: phone + OTP ============== -->
    <div class="panel" id="panel-phone">
      <!-- ขั้นที่ 1: เบอร์ -->
      <div class="step active" id="step-phone">
        <div class="field">
          <label for="phone">เบอร์มือถือ</label>
          <div class="phone-row">
            <input id="country" class="country-code" type="text" value="+66" maxlength="4" />
            <input id="phone" type="tel" inputmode="numeric" placeholder="0812345678" autocomplete="tel" />
          </div>
          <div class="hint">เริ่มด้วย 0 ก็ได้ ระบบจะแปลงให้</div>
        </div>
        <button class="primary-btn" id="sendOtpBtn">ส่งรหัส OTP</button>
        <div id="recaptcha-container"></div>
      </div>

      <!-- ขั้นที่ 2: OTP -->
      <div class="step" id="step-otp">
        <div class="info-box" id="otpInfo"></div>
        <div class="field">
          <label for="otp">รหัส OTP (6 หลัก)</label>
          <input id="otp" class="otp" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
        </div>
        <button class="primary-btn" id="verifyOtpBtn">ยืนยัน OTP</button>
        <button class="secondary-btn" id="changePhoneBtn" type="button">← เปลี่ยนเบอร์</button>
      </div>
    </div>

    <div class="footer-link">
      <a href="/">← กลับหน้าแรก</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
    import { getAuth, signInWithPhoneNumber, RecaptchaVerifier }
      from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';

    const $ = id => document.getElementById(id);
    const showErr = m => { $('err').textContent = m; $('err').style.display = ''; $('ok').style.display = 'none'; };
    const showOk = m => { $('ok').textContent = m; $('ok').style.display = ''; $('err').style.display = 'none'; };
    const clearMsg = () => { $('err').style.display = $('ok').style.display = 'none'; };
    const goStep = id => {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      $(id).classList.add('active');
    };
    const goTab = name => {
      clearMsg();
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
    };

    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => goTab(t.dataset.tab));
    });
    $('goPhoneBtn').addEventListener('click', (e) => { e.preventDefault(); goTab('phone'); });

    // ============== Detect mode: setup-admin? login? ==============
    let mode = 'login';   // 'login' | 'setup-admin'
    try {
      const adminState = await fetch('/api/admin/state').then(r => r.json());
      if (!adminState.has_admin) {
        mode = 'setup-admin';
        $('setup-banner').style.display = '';
        $('confirm-field').style.display = '';
        $('page-title').textContent = 'ตั้งค่า Admin ครั้งแรก';
        $('page-sub').textContent = 'สร้าง username + รหัสผ่านสำหรับ admin (ครั้งแรกเท่านั้น)';
        $('emailLoginBtn').textContent = 'สร้างบัญชี Admin';
        $('password').setAttribute('autocomplete', 'new-password');
      }
    } catch {}

    // ============== Email/Username + password (unified) ==============
    $('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMsg();
      const username = $('email').value.trim();
      const password = $('password').value;
      if (!username || !password) { showErr('กรุณากรอก username/อีเมล และรหัสผ่าน'); return; }

      $('emailLoginBtn').disabled = true;
      try {
        if (mode === 'setup-admin') {
          if (password.length < 4) { showErr('รหัสผ่านอย่างน้อย 4 ตัว'); return; }
          if (password !== $('confirm-password').value) { showErr('รหัสผ่านไม่ตรงกัน'); return; }
          const res = await fetch('/api/admin/setup', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });
          if (!res.ok) {
            const j = await res.json().catch(() => ({}));
            throw new Error(j.detail || ('HTTP ' + res.status));
          }
          showOk('สร้าง admin สำเร็จ — กำลังพาไปหน้า admin…');
          setTimeout(() => location.replace('/admin'), 600);
          return;
        }

        // mode === 'login' — ลอง admin ก่อน ถ้าไม่ใช่ค่อย member (ผ่าน /api/auth/login)
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.detail || ('HTTP ' + res.status));
        }
        const data = await res.json();
        const target = data.role === 'admin' ? '/admin' : '/';
        showOk(`เข้าสู่ระบบสำเร็จ (${data.role}) — กำลังพาไป…`);
        setTimeout(() => location.replace(target), 600);
      } catch (e) {
        showErr(e.message);
      } finally {
        $('emailLoginBtn').disabled = false;
      }
    });

    // ============== Phone + OTP (Firebase) ==============
    let cfg = null;
    try {
      cfg = await fetch('/api/firebase/config').then(r => r.json());
    } catch (e) {
      console.warn('Firebase config unreachable:', e);
    }

    let firebaseReady = false;
    let auth = null;
    let recaptcha = null;
    let confirmationResult = null;
    let normalizedPhone = '';

    if (cfg && cfg.enabled) {
      const app = initializeApp({
        apiKey: cfg.apiKey, authDomain: cfg.authDomain, projectId: cfg.projectId,
        appId: cfg.appId, messagingSenderId: cfg.messagingSenderId, storageBucket: cfg.storageBucket,
      });
      auth = getAuth(app);
      auth.languageCode = 'th';
      firebaseReady = true;
    }

    function ensureRecaptcha() {
      if (recaptcha) return recaptcha;
      recaptcha = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });
      return recaptcha;
    }
    function normalizePhone(country, raw) {
      let p = raw.replace(/[^\d]/g, '');
      if (p.startsWith('0')) p = p.slice(1);
      const c = country.startsWith('+') ? country : '+' + country;
      return c + p;
    }

    $('sendOtpBtn').addEventListener('click', async () => {
      clearMsg();
      if (!firebaseReady) {
        showErr('Firebase ยังไม่ได้ตั้งค่า — กรุณาแจ้งผู้ดูแลระบบ');
        return;
      }
      const country = $('country').value.trim() || '+66';
      const raw = $('phone').value.trim();
      if (!raw || raw.length < 8) { showErr('กรุณาใส่เบอร์มือถือให้ครบ'); return; }
      normalizedPhone = normalizePhone(country, raw);
      $('sendOtpBtn').disabled = true;
      try {
        const verifier = ensureRecaptcha();
        confirmationResult = await signInWithPhoneNumber(auth, normalizedPhone, verifier);
        $('otpInfo').textContent = `ส่ง OTP ไปที่ ${normalizedPhone} แล้ว — กรุณากรอกรหัสที่ได้รับ`;
        goStep('step-otp');
        $('otp').focus();
      } catch (e) {
        console.error(e);
        showErr('ส่ง OTP ไม่สำเร็จ: ' + (e.message || e.code || 'unknown'));
        try { recaptcha.clear(); } catch {}
        recaptcha = null;
      } finally {
        $('sendOtpBtn').disabled = false;
      }
    });

    $('changePhoneBtn').addEventListener('click', () => { clearMsg(); goStep('step-phone'); });

    $('verifyOtpBtn').addEventListener('click', async () => {
      clearMsg();
      const code = $('otp').value.trim();
      if (!/^\d{6}$/.test(code)) { showErr('OTP ต้องเป็นตัวเลข 6 หลัก'); return; }
      if (!confirmationResult) { showErr('Session หมดอายุ'); goStep('step-phone'); return; }
      $('verifyOtpBtn').disabled = true;
      try {
        const result = await confirmationResult.confirm(code);
        const idToken = await result.user.getIdToken();
        const res = await fetch('/api/member/verify', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_token: idToken }),
        });
        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.detail || ('HTTP ' + res.status));
        }
        const data = await res.json();
        showOk(data.is_new
          ? 'ลงทะเบียนสำเร็จ — กำลังพาไปหน้าโปรไฟล์เพื่อตั้งรหัสผ่าน…'
          : 'เข้าสู่ระบบสำเร็จ — กำลังพาไปหน้าแรก…');
        // member ใหม่ → หน้า "บัญชีของฉัน" ใน admin SPA
        setTimeout(() => location.replace(data.is_new ? '/admin#/account' : '/'), 800);
      } catch (e) {
        console.error(e);
        showErr('OTP ไม่ถูกต้อง: ' + (e.message || e.code || 'unknown'));
      } finally {
        $('verifyOtpBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
