<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FEFL Beat · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f6f9ff;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-hover: #f1f5fd;
      --border: #e3eaf5;
      --border-strong: #c8d4ec;
      --text: #0f172a;
      --text-muted: #5b6b85;
      --text-soft: #8895ab;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #dbeafe;
      --accent: #7c3aed;
      --green: #10b981;
      --warning: #f59e0b;
      --critical: #dc2626;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05);
      --shadow-md: 0 4px 16px rgba(37, 99, 235, .08);
      --shadow-lg: 0 12px 40px rgba(37, 99, 235, .12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg-soft);
      color: var(--text);
      display: flex; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Sidebar */
    aside {
      width: 240px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 22px 0;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-sm);
    }
    .brand {
      padding: 0 18px 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .brand-row {
      display: flex; align-items: center; gap: 10px; position: relative;
    }
    .brand a.logo {
      display: inline-block;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .brand a.logo:hover { text-decoration: none; }
    .brand a.logo strong { color: var(--primary); font-weight: 700; }
    .brand .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 6px; padding-left: 4px; }

    /* Hamburger + sister-sites menu */
    .hamburger-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 34px; height: 34px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted);
      transition: all .12s; padding: 0;
    }
    .hamburger-btn:hover {
      background: var(--bg-soft); color: var(--primary);
      border-color: var(--border-strong);
    }
    .brand-menu {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, .15);
      min-width: 280px;
      padding: 6px;
      z-index: 200;
    }
    .brand-menu-head {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); font-weight: 600;
      padding: 10px 12px 6px;
    }
    .brand-menu-item {
      display: block; padding: 10px 12px;
      border-radius: 8px; text-decoration: none;
      color: var(--text); transition: background .1s;
    }
    .brand-menu-item:hover { background: var(--bg-soft); text-decoration: none; }
    .brand-menu-item .name { display: block; font-size: 14px; font-weight: 600; }
    .brand-menu-item .name strong { color: var(--primary); font-weight: 700; }
    .brand-menu-item .desc { display: block; font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
    .brand-menu-item.current { background: var(--bg-soft); }
    .brand-menu-item.current .name::after {
      content: '· ปัจจุบัน';
      color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 6px;
    }

    .nav { flex: 1; padding: 0 12px; overflow-y: auto; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 13px;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 3px;
      transition: all .12s;
    }
    .nav a:hover { background: var(--bg-hover); color: var(--text); text-decoration: none; }
    .nav a.active {
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-weight: 600;
    }

    /* Sidebar sections */
    .nav-section + .nav-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .nav-section-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-soft);
      font-weight: 600;
      padding: 2px 13px 8px;
    }
    .nav-section-label .icon { opacity: .7; font-size: 12px; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      position: relative;
    }

    /* Profile switcher */
    .profile-switcher { position: relative; }
    .profile-current {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 8px 10px;
      background: transparent; border: 1px solid transparent;
      border-radius: 10px;
      cursor: pointer; font-family: inherit;
      transition: all .12s;
      text-align: left;
    }
    .profile-current:hover {
      background: var(--bg-hover);
      border-color: var(--border);
    }
    .profile-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff; font-weight: 700; font-size: 13px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-role {
      font-size: 11px; color: var(--text-muted);
      margin-top: 1px;
    }
    .profile-caret {
      color: var(--text-muted); flex-shrink: 0;
    }

    .profile-menu {
      position: absolute;
      bottom: calc(100% + 4px); left: 12px; right: 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 -8px 24px rgba(15, 23, 42, .15);
      padding: 6px;
      z-index: 100;
      max-height: 400px; overflow-y: auto;
    }
    .profile-menu-head {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted); font-weight: 600;
      padding: 8px 10px 4px;
    }
    .profile-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%;
      padding: 8px 10px;
      background: transparent; border: none;
      border-radius: 8px; cursor: pointer;
      font-family: inherit; text-align: left;
      transition: background .1s;
      color: var(--text);
    }
    .profile-item:hover { background: var(--bg-hover); }
    .profile-item.active { background: var(--bg-soft); }
    .profile-item-info { flex: 1; min-width: 0; }
    .profile-item-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-item-role { font-size: 11px; color: var(--text-muted); }
    .profile-item-check { color: var(--green); font-weight: 700; }

    .profile-menu hr {
      border: none; border-top: 1px solid var(--border);
      margin: 4px 6px;
    }
    .profile-action {
      display: flex; align-items: center; gap: 10px;
      width: 100%;
      padding: 9px 10px;
      background: transparent; border: none;
      border-radius: 8px; cursor: pointer;
      font-family: inherit; text-align: left;
      font-size: 13px; color: var(--text);
      transition: background .1s;
    }
    .profile-action:hover { background: var(--bg-hover); }
    .profile-action.danger { color: var(--critical); }
    .profile-action.danger:hover { background: rgba(220,38,38,.06); }
    .profile-action-icon {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; opacity: .8;
    }

    /* Main */
    main { flex: 1; padding: 32px 36px; overflow-y: auto; }
    main.no-pad { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
    main.no-pad iframe { flex: 1; width: 100%; border: 0; background: var(--bg); }

    .page-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
    }
    h2.page-title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .crumb { color: var(--text-muted); font-size: 13px; margin-bottom: 8px; }
    .crumb a { color: var(--text-muted); }

    button.btn, .btn {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .12s;
    }
    button.btn:hover {
      background: var(--bg-hover); border-color: var(--border-strong);
    }
    button.btn.primary {
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-md);
    }
    button.btn.primary:hover {
      background: linear-gradient(135deg, #1d4ed8 0%, #4338ca 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(37, 99, 235, .3);
    }
    button.btn.danger {
      background: transparent; color: var(--critical);
      border-color: rgba(220, 38, 38, .25);
    }
    button.btn.danger:hover { background: rgba(220, 38, 38, .06); border-color: var(--critical); }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
      transition: all .15s;
      box-shadow: var(--shadow-sm);
    }
    .card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
    .card-clickable { cursor: pointer; }
    .card-clickable:hover { border-color: var(--primary); }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-sub { color: var(--text-muted); font-size: 12.5px; margin-top: 3px; }
    .card-sub code {
      background: var(--bg-soft);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    .empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, .35);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px;
      width: 440px;
      max-width: 92vw;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .25);
    }
    .modal-wide  { width: 720px; }
    .modal-xwide { width: 920px; }
    .modal h3 { margin: 0 0 14px; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-top: 18px;
    }
    /* Two-column layout for fields (used in wide modals) */
    .field-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 14px;
    }
    @media (max-width: 600px) {
      .field-grid-2 { grid-template-columns: 1fr; }
    }
    .field-section-label {
      grid-column: 1 / -1;
      font-size: 11.5px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin: 14px 0 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .field-section-label:first-child { margin-top: 0; padding-top: 0; border-top: none; }
    .field-span-2 { grid-column: 1 / -1; }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%;
      background: var(--bg-input); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-size: 13px; font-family: inherit;
      transition: border .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    .hint { color: var(--text-muted); font-size: 11.5px; margin-top: 4px; line-height: 1.5; }
    .hint code {
      background: var(--bg-soft); padding: 1px 5px; border-radius: 4px; font-size: 11px;
    }

    /* Credentials list */
    /* Members table — multi-line cells */
    .members-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
      background: var(--bg-card);
    }
    .members-table thead tr { background: var(--bg-soft); }
    .members-table thead th {
      text-align: left; padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 600; font-size: 11.5px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .members-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .members-table tbody tr:hover { background: var(--bg-soft); }
    .members-table tbody tr:last-child { border-bottom: none; }
    .members-table tbody td { padding: 14px; vertical-align: top; }
    .m-row {
      font-size: 12.5px; color: var(--text);
      line-height: 1.5; margin-top: 1px;
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-row-muted {
      font-size: 11px; color: var(--text-muted);
      margin-top: 3px;
    }
    .m-name-link:hover {
      color: var(--primary) !important;
      text-decoration: underline;
    }

    /* Inline editable fields (Notion-style click-to-edit) */
    .inline-edit {
      cursor: text;
      transition: background .12s, box-shadow .12s;
    }
    .inline-edit:hover { background: var(--bg-hover) !important; }
    .inline-edit:focus { background: var(--primary-soft) !important; box-shadow: 0 0 0 2px rgba(37,99,235,.18); }
    .inline-edit:empty::before {
      content: attr(data-empty-msg);
      color: var(--text-soft);
      font-style: italic;
    }
    /* Logo box hover hint */
    #sd-logo:hover {
      border-color: var(--primary) !important;
      background: var(--primary-soft) !important;
    }

    /* Credential access rows (in modal) — Notion/Linear style */
    .m-access-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      background: var(--bg-card);
      transition: all .12s;
    }
    .m-access-row:hover { background: var(--bg-hover); border-color: var(--border-strong); }
    .m-access-row.m-access-on {
      background: var(--primary-soft);
      border-color: rgba(37,99,235,.35);
    }
    .m-access-row.m-access-on:hover {
      background: rgba(37,99,235,.14);
    }
    .m-access-cb {
      width: 17px; height: 17px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--primary);
    }
    .m-access-cb:disabled { cursor: not-allowed; opacity: .8; }
    .m-access-avatar {
      width: 34px; height: 34px;
      border-radius: 9px;
      color: #fff;
      font-weight: 700; font-size: 13px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .m-access-text { flex: 1; min-width: 0; overflow: hidden; }
    .m-access-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-access-sub {
      font-size: 11.5px; color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .cred-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 0;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
    }
    .cred-row:hover { border-color: var(--border-strong); }
    .cred-row .col-label { font-weight: 600; }
    .cred-row .col-pw { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .cred-chip {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 999px;
      font-size: 11.5px; font-weight: 500;
      background: var(--bg-soft); color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .cred-chip-cancelled {
      background: rgba(220,38,38,.10); color: var(--critical);
      border-color: rgba(220,38,38,.20);
    }
    .pw-mask { color: var(--text-muted); }
    .pw-show { color: var(--text); user-select: all; }
    .copy-btn {
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 13px; padding: 3px 5px;
      border-radius: 4px;
    }
    .copy-btn:hover { color: var(--primary); background: var(--bg-hover); }

    .warning-box {
      background: linear-gradient(135deg, rgba(245, 158, 11, .06), rgba(245, 158, 11, .12));
      border: 1px solid rgba(245, 158, 11, .35);
      color: #92400e;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .warning-box code {
      background: rgba(146, 64, 14, .12); padding: 1px 5px; border-radius: 4px;
    }

    /* Platforms grid — compact 2-col rows (logo | info) */
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }
    .platform-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      transition: all .15s;
      min-height: 64px;
    }
    .platform-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
      text-decoration: none;
    }
    .platform-card-info {
      flex: 1;
      min-width: 0;       /* IMPORTANT — ทำให้ truncate ทำงาน */
      overflow: hidden;
    }

    /* === Spotlight team filter — highlight platforms that selected team uses === */
    /* Team badge — มุมขวาบนของ card (เล็กลง สำหรับ compact layout) */
    .p-team-badge {
      position: absolute; top: 6px; right: 8px;
      background: rgba(124, 58, 237, .14);
      color: #6d28d9;
      font-size: 9.5px; font-weight: 700;
      padding: 1px 7px;
      border-radius: 999px;
      border: 1px solid rgba(124, 58, 237, .25);
      pointer-events: none;
      z-index: 2;
      max-width: 110px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* When spotlight is on, dim cards that team doesn't use */
    #p-list.spotlight-on .platform-card[data-team-uses="0"] {
      opacity: 0.4;
      filter: saturate(0.5);
    }
    #p-list.spotlight-on .platform-card[data-team-uses="0"]:hover {
      opacity: 0.85;
      filter: saturate(1);
    }
    /* Team uses + I can use → solid green spotlight */
    #p-list.spotlight-on .platform-card[data-team-uses="1"]:not(.platform-card-disabled) {
      border-color: #10b981 !important;
      box-shadow:
        0 0 0 2px rgba(16, 185, 129, .14),
        0 8px 24px rgba(16, 185, 129, .15);
      background: linear-gradient(180deg, rgba(16,185,129,.04), var(--bg-card));
    }
    #p-list.spotlight-on .platform-card[data-team-uses="1"]:not(.platform-card-disabled):hover {
      box-shadow:
        0 0 0 3px rgba(16, 185, 129, .22),
        0 12px 32px rgba(16, 185, 129, .25);
    }
    #p-list.spotlight-on .platform-card[data-team-uses="1"]:not(.platform-card-disabled) .p-team-badge {
      background: rgba(16, 185, 129, .15);
      color: #15803d;
      border-color: rgba(16, 185, 129, .35);
    }
    /* Team uses + I can't use → orange/amber spotlight (highlighted but disabled) */
    #p-list.spotlight-on .platform-card.platform-card-disabled[data-team-uses="1"] {
      opacity: 1 !important;
      filter: none !important;
      border: 2px solid #f59e0b !important;
      box-shadow:
        0 0 0 2px rgba(245, 158, 11, .14),
        0 6px 18px rgba(245, 158, 11, .18);
      background: linear-gradient(180deg, rgba(245,158,11,.06), var(--bg-soft));
    }

<script>
const $ = id => document.getElementById(id);
const API = '';

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let currentRole = null;  // 'admin' | 'member' | null

async function fetchJson(path, opts = {}) {
  const res = await fetch(API + path, {
    credentials: 'same-origin',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    ...opts,
  });
  if (res.status === 401) {
    location.replace('/login');
    throw new Error('unauthorized');
  }
  if (res.status === 403) {
    throw new Error('คุณไม่มีสิทธิ์ทำรายการนี้');
  }
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    throw new Error(j.detail || ('HTTP ' + res.status));
  }
  return res.json();
}

// admin-only routes — member ห้ามเข้า (bounce ไป default)
const ADMIN_ONLY_ROUTES = new Set(['security', 'members', 'sites', 'logs', 'teams', 'access-requests']);
// menu items ที่ซ่อนใน sidebar สำหรับ member
// (dashboard เห็นได้ทุกบทบาท — ใช้เป็นหน้าแรกของ member ด้วย)
const HIDE_FROM_MEMBER_NAV = new Set(['security', 'members', 'sites', 'logs', 'teams', 'access-requests']);

// ---------- routing ----------
const routes = {
  'dashboard':        renderDashboardEmbed,
  'platforms':        renderPlatformsPage,
  'sites':            renderSitesList,
  'members':          renderMembersPage,
  'teams':            renderTeamsPage,
  'access-requests':  renderAccessRequestsPage,
  'logs':             renderLogsPage,
  'extension':        renderExtensionPage,
  'security':         renderSecurityPage,
  'account':          renderAccountPage,
};

function setActive(route) {
  document.querySelectorAll('.nav a[data-route]').forEach(a => {
    a.classList.toggle('active', a.dataset.route === route);
  });
}
function resetMainPadding() { $('main').classList.remove('no-pad'); }

async function navigate() {
  const hash = location.hash.replace(/^#\/?/, '') || 'dashboard';
  const parts = hash.split('/');
  const route = parts[0];

  // Member ห้ามเข้า admin-only routes → bounce ไป dashboard
  if (currentRole === 'member' && (ADMIN_ONLY_ROUTES.has(route) || HIDE_FROM_MEMBER_NAV.has(route))) {
    location.hash = '#/dashboard';
    return;
  }

  // ออกจากหน้า extension → หยุด polling status
  if (route !== 'extension' && typeof stopExtStatusPolling === 'function') {
    stopExtStatusPolling();
  }

  resetMainPadding();
  if (route === 'sites' && parts[1]) {
    setActive('sites');
    await renderSiteDetail(parseInt(parts[1], 10));
  } else if (route === 'teams' && parts[1]) {
    // Teams page now uses tabs — pass team_id เพื่อ select tab
    setActive('teams');
    await renderTeamsPage(parseInt(parts[1], 10));
  } else if (routes[route]) {
    setActive(route);
    await routes[route]();
  } else {
    location.hash = '#/dashboard';
  }
}

window.addEventListener('hashchange', navigate);

function renderDashboardEmbed() {
  const m = $('main');
  m.classList.add('no-pad');
  m.innerHTML = `<iframe src="/dashboard" title="FEFL Beat Dashboard"></iframe>`;
}

// ---------- pages ----------
async function renderSitesList() {
  $('main').innerHTML = `
    <div class="page-head">
      <h2 class="page-title">🌐 Websites</h2>
      <button class="btn primary" id="add-site-btn">+ เพิ่มเว็บใหม่</button>
    </div>
    <div id="sites-list"></div>
  `;
  $('add-site-btn').addEventListener('click', showAddSiteModal);
  await loadSites();
}

async function loadSites() {
  const list = $('sites-list');
  list.innerHTML = '<div class="empty">กำลังโหลด…</div>';
  const { sites } = await fetchJson('/api/admin/sites');
  if (sites.length === 0) {
    list.innerHTML = '<div class="empty">ยังไม่มีเว็บ — กด <strong>+ เพิ่มเว็บใหม่</strong> ด้านบน</div>';
    return;
  }
  list.innerHTML = sites.map(s => {
    const initial = (s.name || '?').trim().charAt(0).toUpperCase();
    const avatar = s.logo_data
      ? `<img src="${s.logo_data}" alt="${escapeHtml(s.name)}" style="width:42px;height:42px;border-radius:10px;object-fit:cover;background:#fff;flex-shrink:0;border:1px solid var(--border)" />`
      : `<div style="width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-weight:700;font-size:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${escapeHtml(initial)}</div>`;
    return `
      <div class="card card-clickable" data-id="${s.id}" style="display:flex;align-items:center;gap:14px">
        ${avatar}
        <div style="flex:1;min-width:0">
          <div class="card-title">${escapeHtml(s.name)}</div>
          <div class="card-sub">URL pattern: <code>${escapeHtml(s.url_pattern)}</code> · ${s.cred_count} credentials</div>
        </div>
        <div style="color:var(--text-muted)">→</div>
      </div>
    `;
  }).join('');
  list.querySelectorAll('.card[data-id]').forEach(card => {
    card.addEventListener('click', () => {
      location.hash = '#/sites/' + card.dataset.id;
    });
  });
}

// ====== Site form helpers (shared by add + edit) ======
const PAYMENT_TYPE_LABELS = {
  credit_card: 'บัตรเครดิต',
  debit_card: 'บัตรเดบิต',

  truemoney: 'TrueMoney Wallet',
  paypal: 'PayPal',

};

let _cardOwnersCache = null;
async function getCardOwners() {
  if (_cardOwnersCache) return _cardOwnersCache;
  try {
    const r = await fetchJson('/api/admin/card-owners');
    _cardOwnersCache = r.card_owners || [];
  } catch { _cardOwnersCache = []; }
  return _cardOwnersCache;
}

function siteFormHTML(site) {
  // site อาจเป็น null (โหมด add) หรือ object (โหมด edit)
  // ข้อมูลการเงิน/billing ย้ายไปอยู่ที่ credential แล้ว — ฟอร์ม site เก็บ name + url_pattern + logo
  const s = site || {};
  const hasLogo = !!s.logo_data;
  return `
    <div class="field">
      <label>ชื่อเว็บ</label>
      <input id="m-name" type="text" value="${escapeHtml(s.name || '')}" placeholder="เช่น Behance, Adobe Stock" />
    </div>
    <div class="field">
      <label>URL pattern (ใช้ * เป็น wildcard)</label>
      <input id="m-pattern" type="text" value="${escapeHtml(s.url_pattern || '')}" placeholder="*.example.com/*" />
      <div class="hint">เช่น <code>*.freepik.com/*</code></div>
    </div>

    <!-- Logo section -->
    <div class="field">
      <label>โลโก้ (รูปสี่เหลี่ยมจัตุรัส)</label>
      <div style="display:flex;gap:14px;align-items:flex-start;margin-top:6px">
        <div id="m-logo-preview" style="width:96px;height:96px;border-radius:12px;border:1.5px dashed var(--border);background:${hasLogo ? 'var(--bg-card)' : 'var(--bg-soft)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden">
          ${hasLogo
            ? `<img src="${s.logo_data}" alt="logo" style="width:100%;height:100%;object-fit:cover" />`
            : `<span style="color:var(--text-muted);font-size:11.5px;text-align:center;line-height:1.4">ยังไม่มี<br/>โลโก้</span>`
          }
        </div>
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:6px">
          <button type="button" class="btn" id="m-logo-upload-btn" style="font-size:12.5px;padding:7px 12px;text-align:left">📷 อัพโหลดไฟล์...</button>
          <button type="button" class="btn" id="m-logo-search-btn" style="font-size:12.5px;padding:7px 12px;text-align:left">🔍 ค้นหาโลโก้จาก URL</button>
          <button type="button" class="btn danger" id="m-logo-remove-btn" style="font-size:12.5px;padding:7px 12px;text-align:left;${hasLogo ? '' : 'display:none'}">🗑 ลบโลโก้</button>
          <input type="file" id="m-logo-file-input" accept="image/*" style="display:none" />
        </div>
      </div>
      <input type="hidden" id="m-logo-data" value="${escapeHtml(s.logo_data || '')}" />
    </div>

    <div class="hint" style="background:var(--bg-soft);padding:10px 12px;border-radius:8px;color:var(--text-muted);font-size:12px;margin-top:8px">
      💡 ข้อมูลการเงิน (ค่าใช้จ่าย, รอบบิล, ใช้บัตรของ ฯลฯ) ตอนนี้กำหนดที่ <strong>แต่ละ credential</strong>
      เพราะ credential เดียวกันอาจจ่ายโดยคนละคน หรือคนละรอบ
    </div>
  `;
}

function siteFormCollect() {
  const data = {
    name: $('m-name').value.trim(),
    url_pattern: $('m-pattern').value.trim(),
  };
  // Logo — ส่งเฉพาะถ้าผู้ใช้มีการเปลี่ยนแปลง
  // - hidden input value ที่ต่างจาก initial → ส่ง
  // - empty string → ลบ logo (PATCH set NULL)
  const logoEl = $('m-logo-data');
  if (logoEl) {
    const cur = logoEl.value;
    const initial = logoEl.dataset.initial || '';
    if (cur !== initial) {
      data.logo_data = cur;   // empty string = clear
    }
  }
  return data;
}

async function bindSiteFormDynamic() {
  // เก็บค่าเริ่มต้นของ logo เพื่อ diff ตอน save
  const logoEl = $('m-logo-data');
  if (logoEl) logoEl.dataset.initial = logoEl.value;

  // อัพโหลดไฟล์
  const fileInput = $('m-logo-file-input');
  $('m-logo-upload-btn').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => openCropModal(ev.target.result);
    reader.readAsDataURL(file);
    fileInput.value = '';   // reset เผื่อเลือกไฟล์เดิมซ้ำได้
  });

  // ค้นหาโลโก้จาก URL pattern
  $('m-logo-search-btn').addEventListener('click', () => {
    const pattern = $('m-pattern').value.trim();
    if (!pattern) {
      alert('กรอก URL pattern ก่อน (เช่น *.freepik.com/*)');
      return;
    }
    openLogoSearchModal(pattern);
  });

  // ลบโลโก้
  $('m-logo-remove-btn').addEventListener('click', () => {
    if (!confirm('ลบโลโก้ของเว็บนี้?')) return;
    setSiteLogoInForm('');   // empty = clear
  });
}

// ตั้งค่า logo (ทั้ง hidden input + preview + show/hide remove btn)
function setSiteLogoInForm(dataUrl) {
  const logoEl = $('m-logo-data');
  const preview = $('m-logo-preview');
  const removeBtn = $('m-logo-remove-btn');
  if (!logoEl || !preview) return;
  logoEl.value = dataUrl;
  if (dataUrl) {
    preview.style.background = 'var(--bg-card)';
    preview.innerHTML = `<img src="${dataUrl}" alt="logo" style="width:100%;height:100%;object-fit:cover" />`;
    if (removeBtn) removeBtn.style.display = '';
  } else {
    preview.style.background = 'var(--bg-soft)';
    preview.innerHTML = `<span style="color:var(--text-muted);font-size:11.5px;text-align:center;line-height:1.4">ยังไม่มี<br/>โลโก้</span>`;
    if (removeBtn) removeBtn.style.display = 'none';
  }
}

// === Crop modal — Cropper.js ===
let _cropper = null;

function openCropModal(srcDataUrl, onSave) {
  // onSave: (dataUrl) => void — callback เมื่อ user crop สำเร็จ
  if (!onSave) onSave = setSiteLogoInForm;   // default: เขียนลง form (สำหรับ Add site modal)
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.style.zIndex = '1100';   // เหนือ site form modal
  bg.innerHTML = `
    <div class="modal modal-wide">
      <h3 style="margin:0 0 14px;font-size:17px;font-weight:700">✂️ Crop โลโก้ (สี่เหลี่ยมจัตุรัส)</h3>
      <div class="hint" style="margin-bottom:14px;color:var(--text-muted);font-size:12.5px">
        ลากเพื่อเลือกพื้นที่ • ใช้ scroll wheel เพื่อ zoom • ปุ่ม +/- สำหรับ zoom
      </div>
      <div style="background:#0f172a;border-radius:10px;overflow:hidden;max-height:400px">
        <img id="m-crop-img" src="${srcDataUrl}" style="display:block;max-width:100%" alt="crop" crossorigin="anonymous" />
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap">
        <button class="btn" id="m-crop-zoom-out" type="button" style="font-size:14px;padding:6px 12px">−</button>
        <button class="btn" id="m-crop-zoom-in" type="button" style="font-size:14px;padding:6px 12px">+</button>
        <button class="btn" id="m-crop-reset" type="button" style="font-size:12.5px;padding:6px 12px">↺ Reset</button>
        <div style="flex:1"></div>
        <button class="btn" id="m-crop-cancel" type="button" style="font-size:13px;padding:7px 14px">ยกเลิก</button>
        <button class="btn primary" id="m-crop-save" type="button" style="font-size:13px;padding:7px 14px">✓ ใช้ภาพนี้</button>
      </div>
      <div class="hint" id="m-crop-err" style="color:var(--critical);margin-top:8px;display:none"></div>
    </div>
  `;
  document.body.appendChild(bg);

  const cleanup = () => {
    if (_cropper) { try { _cropper.destroy(); } catch {} _cropper = null; }
    bg.remove();
  };

  bg.querySelector('#m-crop-cancel').addEventListener('click', cleanup);
  bg.addEventListener('click', e => { if (e.target === bg) cleanup(); });

  const initCropper = () => {
    const img = bg.querySelector('#m-crop-img');
    _cropper = new Cropper(img, {
      aspectRatio: 1,         // square
      viewMode: 1,            // restrict crop box to canvas
      dragMode: 'move',
      autoCropArea: 0.8,
      background: false,
      responsive: true,
      modal: true,
      guides: true,
      center: true,
      highlight: true,
      cropBoxResizable: true,
      cropBoxMovable: true,
      toggleDragModeOnDblclick: false,
      minCropBoxWidth: 50,
      minCropBoxHeight: 50,
    });
    bg.querySelector('#m-crop-zoom-in').addEventListener('click', () => _cropper.zoom(0.15));
    bg.querySelector('#m-crop-zoom-out').addEventListener('click', () => _cropper.zoom(-0.15));
    bg.querySelector('#m-crop-reset').addEventListener('click', () => _cropper.reset());
  };

  // wait for image to load
  const img = bg.querySelector('#m-crop-img');
  if (img.complete && img.naturalWidth > 0) initCropper();
  else img.addEventListener('load', initCropper);
  img.addEventListener('error', () => {
    const err = bg.querySelector('#m-crop-err');
    err.textContent = '❌ โหลดภาพไม่สำเร็จ — อาจเป็นเพราะ CORS (โดเมน image search ไม่ allow). ลองอัพโหลดไฟล์โดยตรง';
    err.style.display = '';
  });

  bg.querySelector('#m-crop-save').addEventListener('click', () => {
    if (!_cropper) return;
    try {
      const canvas = _cropper.getCroppedCanvas({
        width: 256, height: 256,
        imageSmoothingEnabled: true, imageSmoothingQuality: 'high',
      });
      const dataUrl = canvas.toDataURL('image/png');
      onSave(dataUrl);
      cleanup();
    } catch (e) {
      const err = bg.querySelector('#m-crop-err');
      err.textContent = '❌ Crop ไม่สำเร็จ: ' + e.message;
      err.style.display = '';
    }
  });
}

// === Logo search modal — fetch suggestions and let user pick ===
// === Camera modal — ถ่ายรูปจากกล้อง → crop modal ===
function openCameraModal(onSave) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.style.zIndex = '1100';
  bg.innerHTML = `
    <div class="modal modal-wide">
      <h3 style="margin:0 0 14px;font-size:17px;font-weight:700">📸 ถ่ายรูปจากกล้อง</h3>
      <div class="hint" style="margin-bottom:14px;color:var(--text-muted);font-size:12.5px">
        Browser อาจขอสิทธิ์เข้าถึงกล้อง — กด Allow
      </div>
      <div id="cam-status" style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">⏳ เปิดกล้อง...</div>
      <video id="cam-video" autoplay playsinline muted style="display:none;width:100%;max-height:420px;background:#0f172a;border-radius:10px;object-fit:cover"></video>
      <canvas id="cam-canvas" style="display:none"></canvas>
      <div style="display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap">
        <button class="btn" id="cam-flip" type="button" style="font-size:13px;padding:7px 14px;display:none">🔄 สลับกล้อง</button>
        <div style="flex:1"></div>
        <button class="btn" id="cam-cancel" type="button" style="font-size:13px;padding:7px 14px">ยกเลิก</button>
        <button class="btn primary" id="cam-snap" type="button" style="font-size:13px;padding:7px 18px;display:none">📸 ถ่ายรูป</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);

  let stream = null;
  let facingMode = 'user';   // 'user' = หน้า, 'environment' = หลัง

  const cleanup = () => {
    if (stream) { try { stream.getTracks().forEach(t => t.stop()); } catch {} stream = null; }
    bg.remove();
  };
  bg.querySelector('#cam-cancel').addEventListener('click', cleanup);
  bg.addEventListener('click', e => { if (e.target === bg) cleanup(); });

  const video = bg.querySelector('#cam-video');
  const status = bg.querySelector('#cam-status');
  const snapBtn = bg.querySelector('#cam-snap');
  const flipBtn = bg.querySelector('#cam-flip');

  const startCamera = async () => {
    status.textContent = '⏳ เปิดกล้อง...';
    status.style.color = 'var(--text-muted)';
    if (stream) { try { stream.getTracks().forEach(t => t.stop()); } catch {} stream = null; }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      status.textContent = '❌ Browser นี้ไม่รองรับกล้อง — ลอง Chrome/Edge หรือ HTTPS';
      status.style.color = 'var(--critical)';
      return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 1280 } },
        audio: false,
      });
      video.srcObject = stream;
      status.style.display = 'none';
      video.style.display = 'block';
      snapBtn.style.display = '';
      // ตรวจว่ามีหลายกล้อง → แสดงปุ่ม flip
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === 'videoinput');
        if (cams.length > 1) flipBtn.style.display = '';
      } catch {}
    } catch (e) {
      status.textContent = '❌ เปิดกล้องไม่สำเร็จ: ' + (e.message || e.name) + '\n(ตรวจ permissions ในเบราว์เซอร์ + ต้องใช้ HTTPS)';
      status.style.color = 'var(--critical)';
      status.style.whiteSpace = 'pre-wrap';
    }
  };

  flipBtn.addEventListener('click', () => {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  });

  snapBtn.addEventListener('click', () => {
    if (!stream) return;
    const canvas = bg.querySelector('#cam-canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    // mirror image ถ้าเป็นกล้องหน้า (เหมือนที่ user เห็น)
    if (facingMode === 'user') {
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/png');
    cleanup();
    openCropModal(dataUrl, onSave);
  });

  startCamera();
}

      return;
    }
    if (!data.suggestions || data.suggestions.length === 0) {
      results.innerHTML = '<div class="empty" style="grid-column:1/-1">ไม่เจอ suggestion</div>';
      return;
    }
    results.innerHTML = data.suggestions.map((s, i) => `
      <div class="m-logo-thumb" data-url="${escapeHtml(s.url)}" data-name="${escapeHtml(s.name)}"
           style="aspect-ratio:1;border:1.5px solid var(--border);border-radius:10px;background:var(--bg-soft);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;transition:all .15s;overflow:hidden;position:relative">

      thumb.addEventListener('mouseenter', () => { thumb.style.borderColor = 'var(--primary)'; thumb.style.background = 'var(--primary-soft)'; });
      thumb.addEventListener('mouseleave', () => { thumb.style.borderColor = 'var(--border)'; thumb.style.background = 'var(--bg-soft)'; });

        thumb.innerHTML = '<div style="font-size:11px;color:var(--text-muted);text-align:center">⏳ กำลังโหลด...</div>';

// === Inline editable field helper ===
// On blur or Enter → PATCH ฟิลด์ของ site, แสดง toast
function wireInlineEdit(el, field, siteId) {
  if (!el) return;
  const saveAndShow = async () => {
    const val = el.textContent.trim();
    const original = el.dataset.original || '';
    if (val === original) return;
    if (!val) {
      el.textContent = original;
      showSavedToast('⚠ ห้ามเว้นว่าง', 'warning');
      return;
    }
    try {
      await fetchJson('/api/admin/sites/' + siteId, {
        method: 'PATCH',
        body: JSON.stringify({ [field]: val }),
      });
      el.dataset.original = val;
      showSavedToast('✓ บันทึกแล้ว');
    } catch (e) {
      el.textContent = original;
      showSavedToast('❌ ' + e.message, 'error');
    }
  };
  el.addEventListener('blur', saveAndShow);
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      el.blur();
    } else if (e.key === 'Escape') {
      el.textContent = el.dataset.original || '';
      el.blur();
    }
  });
  el.addEventListener('focus', () => { el.style.background = 'var(--primary-soft)'; });
  el.addEventListener('blur', () => { el.style.background = ''; });
}

// === Site logo actions (inline on site detail page) ===
function wireSiteLogoActions(siteId) {
  const logoBox = $('sd-logo');
  const actionsBox = $('sd-logo-actions');
  const fileInput = $('sd-logo-file');

  // toggle action menu on logo click
  logoBox.addEventListener('click', () => {
    actionsBox.style.display = actionsBox.style.display === 'flex' ? 'none' : 'flex';
  });
  // close menu on click outside
  document.addEventListener('click', (e) => {
    if (!logoBox.contains(e.target) && !actionsBox.contains(e.target)) {
      actionsBox.style.display = 'none';
    }
  });

  // Save callback — PATCH to backend + update logo preview
  const saveLogoToBackend = async (dataUrl) => {
    try {
      await fetchJson('/api/admin/sites/' + siteId, {
        method: 'PATCH',
        body: JSON.stringify({ logo_data: dataUrl }),   // empty string = clear
      });
      updateSdLogoPreview(dataUrl);
      showSavedToast(dataUrl ? '✓ บันทึกโลโก้แล้ว' : '✓ ลบโลโก้แล้ว');
    } catch (e) {
      showSavedToast('❌ ' + e.message, 'error');
    }
  };

  $('sd-logo-upload').addEventListener('click', (e) => {
    e.stopPropagation();
    actionsBox.style.display = 'none';
    fileInput.click();
  });
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => openCropModal(ev.target.result, saveLogoToBackend);
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  $('sd-logo-search').addEventListener('click', (e) => {
    e.stopPropagation();
    actionsBox.style.display = 'none';
    const pattern = (_currentSite && _currentSite.url_pattern) || '';
    if (!pattern) { alert('ใส่ URL pattern ก่อน'); return; }
    openLogoSearchModal(pattern, saveLogoToBackend);
  });

  $('sd-logo-remove').addEventListener('click', (e) => {
    e.stopPropagation();
    actionsBox.style.display = 'none';
    if (!confirm('ลบโลโก้ของเว็บนี้?')) return;
    saveLogoToBackend('');
  });
}

// === Toast helper for inline-edit feedback ===
let _savedToastTimer = null;
function showSavedToast(message, kind) {
  // kind: undefined (success/green) | 'warning' (orange) | 'error' (red)
  let toast = document.getElementById('saved-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'saved-toast';
    toast.style.cssText = `
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
      padding: 10px 18px; border-radius: 999px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      background: var(--ok); color: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
      z-index: 1200;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none;
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.style.background = kind === 'error' ? 'var(--critical)'
                          : kind === 'warning' ? 'var(--warning)' : 'var(--ok)';
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  if (_savedToastTimer) clearTimeout(_savedToastTimer);
  _savedToastTimer = setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(20px)';
  }, 1800);
}

// แสดงสรุปข้อมูลการเงินของ credential แบบ chip ใต้แถว credential
// (เฉพาะข้อมูลที่กรอกแล้ว — ไม่กรอก = ไม่โชว์)
function credBillingSummary(c) {
  const chips = [];
  // รอบบิล + cost
  if (c.billing_cycle === 'monthly') {
    const renewTxt = c.renew_day ? ` วันที่ ${c.renew_day}` : '';
    chips.push(`<span class="cred-chip">📅 รายเดือน${renewTxt}</span>`);
  } else if (c.billing_cycle === 'yearly') {
    chips.push(`<span class="cred-chip">🗓️ รายปี</span>`);
  } else if (c.renew_day) {
    chips.push(`<span class="cred-chip">📅 Renew วันที่ ${c.renew_day}</span>`);
  }
  if (c.cost_amount != null) {
    const cur = c.cost_currency || 'THB';
    const formatted = new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(c.cost_amount);
    chips.push(`<span class="cred-chip">💵 ${formatted} ${escapeHtml(cur)}</span>`);
  }
  if (c.payment_type) {
    chips.push(`<span class="cred-chip">💳 ${escapeHtml(fmtPaymentTypeTh(c.payment_type))}</span>`);
  }
  if (c.card_owner_name) {
    chips.push(`<span class="cred-chip">👤 ${escapeHtml(c.card_owner_name)}</span>`);
  }
  if (c.start_date || c.end_date) {
    const fmt = (d) => d ? new Date(d).toLocaleDateString('th-TH', { year: '2-digit', month: 'short', day: 'numeric' }) : '?';
    const range = `${fmt(c.start_date)} → ${c.end_date ? fmt(c.end_date) : 'ต่อเนื่อง'}`;
    chips.push(`<span class="cred-chip">⏱ ${escapeHtml(range)}</span>`);
  }
  if (c.cancelled) {
    const at = c.cancelled_at ? new Date(c.cancelled_at).toLocaleDateString('th-TH') : '';
    chips.push(`<span class="cred-chip cred-chip-cancelled">⛔ ยกเลิก${at ? ' ' + escapeHtml(at) : ''}</span>`);
  }
  if (c.usage_reason) {
    chips.push(`<span class="cred-chip" title="${escapeHtml(c.usage_reason)}">📝 ${escapeHtml(c.usage_reason.slice(0, 40))}${c.usage_reason.length > 40 ? '…' : ''}</span>`);
  }
  if (chips.length === 0) return '';
  return `<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);display:flex;gap:6px;flex-wrap:wrap">${chips.join('')}</div>`;
}

async function loadSite(siteId) {
  const { site, credentials } = await fetchJson('/api/admin/sites/' + siteId);
  _currentSite = site;
  // populate inline-editable fields
  const nameEl = $('sd-name');
  const urlEl = $('sd-url');
  if (nameEl) {
    nameEl.textContent = site.name;
    nameEl.dataset.original = site.name;
  }
  if (urlEl) {
    urlEl.textContent = site.url_pattern;
    urlEl.dataset.original = site.url_pattern;
  }
  // populate logo preview
  updateSdLogoPreview(site.logo_data || '');

  const list = $('creds-list');
  if (credentials.length === 0) {
    list.innerHTML = '<div class="empty">ยังไม่มี credential — กด <strong>+ เพิ่ม Credential</strong> ด้านบน</div>';
    return;
  }
  list.innerHTML = credentials.map(c => `
    <div class="cred-row" data-id="${c.id}" style="flex-direction:column;align-items:stretch">
      <div style="display:grid;grid-template-columns:1fr 1.4fr 1.4fr auto;gap:14px;align-items:center;width:100%">
        <div class="col-label">${escapeHtml(c.label || '(ไม่มีชื่อ)')}</div>
        <div>
          <span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.04em">user</span>
          <div style="margin-top:2px">
            ${escapeHtml(c.username)}
            <button class="copy-btn" data-copy="${escapeHtml(c.username)}" title="คัดลอก">📋</button>
          </div>
        </div>
        <div class="col-pw">
          <span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.04em">password</span>
          <div style="margin-top:2px">
            <span class="pw-mask" data-pw="${escapeHtml(c.password)}" data-shown="false">••••••••</span>
            <button class="copy-btn pw-toggle" data-id="${c.id}" title="show/hide">👁</button>
            <button class="copy-btn" data-copy="${escapeHtml(c.password)}" title="คัดลอก">📋</button>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn" data-edit="${c.id}" style="font-size:12px;padding:5px 10px">✏️ แก้ไข</button>
          <button class="btn danger" data-del="${c.id}">ลบ</button>
        </div>
      </div>
      ${credBillingSummary(c)}
    </div>
  `).join('');

  list.querySelectorAll('.copy-btn[data-copy]').forEach(b => {
    b.addEventListener('click', () => {
      navigator.clipboard.writeText(b.dataset.copy);
      const orig = b.textContent; b.textContent = '✓';
      setTimeout(() => { b.textContent = orig; }, 800);
    });
  });
  list.querySelectorAll('.pw-toggle').forEach(b => {
    b.addEventListener('click', () => {
      const span = b.parentElement.querySelector('.pw-mask');
      const shown = span.dataset.shown === 'true';
      if (shown) {
        span.textContent = '••••••••';
        span.classList.remove('pw-show'); span.classList.add('pw-mask');
        span.dataset.shown = 'false';
      } else {
        span.textContent = span.dataset.pw;
        span.classList.add('pw-show'); span.classList.remove('pw-mask');
        span.dataset.shown = 'true';
      }
    });
  });
  list.querySelectorAll('button[data-del]').forEach(b => {
    b.addEventListener('click', async () => {
      if (!confirm('ลบ credential นี้?')) return;
      await fetchJson('/api/admin/credentials/' + b.dataset.del, { method: 'DELETE' });
      await loadSite(siteId);
    });
  });
  list.querySelectorAll('button[data-edit]').forEach(b => {
    b.addEventListener('click', () => {
      const cid = parseInt(b.dataset.edit, 10);
      const cred = credentials.find(x => x.id === cid);
      if (cred) showEditCredModal(cred, siteId);
    });
  });
}

// === Credential access controls — load/render in modal ===
let _credAccessState = { team_ids: [], member_ids: [], auto_team_ids: [] };

async function loadCredAccessIntoModal(credId) {
  const loadingEl = document.getElementById('m-access-loading');
  const contentEl = document.getElementById('m-access-content');
  if (!loadingEl || !contentEl) return;

  if (!credId) {
    // ADD mode — แสดง message แต่ไม่โหลด
    loadingEl.innerHTML = '💡 บันทึก credential ก่อน แล้ว <strong>กดแก้ไข</strong> เพื่อตั้ง access';
    return;
  }

  try {
    const [accessData, teamsData, membersData] = await Promise.all([
      fetchJson(`/api/admin/credentials/${credId}/access`),
      fetchJson('/api/admin/teams'),
      fetchJson('/api/admin/members'),
    ]);

    const grantedTeamIds = new Set(accessData.teams.map(t => t.id));
    const autoTeamIds = new Set(accessData.auto_teams.map(t => t.id));
    const grantedMemberIds = new Set(accessData.members.map(m => m.id));

    _credAccessState.team_ids = Array.from(grantedTeamIds);
    _credAccessState.member_ids = Array.from(grantedMemberIds);
    _credAccessState.auto_team_ids = Array.from(autoTeamIds);

    // === Render TEAMS rows (full width, big & clear) ===
    const teamsList = teamsData.teams || [];
    document.getElementById('m-access-teams-count').textContent =
      teamsList.length === 0 ? '' : `(${teamsList.length} ทีม)`;
    const teamsHtml = teamsList.length === 0
      ? '<div class="empty" style="padding:18px;font-size:13px;background:var(--bg-soft);border-radius:8px">ยังไม่มี team — สร้างที่ <a href="#/teams" style="color:var(--primary)">หน้า Teams</a></div>'
      : teamsList.map(t => {
          const isAuto = autoTeamIds.has(t.id);
          const isChecked = grantedTeamIds.has(t.id);
          const isOn = isChecked || isAuto;
          const tooltip = isAuto ? 'ทีมนี้มี access_type=all สำหรับ site → เห็นทุก credential อัตโนมัติ' : '';
          const tInitial = (t.name || '?').trim().charAt(0).toUpperCase();
          return `
            <label class="m-access-row ${isOn ? 'm-access-on' : ''}"
                   ${tooltip ? `title="${escapeHtml(tooltip)}"` : ''}>
              <input type="checkbox" class="m-team-cb m-access-cb" value="${t.id}"
                     ${isOn ? 'checked' : ''}
                     ${isAuto ? 'disabled' : ''}>
              <div class="m-access-avatar" style="background:linear-gradient(135deg,#7c3aed,#2563eb)">${escapeHtml(tInitial)}</div>
              <div class="m-access-text">
                <div class="m-access-name">${escapeHtml(t.name)}${isAuto ? ' <span style="margin-left:6px;display:inline-block;padding:1px 7px;border-radius:6px;font-size:10.5px;font-weight:600;background:rgba(16,185,129,.12);color:var(--green)">🟢 auto (all)</span>' : ''}</div>
                <div class="m-access-sub">${t.member_count} member · ${t.site_count} site${t.description ? ' · ' + escapeHtml(t.description) : ''}</div>
              </div>
            </label>
          `;
        }).join('');
    document.getElementById('m-access-teams').innerHTML = teamsHtml;

    // === Render MEMBERS rows ===
    const membersList = membersData.members || [];
    document.getElementById('m-access-members-count').textContent =
      membersList.length === 0 ? '' : `(${membersList.length} คน)`;
    const renderMember = (m) => {
      const isChecked = grantedMemberIds.has(m.id);
      const display = m.display_name || m.email || m.phone || '?';
      const initial = display.trim().charAt(0).toUpperCase();
      const subParts = [];
      if (m.email) subParts.push(m.email);
      if (m.phone && m.phone !== display) subParts.push(m.phone);
      const sub = subParts.join(' · ') || '—';
      const searchKey = (display + ' ' + (m.email || '') + ' ' + (m.phone || '')).toLowerCase();
      return `
        <label class="m-access-row ${isChecked ? 'm-access-on' : ''}" data-search="${escapeHtml(searchKey)}">
          <input type="checkbox" class="m-member-cb m-access-cb" value="${m.id}" ${isChecked ? 'checked' : ''}>
          <div class="m-access-avatar" style="background:linear-gradient(135deg,#2563eb,#7c3aed)">${escapeHtml(initial)}</div>
          <div class="m-access-text">
            <div class="m-access-name">${escapeHtml(display)}</div>
            <div class="m-access-sub">${escapeHtml(sub)}</div>
          </div>
        </label>
      `;
    };
    const membersHtml = membersList.length === 0
      ? '<div class="empty" style="padding:18px;font-size:13px;background:var(--bg-soft);border-radius:8px">ยังไม่มี member ในระบบ</div>'
      : membersList.map(renderMember).join('');
    document.getElementById('m-access-members').innerHTML = membersHtml;

    // Wire visual toggle for checkboxes
    document.querySelectorAll('.m-team-cb, .m-member-cb').forEach(cb => {
      cb.addEventListener('change', () => {
        const lbl = cb.closest('label');
        if (lbl) lbl.classList.toggle('m-access-on', cb.checked);
      });
    });

    // Wire member search filter
    const searchInput = document.getElementById('m-access-member-search');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase().trim();
        document.querySelectorAll('#m-access-members .m-access-row').forEach(row => {
          const key = row.dataset.search || '';
          row.style.display = (!q || key.includes(q)) ? '' : 'none';
        });
      });
    }

    loadingEl.style.display = 'none';
    contentEl.style.display = '';
  } catch (e) {
    loadingEl.innerHTML = `<span style="color:var(--critical)">⚠ โหลด access ไม่สำเร็จ: ${escapeHtml(e.message)}</span>`;
  }
}

function credAccessCollect() {
  // เก็บค่า — เฉพาะ checkbox ที่ user เปลี่ยนได้ (ไม่รวม disabled ของ auto-team)
  const team_ids = Array.from(document.querySelectorAll('.m-team-cb:not(:disabled):checked'))
    .map(cb => parseInt(cb.value, 10));
  const member_ids = Array.from(document.querySelectorAll('.m-member-cb:checked'))
    .map(cb => parseInt(cb.value, 10));
  return { team_ids, member_ids };
}

async function saveCredAccess(credId) {
  const access = credAccessCollect();
  await fetchJson(`/api/admin/credentials/${credId}/access`, {
    method: 'PUT',
    body: JSON.stringify(access),
  });
}

function showEditCredModal(cred, siteId) {
  showModal({
    title: 'แก้ไข Credential',
    size: 'wide',
    body: credFormHTML(cred),
    onSubmit: async () => {
      const data = credFormCollect();
      if (!data.username || !data.password) throw new Error('กรอก username และ password');
      // 1. PATCH credential fields
      await fetchJson('/api/admin/credentials/' + cred.id, {
        method: 'PATCH',
        body: JSON.stringify(data),
      });
      // 2. PUT access (ทีม + บุคคล)
      try { await saveCredAccess(cred.id); } catch (e) {
        console.warn('saveCredAccess failed:', e);
      }
      _cardOwnersCache = null;
      await loadSite(siteId);
    },
  });
  setTimeout(async () => {
    await bindCredFormDynamic();
    await loadCredAccessIntoModal(cred.id);
  }, 0);
}

/**
 * แปลง URL pattern (เช่น *.freepik.com/*) → URL ที่กดเข้าได้จริง
 *  - ตัด protocol ออกก่อน, แทน '*.' ด้วย 'www.', ตัด '/* ' ท้าย
 *  - แล้วใส่ https:// กลับเข้าไป
 */
function patternToUrl(pattern) {
  if (!pattern) return '';
  let url = String(pattern).replace(/^https?:\/\//i, '');
  url = url.replace(/^\*\./, 'www.');     // *.freepik.com → www.freepik.com
  url = url.replace(/\/\*$|\*$/, '/');    // /* หรือ * ท้าย → /
  url = url.replace(/\*/g, '');           // ลบ wildcard ที่เหลือ (ถ้ามี)
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  return url;
}

function sortPlatforms(list, mode) {
  const arr = list.slice();
  if (mode === 'az') {
    arr.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'th'));
  } else if (mode === 'mine') {
    // มากสุดก่อน — เท่ากันเรียง global, แล้วชื่อ
    arr.sort((a, b) =>
      (b.my_clicks - a.my_clicks) ||
      (b.global_clicks - a.global_clicks) ||
      (a.name || '').localeCompare(b.name || '', 'th')
    );
  } else {  // 'global'
    arr.sort((a, b) =>
      (b.global_clicks - a.global_clicks) ||
      (a.name || '').localeCompare(b.name || '', 'th')
    );
  }
  return arr;
}

function renderPlatformCard(s, opts) {
  // opts: {disabled?: bool, requestPending?: bool, teamUses?: bool, teamName?: string}
  opts = opts || {};
  const url = patternToUrl(s.url_pattern);
  const initial = (s.name || '?').trim().charAt(0).toUpperCase();
  const displayUrl = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
  const searchKey = (s.name + ' ' + s.url_pattern).toLowerCase();

  const credLabel = s.cred_count > 0
    ? `${s.cred_count} บัญชี`
    : '<span style="color:var(--warning);">ยังไม่มีบัญชี</span>';

  // Click stats badges
  const stats = [];
  if (s.my_clicks > 0) stats.push(`<span style="color:var(--primary);font-weight:600">🔥 ${s.my_clicks} ของฉัน</span>`);
  if (s.global_clicks > 0) stats.push(`<span style="color:var(--text-muted)">🌐 ${s.global_clicks}</span>`);

  const avatarStyle = opts.disabled
    ? 'filter:grayscale(0.85);opacity:.55'
    : '';
  const avatar = s.logo_data
    ? `<div class="platform-avatar" style="background:#fff;padding:5px;overflow:hidden;${avatarStyle}"><img src="${s.logo_data}" alt="${escapeHtml(s.name)}" style="width:100%;height:100%;object-fit:contain;border-radius:7px" /></div>`
    : `<div class="platform-avatar" style="${avatarStyle}">${escapeHtml(initial)}</div>`;

  // Spotlight team badge — มุมขวาบน
  const teamBadge = opts.teamUses
    ? `<div class="p-team-badge" title="${escapeHtml(opts.teamName || '')} ใช้ platform นี้">🏷 ${escapeHtml(opts.teamName || '')}</div>`
    : '';

  const dataAttrs = `data-search="${escapeHtml(searchKey)}" data-team-uses="${opts.teamUses ? '1' : '0'}"`;
  const titleAttr = `title="${escapeHtml(s.name + ' · ' + displayUrl)}"`;

  if (opts.disabled) {
    // No-access card — compact layout
    const requestBtn = opts.requestPending
      ? `<button class="btn" disabled style="font-size:10.5px;padding:3px 8px;background:var(--bg-soft);color:var(--text-muted);cursor:not-allowed;flex-shrink:0" title="รออนุมัติ">⏳ รออนุมัติ</button>`
      : `<button class="btn primary" data-req-id="${s.id}" data-req-name="${escapeHtml(s.name)}" style="font-size:10.5px;padding:3px 8px;flex-shrink:0">🙏 ขอสิทธิ์</button>`;
    return `
      <div class="platform-card platform-card-disabled" ${dataAttrs} ${titleAttr}
           style="background:var(--bg-soft);border:1px dashed var(--border);cursor:default;text-decoration:none;position:relative">
        ${teamBadge}
        ${avatar}
        <div class="platform-card-info">
          <div class="platform-name" style="color:var(--text-muted)">${escapeHtml(s.name)}</div>
          <div class="platform-url">${escapeHtml(displayUrl)}</div>
          <div class="platform-meta" style="color:var(--text-soft)">
            <span>${stats.length ? stats.join(' · ') : credLabel}</span>
            ${requestBtn}
          </div>
        </div>
      </div>
    `;
  }

  // Accessible card — compact layout
  return `
    <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="platform-card" ${dataAttrs} ${titleAttr} style="position:relative">
      ${teamBadge}
      ${avatar}
      <div class="platform-card-info">
        <div class="platform-name">${escapeHtml(s.name)}</div>
        <div class="platform-url">${escapeHtml(displayUrl)}</div>
        <div class="platform-meta">
          <span>${stats.length ? stats.join(' · ') : credLabel}</span>
          <span class="open">→</span>
        </div>
      </div>
    </a>
  `;
}

function renderPlatformsList() {
  if (!_platformsData) return;

  // === Spotlight: คำนวณว่า site ไหน team ใช้บ้าง ===
  let spotlightTeam = null;
  let spotlightSiteIds = new Set();
  if (_spotlightTeamId && _teamsOverview) {
    spotlightTeam = _teamsOverview.find(t => t.id === _spotlightTeamId);
    if (spotlightTeam) spotlightSiteIds = new Set(spotlightTeam.site_ids || []);
  }

  // Sort: ถ้า spotlight on → team ใช้ก่อน, ภายในนั้นค่อย sort ตาม mode
  const sortBySpotlight = (list) => {
    if (!spotlightTeam) return sortPlatforms(list, _platformSort);
    const inTeam = sortPlatforms(list.filter(s => spotlightSiteIds.has(s.id)), _platformSort);
    const others = sortPlatforms(list.filter(s => !spotlightSiteIds.has(s.id)), _platformSort);
    return [...inTeam, ...others];
  };
  const accessible = sortBySpotlight(_platformsData.accessible || []);
  const noAccess = sortBySpotlight(_platformsData.no_access || []);

  // Apply spotlight class to root + show legend
  const listEl = $('p-list');
  if (listEl) listEl.classList.toggle('spotlight-on', !!spotlightTeam);
  const legendEl = $('p-spotlight-legend');
  if (legendEl) {
    if (spotlightTeam) {
      legendEl.style.display = '';
      $('p-spotlight-team-name').textContent = `🏷 ${spotlightTeam.name}`;
    } else {
      legendEl.style.display = 'none';
    }
  }

  const cardOpts = (s, baseOpts) => ({
    ...baseOpts,
    teamUses: spotlightSiteIds.has(s.id),
    teamName: spotlightTeam ? spotlightTeam.name : '',
  });

  const totalCount = accessible.length + noAccess.length;
  // count spotlight breakdown
  let cnt = `${accessible.length} เข้าถึงได้${noAccess.length > 0 ? ` · ${noAccess.length} ต้องขอ` : ''}`;
  if (spotlightTeam) {
    const teamUseAccessible = accessible.filter(s => spotlightSiteIds.has(s.id)).length;
    const teamUseNoAccess = noAccess.filter(s => spotlightSiteIds.has(s.id)).length;
    cnt += ` · 🔦 ${teamUseAccessible}+${teamUseNoAccess} (ทีมใช้)`;
  }
  $('p-count').textContent = cnt;

  let html = '';
  if (accessible.length > 0) {
    html += `<div class="platform-grid" id="p-grid-yes">`;
    html += accessible.map(s => renderPlatformCard(s, cardOpts(s, { disabled: false }))).join('');
    html += `</div>`;
  } else if (totalCount > 0) {
    html += `<div class="empty" style="margin-bottom:16px">คุณยังไม่ได้รับสิทธิ์เข้าถึง platform ใด — กดขอสิทธิ์ที่ section ด้านล่าง</div>`;
  }

  if (noAccess.length > 0) {
    html += `
      <div style="margin-top:28px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
        <h3 style="margin:0;font-size:14px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em">🔒 Platforms ที่ยังไม่มีสิทธิ์</h3>
        <span style="font-size:12px;color:var(--text-muted)">— กด "🙏 ขอสิทธิ์" → admin จะได้รับแจ้ง</span>
      </div>
      <div class="platform-grid" id="p-grid-no">
        ${noAccess.map(s => renderPlatformCard(s, cardOpts(s, { disabled: true, requestPending: s.request_pending }))).join('')}
      </div>
    `;
  }

  if (totalCount === 0) {
    html = `<div class="empty">ยังไม่มีแพลตฟอร์มในระบบ${currentRole === 'admin' ? ' — เพิ่มได้ที่ <strong>🛠 Config</strong>' : ''}</div>`;
  }

  html += `<div id="p-no-results" class="empty" style="display:none;margin-top:14px">ไม่เจอ platform ที่ตรงกับคำค้น</div>`;
  $('p-list').innerHTML = html;

  // Wire request buttons
  document.querySelectorAll('button[data-req-id]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const siteId = parseInt(btn.dataset.reqId, 10);
      const name = btn.dataset.reqName;
      const note = prompt(`ขอสิทธิ์เข้าถึง "${name}"?\n\nเหตุผล (ไม่บังคับ — admin จะเห็น):`, '');
      if (note === null) return;   // cancelled
      btn.disabled = true;
      btn.textContent = '⏳ กำลังส่ง...';
      try {
        await fetchJson('/api/access-requests', {
          method: 'POST',
          body: JSON.stringify({ site_id: siteId, note: note.trim() || null }),
        });
        btn.textContent = '⏳ รออนุมัติ';
        btn.style.background = 'var(--bg-soft)';
        btn.style.color = 'var(--text-muted)';
        btn.title = 'admin ได้รับแจ้งแล้ว — รอตอบกลับ';
        showSavedToast('✓ ส่งคำขอแล้ว — admin จะตรวจสอบ');
      } catch (err) {
        btn.disabled = false;
        btn.textContent = '🙏 ขอสิทธิ์';
        showSavedToast('❌ ' + err.message, 'error');
      }
    });
  });

  applyPlatformFilter();
}

function applyPlatformFilter() {
  const searchInput = $('p-search');
  if (!searchInput) return;
  const q = searchInput.value.toLowerCase().trim();
  $('p-search-clear').style.display = q ? '' : 'none';
  let shown = 0;
  document.querySelectorAll('.platform-card').forEach(card => {
    const key = card.dataset.search || '';
    const match = !q || key.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  const noResults = $('p-no-results');
  if (noResults) noResults.style.display = (q && shown === 0) ? '' : 'none';
}
