<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FEFL Beat · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f6f9ff;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-hover: #f1f5fd;
      --border: #e3eaf5;
      --border-strong: #c8d4ec;
      --text: #0f172a;
      --text-muted: #5b6b85;
      --text-soft: #8895ab;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #dbeafe;
      --accent: #7c3aed;
      --green: #10b981;
      --warning: #f59e0b;
      --critical: #dc2626;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05);
      --shadow-md: 0 4px 16px rgba(37, 99, 235, .08);
      --shadow-lg: 0 12px 40px rgba(37, 99, 235, .12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg-soft);
      color: var(--text);
      display: flex; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Sidebar */
    aside {
      width: 240px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 22px 0;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-sm);
    }
    .brand {
      padding: 0 18px 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .brand-row {
      display: flex; align-items: center; gap: 10px; position: relative;
    }
    .brand a.logo {
      display: inline-block;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .brand a.logo:hover { text-decoration: none; }
    .brand a.logo strong { color: var(--primary); font-weight: 700; }
    .brand .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 6px; padding-left: 4px; }

    /* Hamburger + sister-sites menu */
    .hamburger-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 34px; height: 34px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted);
      transition: all .12s; padding: 0;
    }
    .hamburger-btn:hover {
      background: var(--bg-soft); color: var(--primary);
      border-color: var(--border-strong);
    }
    .brand-menu {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, .15);
      min-width: 280px;
      padding: 6px;
      z-index: 200;
    }
    .brand-menu-head {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); font-weight: 600;
      padding: 10px 12px 6px;
    }
    .brand-menu-item {
      display: block; padding: 10px 12px;
      border-radius: 8px; text-decoration: none;
      color: var(--text); transition: background .1s;
    }
    .brand-menu-item:hover { background: var(--bg-soft); text-decoration: none; }
    .brand-menu-item .name { display: block; font-size: 14px; font-weight: 600; }
    .brand-menu-item .name strong { color: var(--primary); font-weight: 700; }
    .brand-menu-item .desc { display: block; font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
    .brand-menu-item.current { background: var(--bg-soft); }
    .brand-menu-item.current .name::after {
      content: '· ปัจจุบัน';
      color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 6px;
    }

    .nav { flex: 1; padding: 0 12px; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 13px;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 3px;
      transition: all .12s;
    }
    .nav a:hover { background: var(--bg-hover); color: var(--text); text-decoration: none; }
    .nav a.active {
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .sidebar-footer button {
      background: transparent; border: none; color: var(--text-muted);
      padding: 0; cursor: pointer; font-family: inherit; font-size: 12px;
      margin-top: 8px;
    }
    .sidebar-footer button:hover { color: var(--critical); }

    /* Main */
    main { flex: 1; padding: 32px 36px; overflow-y: auto; }
    main.no-pad { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
    main.no-pad iframe { flex: 1; width: 100%; border: 0; background: var(--bg); }

    .page-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
    }
    h2.page-title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .crumb { color: var(--text-muted); font-size: 13px; margin-bottom: 8px; }
    .crumb a { color: var(--text-muted); }

    button.btn, .btn {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .12s;
    }
    button.btn:hover {
      background: var(--bg-hover); border-color: var(--border-strong);
    }
    button.btn.primary {
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-md);
    }
    button.btn.primary:hover {
      background: linear-gradient(135deg, #1d4ed8 0%, #4338ca 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(37, 99, 235, .3);
    }
    button.btn.danger {
      background: transparent; color: var(--critical);
      border-color: rgba(220, 38, 38, .25);
    }
    button.btn.danger:hover { background: rgba(220, 38, 38, .06); border-color: var(--critical); }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
      transition: all .15s;
      box-shadow: var(--shadow-sm);
    }
    .card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
    .card-clickable { cursor: pointer; }
    .card-clickable:hover { border-color: var(--primary); }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-sub { color: var(--text-muted); font-size: 12.5px; margin-top: 3px; }
    .card-sub code {
      background: var(--bg-soft);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    .empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, .35);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px;
      width: 440px;
      max-width: 92vw;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .25);
    }
    .modal h3 { margin: 0 0 14px; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-top: 18px;
    }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%;
      background: var(--bg-input); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-size: 13px; font-family: inherit;
      transition: border .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    .hint { color: var(--text-muted); font-size: 11.5px; margin-top: 4px; line-height: 1.5; }
    .hint code {
      background: var(--bg-soft); padding: 1px 5px; border-radius: 4px; font-size: 11px;
    }

    /* Credentials list */
    .cred-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 14px;
      align-items: center;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
    }
    .cred-row:hover { border-color: var(--border-strong); }
    .cred-row .col-label { font-weight: 600; }
    .cred-row .col-pw { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .pw-mask { color: var(--text-muted); }
    .pw-show { color: var(--text); user-select: all; }
    .copy-btn {
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 13px; padding: 3px 5px;
      border-radius: 4px;
    }
    .copy-btn:hover { color: var(--primary); background: var(--bg-hover); }

    .warning-box {
      background: linear-gradient(135deg, rgba(245, 158, 11, .06), rgba(245, 158, 11, .12));
      border: 1px solid rgba(245, 158, 11, .35);
      color: #92400e;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .warning-box code {
      background: rgba(146, 64, 14, .12); padding: 1px 5px; border-radius: 4px;
    }

    /* Code/key display block */
    .key-block {
      display: flex; gap: 8px; align-items: center;
      font-family: ui-monospace, Menlo, monospace; font-size: 13px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      padding: 13px 14px;
      border-radius: 10px;
    }
    .key-block .val {
      flex: 1; word-break: break-all; user-select: all; color: var(--text);
    }
  </style>
</head>
<body>
  <aside>
    <div class="brand">
      <div class="brand-row">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="สลับเว็บในเครือ">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="brand-menu" id="brandMenu" hidden>
          <div class="brand-menu-head">เว็บในเครือ</div>
          <a href="https://2026beat-production.up.railway.app" class="brand-menu-item" target="_top" data-host="2026beat-production.up.railway.app">
            <span class="name">FEFL<strong>Beat</strong></span>
            <span class="desc">AI Solution Hub for Marketing</span>
          </a>
          <a href="https://web-production-8eb90.up.railway.app" class="brand-menu-item" target="_top" data-host="web-production-8eb90.up.railway.app">
            <span class="name">Prompt<strong>Gallery</strong></span>
            <span class="desc">AI Image Prompt Knowledge Base</span>
          </a>
        </div>
        <a href="/" class="logo">FEFL<strong>Beat</strong></a>
      </div>
      <div class="sub">Admin Console</div>
    </div>
    <nav class="nav">
      <a href="#/dashboard" data-route="dashboard">📊 Dashboard</a>
      <a href="#/sites" data-route="sites">🌐 Website</a>
      <a href="#/extension" data-route="extension">🧩 Extension</a>
      <a href="#/security" data-route="security">🔑 API Key</a>
      <a href="#/account" data-route="account">👤 บัญชีของฉัน</a>
      <a href="/" target="_blank">🏠 หน้าแรก ↗</a>
    </nav>
    <div class="sidebar-footer">
      <div id="who">—</div>
      <button id="logout-btn">ออกจากระบบ</button>
    </div>
  </aside>

  <main id="main"></main>

<script>
const $ = id => document.getElementById(id);
const API = '';

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function fetchJson(path, opts = {}) {
  const res = await fetch(API + path, {
    credentials: 'same-origin',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    ...opts,
  });
  if (res.status === 401) {
    location.replace('/admin/login');
    throw new Error('unauthorized');
  }
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    throw new Error(j.detail || ('HTTP ' + res.status));
  }
  return res.json();
}

// ---------- routing ----------
const routes = {
  'dashboard': renderDashboardEmbed,
  'sites':     renderSitesList,
  'extension': renderExtensionPage,
  'security':  renderSecurityPage,
  'account':   renderAccountPage,
};

function setActive(route) {
  document.querySelectorAll('.nav a[data-route]').forEach(a => {
    a.classList.toggle('active', a.dataset.route === route);
  });
}
function resetMainPadding() { $('main').classList.remove('no-pad'); }

async function navigate() {
  const hash = location.hash.replace(/^#\/?/, '') || 'dashboard';
  const parts = hash.split('/');
  const route = parts[0];

  resetMainPadding();
  if (route === 'sites' && parts[1]) {
    setActive('sites');
    await renderSiteDetail(parseInt(parts[1], 10));
  } else if (routes[route]) {
    setActive(route);
    await routes[route]();
  } else {
    location.hash = '#/dashboard';
  }
}

window.addEventListener('hashchange', navigate);

function renderDashboardEmbed() {
  const m = $('main');
  m.classList.add('no-pad');
  m.innerHTML = `<iframe src="/dashboard" title="FEFL Beat Dashboard"></iframe>`;
}

// ---------- pages ----------
async function renderSitesList() {
  $('main').innerHTML = `
    <div class="page-head">
      <h2 class="page-title">🌐 Websites</h2>
      <button class="btn primary" id="add-site-btn">+ เพิ่มเว็บใหม่</button>
    </div>
    <div id="sites-list"></div>
  `;
  $('add-site-btn').addEventListener('click', showAddSiteModal);
  await loadSites();
}

async function loadSites() {
  const list = $('sites-list');
  list.innerHTML = '<div class="empty">กำลังโหลด…</div>';
  const { sites } = await fetchJson('/api/admin/sites');
  if (sites.length === 0) {
    list.innerHTML = '<div class="empty">ยังไม่มีเว็บ — กด <strong>+ เพิ่มเว็บใหม่</strong> ด้านบน</div>';
    return;
  }
  list.innerHTML = sites.map(s => `
    <div class="card card-clickable" data-id="${s.id}">
      <div>
        <div class="card-title">${escapeHtml(s.name)}</div>
        <div class="card-sub">URL pattern: <code>${escapeHtml(s.url_pattern)}</code> · ${s.cred_count} credentials</div>
      </div>
      <div style="color:var(--text-muted)">→</div>
    </div>
  `).join('');
  list.querySelectorAll('.card[data-id]').forEach(card => {
    card.addEventListener('click', () => {
      location.hash = '#/sites/' + card.dataset.id;
    });
  });
}

function showAddSiteModal() {
  showModal({
    title: 'เพิ่มเว็บใหม่',
    body: `
      <div class="field">
        <label>ชื่อเว็บ</label>
        <input id="m-name" type="text" placeholder="เช่น Behance, Adobe Stock" />
      </div>
      <div class="field">
        <label>URL pattern (ใช้ * เป็น wildcard)</label>
        <input id="m-pattern" type="text" placeholder="*.example.com/*" />
        <div class="hint">เช่น <code>*.freepik.com/*</code> หรือ <code>app.example.com/login</code></div>
      </div>
    `,
    onSubmit: async () => {
      const name = $('m-name').value.trim();
      const url_pattern = $('m-pattern').value.trim();
      if (!name || !url_pattern) throw new Error('กรอกชื่อและ URL pattern');
      await fetchJson('/api/admin/sites', {
        method: 'POST',
        body: JSON.stringify({ name, url_pattern }),
      });
      await loadSites();
    },
  });
}

async function renderSiteDetail(siteId) {
  $('main').innerHTML = `
    <div class="crumb"><a href="#/sites">← Websites</a></div>
    <div class="page-head">
      <h2 class="page-title" id="site-name">…</h2>
      <div style="display:flex;gap:8px">
        <button class="btn primary" id="add-cred-btn">+ เพิ่ม Credential</button>
        <button class="btn danger" id="delete-site-btn">ลบเว็บนี้</button>
      </div>
    </div>
    <div class="warning-box">
      ⚠️ <strong>หมายเหตุ:</strong> Password ถูกเก็บแบบ plaintext ใน SQLite (จำเป็นเพื่อ prefill) —
      ใครเข้าถึงไฟล์ <code>freepik_tracker.db</code> ในเครื่องนี้ก็เห็นได้ทั้งหมด
    </div>
    <div id="site-meta"></div>
    <h3 style="margin-top:22px;font-size:14px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em">Credentials</h3>
    <div id="creds-list"></div>
  `;
  await loadSite(siteId);

  $('add-cred-btn').addEventListener('click', () => showAddCredModal(siteId));
  $('delete-site-btn').addEventListener('click', async () => {
    if (!confirm('ลบเว็บนี้และ credentials ทั้งหมด?')) return;
    await fetchJson('/api/admin/sites/' + siteId, { method: 'DELETE' });
    location.hash = '#/sites';
  });
}

async function loadSite(siteId) {
  const { site, credentials } = await fetchJson('/api/admin/sites/' + siteId);
  $('site-name').textContent = site.name;
  $('site-meta').innerHTML = `
    <div class="card">
      <div>
        <div class="card-sub">URL pattern</div>
        <div class="card-title"><code>${escapeHtml(site.url_pattern)}</code></div>
      </div>
    </div>
  `;

  const list = $('creds-list');
  if (credentials.length === 0) {
    list.innerHTML = '<div class="empty">ยังไม่มี credential — กด <strong>+ เพิ่ม Credential</strong> ด้านบน</div>';
    return;
  }
  list.innerHTML = credentials.map(c => `
    <div class="cred-row" data-id="${c.id}">
      <div class="col-label">${escapeHtml(c.label || '(ไม่มีชื่อ)')}</div>
      <div>
        <span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.04em">user</span>
        <div style="margin-top:2px">
          ${escapeHtml(c.username)}
          <button class="copy-btn" data-copy="${escapeHtml(c.username)}" title="คัดลอก">📋</button>
        </div>
      </div>
      <div class="col-pw">
        <span style="color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.04em">password</span>
        <div style="margin-top:2px">
          <span class="pw-mask" data-pw="${escapeHtml(c.password)}" data-shown="false">••••••••</span>
          <button class="copy-btn pw-toggle" data-id="${c.id}" title="show/hide">👁</button>
          <button class="copy-btn" data-copy="${escapeHtml(c.password)}" title="คัดลอก">📋</button>
        </div>
      </div>
      <div>
        <button class="btn danger" data-del="${c.id}">ลบ</button>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.copy-btn[data-copy]').forEach(b => {
    b.addEventListener('click', () => {
      navigator.clipboard.writeText(b.dataset.copy);
      const orig = b.textContent; b.textContent = '✓';
      setTimeout(() => { b.textContent = orig; }, 800);
    });
  });
  list.querySelectorAll('.pw-toggle').forEach(b => {
    b.addEventListener('click', () => {
      const span = b.parentElement.querySelector('.pw-mask');
      const shown = span.dataset.shown === 'true';
      if (shown) {
        span.textContent = '••••••••';
        span.classList.remove('pw-show'); span.classList.add('pw-mask');
        span.dataset.shown = 'false';
      } else {
        span.textContent = span.dataset.pw;
        span.classList.add('pw-show'); span.classList.remove('pw-mask');
        span.dataset.shown = 'true';
      }
    });
  });
  list.querySelectorAll('button[data-del]').forEach(b => {
    b.addEventListener('click', async () => {
      if (!confirm('ลบ credential นี้?')) return;
      await fetchJson('/api/admin/credentials/' + b.dataset.del, { method: 'DELETE' });
      await loadSite(siteId);
    });
  });
}

function showAddCredModal(siteId) {
  showModal({
    title: 'เพิ่ม Credential',
    body: `
      <div class="field">
        <label>ชื่อย่อ (ไม่บังคับ)</label>

      <div class="field">

    `,

async function renderAccountPage() {
  $('main').innerHTML = `
    <div class="page-head">
      <h2 class="page-title">👤 บัญชีของฉัน</h2>
    </div>
    <div class="warning-box">
      ⚠️ <strong>คำเตือน:</strong> นี่คือบัญชี <strong>super admin</strong> ที่ใช้จัดการระบบทั้งหมด
      หากเปลี่ยน username/password แล้วลืม จะ recover ไม่ได้ — ระวังเก็บไว้ดีๆ
    </div>

    <div class="card" style="display:block;margin-bottom:14px">
      <h3 style="margin:0 0 12px;font-size:15px;font-weight:600">ข้อมูลปัจจุบัน</h3>
      <div style="display:grid;grid-template-columns:120px 1fr;gap:8px 16px;font-size:13.5px">
        <div style="color:var(--text-muted)">Username</div>
        <div id="cur-username" style="font-weight:500">…</div>
      </div>
    </div>

    <div class="card" style="display:block">
      <h3 style="margin:0 0 12px;font-size:15px;font-weight:600">เปลี่ยน Username / Password</h3>
      <div class="hint" style="margin-bottom:14px;font-size:12.5px;color:var(--text-muted)">
        เว้นช่องที่ไม่ต้องการเปลี่ยนได้ (กรอกเฉพาะที่ต้องการแก้ไข)
      </div>

      <div class="field">
        <label>Username ใหม่</label>
        <input id="new-username" type="text" autocomplete="username" placeholder="เช่น admin@gmail.com" />
      </div>
      <div class="field">
        <label>Password ใหม่ (อย่างน้อย 4 ตัว)</label>
        <input id="new-password" type="password" autocomplete="new-password" placeholder="ปล่อยว่างถ้าไม่เปลี่ยน" />
      </div>
      <div class="field">
        <label>ยืนยัน Password ใหม่</label>
        <input id="confirm-password" type="password" autocomplete="new-password" />
      </div>

      <div class="hint" id="acc-msg" style="margin-bottom:10px;display:none"></div>
      <button class="btn primary" id="save-acc-btn">บันทึก</button>
    </div>
  `;

  // โหลด state ปัจจุบัน
  try {
    const s = await fetch('/api/admin/state', { credentials: 'same-origin' }).then(r => r.json());
    $('cur-username').textContent = s.username || '—';
  } catch {}

  function setMsg(text, isErr) {
    const el = $('acc-msg');
    el.textContent = text;
    el.style.display = '';
    el.style.color = isErr ? 'var(--critical)' : 'var(--green)';
  }

  $('save-acc-btn').addEventListener('click', async () => {
    const username = $('new-username').value.trim();
    const password = $('new-password').value;
    const confirm = $('confirm-password').value;

    if (!username && !password) {
      setMsg('กรอกอย่างน้อย username หรือ password ใหม่', true);
      return;
    }
    if (password && password !== confirm) {
      setMsg('Password ยืนยันไม่ตรงกัน', true);
      return;
    }
    if (password && password.length < 4) {
      setMsg('Password ต้องมีอย่างน้อย 4 ตัว', true);
      return;
    }

    const body = {};
    if (username) body.username = username;
    if (password) body.password = password;

    $('save-acc-btn').disabled = true;
    try {
      const res = await fetchJson('/api/admin/credentials', {
        method: 'PATCH',
        body: JSON.stringify(body),
      });
      setMsg('บันทึกสำเร็จ — username ใหม่: ' + res.username, false);
      $('cur-username').textContent = res.username;
      $('new-username').value = '';
      $('new-password').value = '';
      $('confirm-password').value = '';
      // อัพเดท sidebar footer ด้วย
      $('who').textContent = '👤 ' + res.username;
    } catch (e) {
      setMsg(e.message, true);
    } finally {
      $('save-acc-btn').disabled = false;
    }
  });
}

// ---------- modal helper ----------
function showModal({ title, body, onSubmit }) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h3>${escapeHtml(title)}</h3>
      <div id="modal-body">${body}</div>
      <div class="modal-actions">
        <button class="btn" id="m-cancel">ยกเลิก</button>
        <button class="btn primary" id="m-ok">บันทึก</button>
      </div>
      <div class="hint" id="m-err" style="color:var(--critical);margin-top:6px;display:none"></div>
    </div>
  `;
  document.body.appendChild(bg);

  const close = () => bg.remove();
  bg.querySelector('#m-cancel').addEventListener('click', close);
  bg.addEventListener('click', e => { if (e.target === bg) close(); });
  bg.querySelector('#m-ok').addEventListener('click', async () => {
    const errEl = bg.querySelector('#m-err');
    errEl.style.display = 'none';
    try {
      await onSubmit();
      close();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = '';
    }
  });
}

// Hamburger / sister-sites menu
(() => {
  const btn = $('hamburgerBtn'); const menu = $('brandMenu');
  if (!btn || !menu) return;
  btn.addEventListener('click', (e) => {
    e.stopPropagation(); menu.hidden = !menu.hidden;
  });
  document.addEventListener('click', (e) => {
    if (!menu.hidden && !menu.contains(e.target) && !btn.contains(e.target)) menu.hidden = true;
  });
  document.querySelectorAll('.brand-menu-item[data-host]').forEach(a => {
    if (a.dataset.host === location.hostname) a.classList.add('current');
  });
})();
