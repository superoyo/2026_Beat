              <button class="teams-pill" data-team-id="${t.id}"
                      style="background:${isActive ? 'var(--bg-card)' : 'transparent'};
                             border:1px solid ${isActive ? 'var(--border)' : 'transparent'};
                             border-bottom:${isActive ? '1px solid var(--bg-card)' : 'none'};
                             margin-bottom:-1px;
                             padding:9px 14px;font-size:13.5px;
                             color:${isActive ? 'var(--primary)' : 'var(--text)'};
                             font-weight:${isActive ? '600' : '500'};
                             border-radius:8px 8px 0 0;
                             cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:all .12s">
                <span>${escapeHtml(t.name)}</span>
                <span style="font-size:11px;color:var(--text-muted);background:var(--bg-soft);padding:1px 7px;border-radius:999px;font-weight:500">
                  ${t.member_count}👤 · ${t.site_count}🌐
                </span>
              </button>
            `;
          }).join('')
      }
    </div>

    <!-- Selected team panel -->
    <div id="team-panel">
      ${selectedTeamId ? '<div class="empty">กำลังโหลด…</div>' : ''}
    </div>
  `;

  $('add-team-btn').addEventListener('click', showAddTeamModal);

  // Wire tab clicks → update URL hash → navigate handler will re-render with new selectedTeamId
  document.querySelectorAll('.teams-pill[data-team-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.teamId, 10);
      if (id !== selectedTeamId) {
        location.hash = '#/teams/' + id;
      }
    });
    btn.addEventListener('mouseenter', () => {
      if (parseInt(btn.dataset.teamId, 10) !== selectedTeamId) {
        btn.style.background = 'var(--bg-hover)';
      }
    });
    btn.addEventListener('mouseleave', () => {
      if (parseInt(btn.dataset.teamId, 10) !== selectedTeamId) {
        btn.style.background = 'transparent';
      }
    });
  });

  // Load selected team detail
  if (selectedTeamId) {
    await loadTeamDetail(selectedTeamId);
  }
}

function showAddTeamModal() {
  showModal({
    title: 'สร้าง Team ใหม่',
    body: `
      <div class="field">
        <label>ชื่อทีม</label>
        <input id="m-name" type="text" placeholder="เช่น Marketing, Sales" />
      </div>
      <div class="field">
        <label>คำอธิบาย (optional)</label>
        <input id="m-desc" type="text" placeholder="ทีมเกี่ยวกับ..." />
      </div>
    `,
    onSubmit: async () => {
      const name = $('m-name').value.trim();
      if (!name) throw new Error('กรอกชื่อทีม');
      const r = await fetchJson('/api/admin/teams', {
        method: 'POST',
        body: JSON.stringify({ name, description: $('m-desc').value.trim() || null }),
      });
      // เด้งไป tab ของ team ใหม่ที่เพิ่งสร้าง
      if (r && r.id) {
        location.hash = '#/teams/' + r.id;
      } else {
        await renderTeamsPage();
      }
    },
  });
}

// Render team detail content into #team-panel (called by tab click / page load)
let _currentTeam = null;
let _allMembers = null;   // cache list of all members for "add to team" picker
let _allSites = null;     // cache list of all sites

async function loadTeamDetail(teamId) {
  const panel = $('team-panel');
  if (!panel) return;
  let data;
  try {
    data = await fetchJson('/api/admin/teams/' + teamId);
  } catch (e) {
    panel.innerHTML = `<div class="empty">โหลดไม่สำเร็จ: ${escapeHtml(e.message)}</div>`;
    return;
  }
  _currentTeam = data.team;

  // Update count badge บน tab strip ของ team นี้ — ให้ตัวเลขทันสมัยหลังเพิ่ม/ลบ member/site
  const tabBtn = document.querySelector(`.teams-pill[data-team-id="${teamId}"]`);
  if (tabBtn) {
    const badge = tabBtn.querySelector('span:last-child');
    if (badge) {
      badge.textContent = `${data.members.length}👤 · ${data.sites.length}🌐`;
    }
  }

  // Render team header + sub-tab structure (Members | Site Access) — เหมือนเดิมแต่ inline
  panel.innerHTML = `
    <div style="background:var(--bg-card);border:1px solid var(--border);border-top-left-radius:0;border-top-right-radius:12px;border-bottom-left-radius:12px;border-bottom-right-radius:12px;padding:18px 20px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <h3 style="margin:0 0 4px;font-size:18px;font-weight:700">${escapeHtml(data.team.name)}</h3>
          <div style="font-size:13px;color:var(--text-muted)">
            ${data.team.description ? escapeHtml(data.team.description) : '<span style="font-style:italic">ไม่มีคำอธิบาย</span>'}
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn" id="edit-team-btn" style="font-size:12.5px;padding:6px 12px">✏️ แก้ไข</button>
          <button class="btn danger" id="delete-team-btn" style="font-size:12.5px;padding:6px 12px">🗑 ลบ</button>
        </div>
      </div>
    </div>

    <div id="team-tabs" style="display:flex;gap:6px;margin:0 0 14px;border-bottom:1px solid var(--border)">
      <button class="team-tab active" data-tab="members" style="background:none;border:none;padding:10px 14px;font-size:13.5px;color:var(--primary);font-weight:600;cursor:pointer;border-bottom:2px solid var(--primary)">👥 Members</button>
      <button class="team-tab" data-tab="sites" style="background:none;border:none;padding:10px 14px;font-size:13.5px;color:var(--text-muted);cursor:pointer">🌐 Site Access</button>
    </div>
    <div id="tab-members" class="team-tab-pane"></div>
    <div id="tab-sites" class="team-tab-pane" style="display:none"></div>
  `;

  document.querySelectorAll('#team-tabs .team-tab').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('#team-tabs .team-tab').forEach(x => {
        x.classList.toggle('active', x === b);
        x.style.color = x === b ? 'var(--primary)' : 'var(--text-muted)';
        x.style.fontWeight = x === b ? '600' : '500';
        x.style.borderBottom = x === b ? '2px solid var(--primary)' : '';
      });
      document.querySelectorAll('.team-tab-pane').forEach(p => p.style.display = 'none');
      const target = b.dataset.tab;
      document.getElementById('tab-' + target).style.display = '';
    });
  });

  $('edit-team-btn').addEventListener('click', () => {
    if (_currentTeam) showEditTeamModal(_currentTeam, teamId);
  });
  $('delete-team-btn').addEventListener('click', async () => {
    if (!confirm('ลบทีมนี้? (member ที่อยู่ในทีมจะหลุด, site access ที่ผูกไว้จะถูกถอน)')) return;
    await fetchJson('/api/admin/teams/' + teamId, { method: 'DELETE' });
    location.hash = '#/teams';
  });

  renderTeamMembers(teamId, data.members);
  renderTeamSites(teamId, data.sites);
}

function renderTeamMembers(teamId, members) {
  const html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="card-sub">${members.length} member</span>
      <button class="btn primary" id="add-member-btn" style="font-size:12.5px;padding:6px 12px">+ เพิ่ม Member</button>
    </div>
    ${members.length === 0
      ? '<div class="empty">ยังไม่มี member ในทีม</div>'
      : members.map(m => {
          const display = m.display_name || m.email || m.phone;
          // v1.14 — extra direct grants (sites ที่ member มีสิทธิ์โดยตรง แต่ team ไม่ได้ผูกไว้)
          const extras = m.extra_sites || [];
          const extraCapsules = extras.length === 0 ? '' : `
            <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center">
              <span style="font-size:11px;color:var(--text-muted);font-weight:500">นอกเหนือจากทีม:</span>
              ${extras.map(es => `
                <span class="extra-cap" data-mid="${m.id}" data-sid="${es.id}" data-sname="${escapeHtml(es.name)}"
                      style="display:inline-flex;align-items:center;gap:5px;padding:2px 4px 2px 9px;border-radius:999px;font-size:11px;font-weight:500;background:rgba(124,58,237,.10);color:var(--accent);border:1px solid rgba(124,58,237,.20)">
                  🔵 ${escapeHtml(es.name)}
                  <button class="extra-cap-x" data-mid="${m.id}" data-sid="${es.id}" data-sname="${escapeHtml(es.name)}"
                          title="ลบ direct grant ของ ${escapeHtml(es.name)}"
                          style="border:none;background:rgba(220,38,38,.10);color:var(--critical);width:16px;height:16px;border-radius:999px;cursor:pointer;font-size:10px;line-height:1;padding:0;display:inline-flex;align-items:center;justify-content:center">×</button>
                </span>
              `).join('')}
            </div>
          `;
          return `
            <div class="card" style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px">
              <div style="flex:1;min-width:0">
                <div class="card-title">${escapeHtml(display)}</div>
                <div class="card-sub">${escapeHtml(m.phone)}${m.email ? ' · ' + escapeHtml(m.email) : ''}${m.enabled === 0 ? ' · <span style="color:var(--critical)">⛔ ระงับ</span>' : ''}</div>
                ${extraCapsules}
              </div>
              <button class="btn danger" data-rm="${m.id}" style="font-size:12.5px;padding:6px 12px;flex-shrink:0">ลบออก</button>
            </div>
          `;
        }).join('')}
  `;
  $('tab-members').innerHTML = html;

  $('add-member-btn').addEventListener('click', () => showAddMemberToTeamModal(teamId, members));
  document.querySelectorAll('#tab-members button[data-rm]').forEach(b => {
    b.addEventListener('click', async () => {
      if (!confirm('ลบ member ออกจากทีม?')) return;
      await fetchJson(`/api/admin/teams/${teamId}/members/${b.dataset.rm}`, { method: 'DELETE' });
      await loadTeamDetail(teamId);
    });
  });
  // x button on extra-cap → confirm + revoke direct grant
  document.querySelectorAll('#tab-members .extra-cap-x').forEach(b => {
    b.addEventListener('click', async (e) => {
      e.stopPropagation();
      const mid = parseInt(b.dataset.mid, 10);
      const sid = parseInt(b.dataset.sid, 10);
      const sname = b.dataset.sname;
      if (!confirm(`ลบสิทธิ์ direct grant ของ "${sname}" สำหรับ member นี้?`)) return;
      try {
        await fetchJson(`/api/admin/members/${mid}/site-direct-access/${sid}`, {
          method: 'PUT',
          body: JSON.stringify({ grant: false }),
        });
        showSavedToast('✓ ลบสิทธิ์แล้ว');
        await loadTeamDetail(teamId);
      } catch (err) {
        showSavedToast('❌ ' + err.message, 'error');
      }
    });
  });
}

async function showAddMemberToTeamModal(teamId, currentMembers) {
  if (!_allMembers) {
    try { _allMembers = (await fetchJson('/api/admin/members')).members; } catch { _allMembers = []; }
  }
  const inIds = new Set(currentMembers.map(m => m.id));
  const candidates = _allMembers.filter(m => !inIds.has(m.id));
  if (candidates.length === 0) {
    alert('ไม่มี member เพิ่มเติม — สมาชิกทั้งหมดอยู่ในทีมแล้ว');
    return;
  }
  showModal({
    title: 'เพิ่ม Member เข้าทีม',
    body: `
      <div class="field">
        <label>เลือก member</label>
        <select id="m-pick" style="width:100%;padding:9px 12px;font-size:13.5px;border:1px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text);font-family:inherit">
          ${candidates.map(m => {
            const label = (m.display_name || m.email || m.phone) + ' · ' + m.phone;
            return `<option value="${m.id}">${escapeHtml(label)}</option>`;
          }).join('')}
        </select>
      </div>
    `,
    onSubmit: async () => {
      const memberId = parseInt($('m-pick').value, 10);
      await fetchJson(`/api/admin/teams/${teamId}/members`, {
        method: 'POST', body: JSON.stringify({ member_id: memberId }),
      });
      await loadTeamDetail(teamId);
    },
  });
}

async function renderTeamSites(teamId, sites) {
  // โหลด site ทั้งหมดเพื่อสร้างกล่อง "Available"
  if (!_allSites) {
    try { _allSites = (await fetchJson('/api/admin/sites')).sites; } catch { _allSites = []; }
  }
  const inIds = new Set(sites.map(s => s.id));
  const available = _allSites.filter(s => !inIds.has(s.id));

  const html = `
    <div class="hint" style="margin-bottom:14px;color:var(--text-muted);font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span>💡 <strong>Drag</strong> site จากซ้าย → ขวาเพื่อเพิ่ม, ลาก ขวา → ซ้ายเพื่อถอด, หรือกดปุ่ม → ←</span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <!-- Column: Available -->
      <div class="dnd-col" data-side="available" style="background:var(--bg-soft);border:1.5px dashed var(--border);border-radius:10px;padding:12px;min-height:280px;transition:all .2s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px">
          <div style="font-weight:600;font-size:13.5px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis">📚 Site ทั้งหมด <span class="card-sub" id="dnd-avail-count">(${available.length})</span></div>
          <button class="btn primary" id="dnd-add-all" ${available.length === 0 ? 'disabled' : ''}
                  style="font-size:11px;padding:4px 10px;white-space:nowrap;flex-shrink:0">+ เพิ่มทั้งหมด</button>
        </div>
        <input type="text" id="dnd-avail-search" placeholder="🔍 ค้นหา..." autocomplete="off"
               style="width:100%;padding:7px 10px;font-size:12.5px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--text);margin-bottom:8px" />
        <div class="dnd-list" data-list="available" style="display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto">
          ${available.length === 0
            ? '<div class="empty" style="padding:18px 10px">ทุก site อยู่ในทีมแล้ว</div>'
            : available.map(s => `
              <div class="dnd-item" draggable="true" data-site-id="${s.id}" data-side="available" data-search="${escapeHtml((s.name + ' ' + s.url_pattern).toLowerCase())}"
                   style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:grab;display:flex;align-items:center;gap:8px;font-size:12.5px;transition:all .15s">
                <span style="color:var(--text-muted);font-size:14px;line-height:1">⋮⋮</span>
                <div style="flex:1;min-width:0;overflow:hidden">
                  <div style="font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.name)}</div>
                  <div style="font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.url_pattern)}</div>
                </div>
                <button class="dnd-action" data-action="add" data-site-id="${s.id}" title="เพิ่มเข้าทีม"
                        style="background:var(--primary);color:#fff;border:none;border-radius:6px;width:28px;height:24px;cursor:pointer;font-size:14px;line-height:1">→</button>
              </div>
            `).join('')}
        </div>
      </div>

      <!-- Column: In team -->
      <div class="dnd-col" data-side="in-team" style="background:rgba(37,99,235,.04);border:1.5px dashed rgba(37,99,235,.3);border-radius:10px;padding:12px;min-height:280px;transition:all .2s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px">
          <div style="font-weight:600;font-size:13.5px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis">✓ ใน Team <span class="card-sub" id="dnd-in-count">(${sites.length})</span></div>
          <button class="btn danger" id="dnd-remove-all" ${sites.length === 0 ? 'disabled' : ''}
                  style="font-size:11px;padding:4px 10px;white-space:nowrap;flex-shrink:0">ถอดทั้งหมด</button>
        </div>
        <input type="text" id="dnd-in-search" placeholder="🔍 ค้นหา..." autocomplete="off"
               style="width:100%;padding:7px 10px;font-size:12.5px;border:1px solid var(--border);border-radius:6px;background:var(--bg-card);color:var(--text);margin-bottom:8px" />
        <div class="dnd-list" data-list="in-team" style="display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto">
          ${sites.length === 0
            ? '<div class="empty" style="padding:18px 10px">ลาก site จากซ้ายมาที่นี่</div>'
            : sites.map(s => {
              const isAll = s.access_type === 'all';
              const accessBadge = isAll
                ? '<span style="display:inline-block;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(37,99,235,.12);color:var(--primary)">All</span>'
                : `<span style="display:inline-block;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(124,58,237,.12);color:var(--accent)">Select(${s.credentials.length})</span>`;
              return `
                <div class="dnd-item" draggable="true" data-site-id="${s.id}" data-side="in-team" data-search="${escapeHtml((s.name + ' ' + s.url_pattern).toLowerCase())}"
                     style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:grab;font-size:12.5px;transition:all .15s">
                  <div style="display:flex;align-items:center;gap:8px">
                    <button class="dnd-action" data-action="remove" data-site-id="${s.id}" title="ถอดออกจากทีม"
                            style="background:rgba(220,38,38,.1);color:var(--critical);border:none;border-radius:6px;width:28px;height:24px;cursor:pointer;font-size:14px;line-height:1">←</button>
                    <div style="flex:1;min-width:0;overflow:hidden">
                      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                        <span style="font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.name)}</span>
                        ${accessBadge}
                      </div>
                      <div style="font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.url_pattern)}</div>
                    </div>
                    <button class="dnd-edit" data-edit-site="${s.id}" title="แก้ไข access type / credentials"
                            style="background:none;color:var(--text-muted);border:1px solid var(--border);border-radius:6px;width:28px;height:24px;cursor:pointer;font-size:11px">✏️</button>
                  </div>
                </div>
              `;
            }).join('')}
        </div>
      </div>
    </div>
  `;
  $('tab-sites').innerHTML = html;

  // === Drag & Drop wiring ===
  const root = $('tab-sites');

  root.querySelectorAll('.dnd-item').forEach(item => {
    item.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', JSON.stringify({
        siteId: parseInt(item.dataset.siteId, 10),
        side: item.dataset.side,
      }));
      e.dataTransfer.effectAllowed = 'move';
      item.style.opacity = '0.4';
    });
    item.addEventListener('dragend', () => { item.style.opacity = ''; });
  });

  root.querySelectorAll('.dnd-col').forEach(col => {
    col.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.style.borderStyle = 'solid';
      col.style.background = col.dataset.side === 'in-team'
        ? 'rgba(37,99,235,.08)' : 'var(--bg-hover)';
    });
    col.addEventListener('dragleave', (e) => {
      // ตรวจว่าเมาส์ออกจาก col จริงๆ (ไม่ใช่แค่เข้า child)
      if (!col.contains(e.relatedTarget)) {
        col.style.borderStyle = 'dashed';
        col.style.background = '';
      }
    });
    col.addEventListener('drop', async (e) => {
      e.preventDefault();
      col.style.borderStyle = 'dashed';
      col.style.background = '';
      let payload;
      try { payload = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
      const targetSide = col.dataset.side;
      // ลากภายใน col เดิม → ไม่ทำอะไร
      if (payload.side === targetSide) return;
      try {
        if (targetSide === 'in-team') {
          // available → in-team: เพิ่มด้วย access_type='all'
          await fetchJson(`/api/admin/teams/${teamId}/sites`, {
            method: 'POST',
            body: JSON.stringify({ site_id: payload.siteId, access_type: 'all' }),
          });
        } else {
          // in-team → available: ถอดออก
          await fetchJson(`/api/admin/teams/${teamId}/sites/${payload.siteId}`, { method: 'DELETE' });
        }
        await loadTeamDetail(teamId);
      } catch (err) {
        alert('ไม่สำเร็จ: ' + err.message);
      }
    });
  });

  // === ปุ่ม fallback (→ / ← / ✏️) — กรณี drag ไม่สะดวก เช่น mobile ===
  root.querySelectorAll('.dnd-action').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const siteId = parseInt(btn.dataset.siteId, 10);
      try {
        if (action === 'add') {
          await fetchJson(`/api/admin/teams/${teamId}/sites`, {
            method: 'POST',
            body: JSON.stringify({ site_id: siteId, access_type: 'all' }),
          });
        } else {
          if (!confirm('ถอด site นี้ออกจากทีม?')) return;
          await fetchJson(`/api/admin/teams/${teamId}/sites/${siteId}`, { method: 'DELETE' });
        }
        await loadTeamDetail(teamId);
      } catch (err) {
        alert('ไม่สำเร็จ: ' + err.message);
      }
    });
  });

  root.querySelectorAll('.dnd-edit').forEach(btn => {
    btn.addEventListener('click', () => {
      const sid = parseInt(btn.dataset.editSite, 10);
      const site = sites.find(s => s.id === sid);
      if (site) showEditTeamSiteModal(teamId, site);
    });
  });

  // === Search filters ===
  const wireSearch = (inputId, listSel) => {
    const inp = document.getElementById(inputId);
    if (!inp) return;
    inp.addEventListener('input', () => {
      const q = inp.value.toLowerCase().trim();
      root.querySelectorAll(`.dnd-list[data-list="${listSel}"] .dnd-item`).forEach(item => {
        const key = item.dataset.search || '';
        item.style.display = (!q || key.includes(q)) ? '' : 'none';
      });
    });
  };
  wireSearch('dnd-avail-search', 'available');
  wireSearch('dnd-in-search', 'in-team');

  // === Bulk actions: เพิ่มทั้งหมด / ถอดทั้งหมด ===
  // หมายเหตุ: ทำงานเฉพาะ items ที่ visible (หลัง filter) → user สามารถใช้ search
  //          กับ "เพิ่มทั้งหมด/ถอดทั้งหมด" เพื่อ bulk เฉพาะกลุ่มที่กรองได้
  const bulkAction = async (listSel, opts) => {
    const visibleItems = Array.from(
      root.querySelectorAll(`.dnd-list[data-list="${listSel}"] .dnd-item`)
    ).filter(item => item.style.display !== 'none');
    if (visibleItems.length === 0) {
      alert(opts.emptyMsg);
      return;
    }
    const filterVal = (document.getElementById(opts.searchId)?.value || '').trim();
    const filterMsg = filterVal ? ` (filter: "${filterVal}")` : '';
    if (!confirm(`${opts.confirmPrefix} ${visibleItems.length} site${filterMsg}?`)) return;

    const btn = document.getElementById(opts.btnId);
    if (btn) {
      btn.disabled = true;
      btn._origText = btn.textContent;
      btn.textContent = `⏳ กำลัง ${opts.verb} ${visibleItems.length}...`;
    }

    const ids = visibleItems.map(i => parseInt(i.dataset.siteId, 10));
    const results = await Promise.allSettled(ids.map(opts.apiCall));
    const failed = results.filter(r => r.status === 'rejected').length;
    if (failed > 0) {
      alert(`${opts.verb}สำเร็จ ${ids.length - failed}/${ids.length} site (ล้มเหลว ${failed})`);
    }
    await loadTeamDetail(teamId);   // reload — re-render ทั้งหมด, btn จะถูกสร้างใหม่
  };

  const addAllBtn = document.getElementById('dnd-add-all');
  if (addAllBtn) {
    addAllBtn.addEventListener('click', () => bulkAction('available', {
      emptyMsg: 'ไม่มี site ให้เพิ่ม',
      confirmPrefix: 'เพิ่ม',
      verb: 'เพิ่ม',
      searchId: 'dnd-avail-search',
      btnId: 'dnd-add-all',
      apiCall: (siteId) => fetchJson(`/api/admin/teams/${teamId}/sites`, {
        method: 'POST',
        body: JSON.stringify({ site_id: siteId, access_type: 'all' }),
      }),
    }));
  }

  const rmAllBtn = document.getElementById('dnd-remove-all');
  if (rmAllBtn) {
    rmAllBtn.addEventListener('click', () => bulkAction('in-team', {
      emptyMsg: 'ไม่มี site ให้ถอด',
      confirmPrefix: 'ถอด',
      verb: 'ถอด',
      searchId: 'dnd-in-search',
      btnId: 'dnd-remove-all',
      apiCall: (siteId) => fetchJson(`/api/admin/teams/${teamId}/sites/${siteId}`, {
        method: 'DELETE',
      }),
    }));
  }
}

async function loadAccessRequests() {
  const listEl = $('ar-list');
  listEl.innerHTML = '<div class="empty">กำลังโหลด…</div>';

  let data;
  try {
    data = await fetchJson('/api/admin/access-requests?status=' + _arCurrentTab);
  } catch (e) {
    listEl.innerHTML = `<div class="empty">โหลดไม่สำเร็จ: ${escapeHtml(e.message)}</div>`;
    return;
  }

  const requests = data.requests || [];
  const counts = data.counts || {};
  $('ar-count').textContent = `${requests.length} รายการ (${_arCurrentTab})`;

  // Update tab styles + counts
  document.querySelectorAll('.ar-tab').forEach(b => {
    const isActive = b.dataset.tab === _arCurrentTab;
    b.style.color = isActive ? 'var(--primary)' : 'var(--text-muted)';
    b.style.fontWeight = isActive ? '600' : '500';
    b.style.borderBottom = isActive ? '2px solid var(--primary)' : '2px solid transparent';
    const cnt = counts[b.dataset.tab] || 0;
    const cntSpan = b.querySelector('.ar-tab-count');
    if (cntSpan) cntSpan.textContent = cnt > 0 ? `(${cnt})` : '';
  });

  if (requests.length === 0) {
    const messages = {
      pending: 'ยังไม่มี request ที่รออนุมัติ 🎉',
      accepted: 'ยังไม่มี request ที่ผ่านการอนุมัติ',
      rejected: 'ยังไม่มี request ที่ถูกปฏิเสธ',
    };
    listEl.innerHTML = `<div class="empty">${messages[_arCurrentTab] || 'ไม่มีข้อมูล'}</div>`;
    return;
  }

  listEl.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px">
    ${requests.map(r => renderAccessRequestRow(r)).join('')}
  </div>`;

  // Wire action buttons
  listEl.querySelectorAll('button[data-ar-action]').forEach(btn => {
    btn.addEventListener('click', () => handleAccessRequestAction(btn));
  });
}

async function handleAccessRequestAction(btn) {
  const id = btn.dataset.arId;
  const action = btn.dataset.arAction;
  const verb = action === 'accept' ? 'อนุมัติ' : 'ปฏิเสธ';
  if (!confirm(`ยืนยัน${verb} request นี้?`)) return;
  let note = null;
  if (action === 'reject') {
    note = prompt('เหตุผลที่ปฏิเสธ (ไม่บังคับ):', '') || null;
  }
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⏳';
  try {
    await fetchJson(`/api/admin/access-requests/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ action, note }),
    });
    showSavedToast(action === 'accept' ? '✓ อนุมัติแล้ว' : '✗ ปฏิเสธแล้ว');
    await loadAccessRequests();
    refreshAccessRequestBadge();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = orig;
    showSavedToast('❌ ' + e.message, 'error');
  }
}

function shortUserAgent(ua) {
  if (!ua) return '—';
  // Chrome/147.0 (Mac) — สั้นๆ
  const browser = (ua.match(/(Chrome|Firefox|Safari|Edge)\/[\d.]+/) || ['—'])[0];
  let os = '';
  if (/Mac OS|Macintosh/.test(ua)) os = 'Mac';
  else if (/Windows/.test(ua)) os = 'Win';
  else if (/Linux/.test(ua)) os = 'Linux';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/iPhone|iPad/.test(ua)) os = 'iOS';
  return browser + (os ? ' · ' + os : '');
}

function fmtMemberJoinTimeAdmin(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yest = new Date(today.getTime() - 86400000);
  const dDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const time = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  if (dDay.getTime() === today.getTime()) return `วันนี้ ${time}`;
  if (dDay.getTime() === yest.getTime()) return `เมื่อวาน ${time}`;
  const monthShort = d.toLocaleDateString('th-TH', { month: 'short' });
  return `${d.getDate()} ${monthShort} ${time}`;
}

function renderMemberBubbles(members) {
  const wrap = $('m-bubbles');
  if (!wrap) return;
  // เรียงจากล่าสุด — created_at DESC
  const recent = members.slice()
    .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))
    .slice(0, 30);
  if (recent.length === 0) {
    wrap.innerHTML = `<div class="empty" style="flex:1;font-size:13px;padding:18px">ยังไม่มี member</div>`;
    return;
  }
  wrap.innerHTML = recent.map(m => {
    const display = m.display_name || m.email || m.phone || '?';
    const initial = display.trim().charAt(0).toUpperCase();
    const safeName = escapeHtml(display);
    const avatar = m.avatar_data
      ? `<img src="${m.avatar_data}" alt="${safeName}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--bg-card);box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s" />`
      : `<div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-weight:700;font-size:22px;display:inline-flex;align-items:center;justify-content:center;border:2px solid var(--bg-card);box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s">${escapeHtml(initial)}</div>`;
    const joinedTxt = fmtMemberJoinTimeAdmin(m.created_at);
    return `
      <div class="m-bubble" data-act="stats" data-id="${m.id}" data-name="${safeName}"
           style="flex:0 0 96px;text-align:center;cursor:pointer" title="คลิกดูสถิติของ ${safeName}">
        ${avatar}
        <div style="margin-top:8px;font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:96px">${escapeHtml(display)}</div>
        <div style="font-size:10.5px;color:var(--text-muted);margin-top:1px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:96px">${escapeHtml(joinedTxt)}</div>
      </div>
    `;
  }).join('');

  // Hover + click
  wrap.querySelectorAll('.m-bubble').forEach(b => {
    const img = b.querySelector('img, div[style*="border-radius:50%"]');
    b.addEventListener('mouseenter', () => {
      if (img) {
        img.style.transform = 'scale(1.06)';
        img.style.boxShadow = '0 6px 18px rgba(37,99,235,.25)';
      }
    });
    b.addEventListener('mouseleave', () => {
      if (img) {
        img.style.transform = '';
        img.style.boxShadow = 'var(--shadow-sm)';
      }
    });
    b.addEventListener('click', () => handleMemberAction(b));
  });
}

// State สำหรับ filter
let _membersCache = [];
let _teamsCache = [];

function applyMemberFilter() {
  const filterEl = $('m-team-filter');
  const searchEl = $('m-search');
  const clearBtn = $('m-search-clear');
  if (!filterEl) return;
  const filter = filterEl.value;
  const q = (searchEl ? searchEl.value : '').toLowerCase().trim();
  if (clearBtn) clearBtn.style.display = q ? '' : 'none';

  // Step 1: filter ตามทีม
  let filtered;
  if (filter === '') {
    filtered = _membersCache;
  } else if (filter === '__none__') {
    filtered = _membersCache.filter(m => !m.teams || m.teams.length === 0);
  } else {
    const teamId = parseInt(filter, 10);
    filtered = _membersCache.filter(m => (m.teams || []).some(t => t.id === teamId));
  }

  // Step 2: filter ตาม search query (ชื่อ / email / phone)
  if (q) {
    filtered = filtered.filter(m => {
      const hay = ((m.display_name || '') + ' ' + (m.email || '') + ' ' + (m.phone || '')).toLowerCase();
      return hay.includes(q);
    });
  }

  renderMembersTable(filtered);

  const total = _membersCache.length;
  let count;
  if (filter || q) {
    count = `${filtered.length} / ${total} คน`;
  } else {
    count = `รวม ${total} คน`;
  }
  $('m-count').textContent = count;

  const info = $('m-filter-info');
  if (info) {
    const parts = [];
    if (filter === '__none__') parts.push('🚫 ยังไม่มีทีม');
    else if (filter) {
      const t = _teamsCache.find(tt => tt.id === parseInt(filter, 10));
      if (t) parts.push(`ทีม: ${t.name}`);
    }
    if (q) parts.push(`ค้นหา: "${q}"`);
    info.textContent = parts.length ? '— filter: ' + parts.join(', ') : '';
  }
}

function fmtMemberDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('th-TH', {
    day: '2-digit', month: 'short', year: '2-digit',
    hour: '2-digit', minute: '2-digit',
  });
}

async function loadMembersList() {
  let data, teamsData;
  try {
    [data, teamsData] = await Promise.all([
      fetchJson('/api/admin/members'),
      fetchJson('/api/admin/teams'),
    ]);
  } catch (e) {
    $('m-list').innerHTML = `<div class="empty">โหลดไม่สำเร็จ: ${escapeHtml(e.message)}</div>`;
    return;
  }
  _membersCache = data.members || [];
  _teamsCache = teamsData.teams || [];

  // populate team filter dropdown
  const filterEl = $('m-team-filter');
  if (filterEl) {
    const currentVal = filterEl.value;
    // เก็บ default options + เพิ่ม teams
    filterEl.innerHTML = `
      <option value="">— ทุกคน (default) —</option>
      <option value="__none__">🚫 ยังไม่มีทีม</option>
      ${_teamsCache.map(t => `<option value="${t.id}">${escapeHtml(t.name)} (${t.member_count})</option>`).join('')}
    `;
    if (currentVal) filterEl.value = currentVal;   // restore selection
    // wire change handler (idempotent — ใส่ใหม่ทุก load)
    filterEl.onchange = applyMemberFilter;
  }

  // wire search input + clear button
  const searchEl = $('m-search');
  if (searchEl) searchEl.oninput = applyMemberFilter;
  const clearBtn = $('m-search-clear');
  if (clearBtn) clearBtn.onclick = () => {
    if (searchEl) { searchEl.value = ''; searchEl.focus(); }
    applyMemberFilter();
  };

  if (_membersCache.length === 0) {
    $('m-list').innerHTML = `<div class="empty">ยังไม่มี member ในระบบ — สมัครได้ที่ <a href="/login" target="_blank" style="color:var(--primary)">/login</a></div>`;
    $('m-count').textContent = '0 คน';
    renderMemberBubbles([]);
    return;
  }

  renderMemberBubbles(_membersCache);   // bubble row บนสุด (ไม่ filter)
  applyMemberFilter();                   // render table ด้านล่าง (ใช้ filter)
}

        <div class="empty">กำลังโหลด…</div>

  const dayButtons = bg.querySelectorAll('.m-stats-day');
  const setActiveDay = (days) => {
    dayButtons.forEach(b => {
      const isActive = parseInt(b.dataset.days, 10) === days;
      b.style.background = isActive ? 'var(--primary)' : 'var(--bg-card)';
      b.style.color = isActive ? '#fff' : 'var(--text)';
      b.style.borderColor = isActive ? 'var(--primary)' : 'var(--border)';
      b.style.fontWeight = isActive ? '600' : '500';
    });
  };

  const loadStats = async (days) => {
    setActiveDay(days);
    bg.querySelector('#m-stats-list').innerHTML = '<div class="empty">กำลังโหลด…</div>';
    bg.querySelector('#m-stats-summary').innerHTML = '';

    renderMemberStats(bg, data);
  };

  // wire day buttons
  dayButtons.forEach(b => {
    b.addEventListener('click', () => loadStats(parseInt(b.dataset.days, 10)));
  });

  // initial load
  loadStats(30);

// helper — int formatter (เฉพาะ scope ของ stats; fmtRelativeTh มีอยู่แล้วในไฟล์)
const _MEM_FMT = new Intl.NumberFormat('th-TH');
function fmtMemberInt(n) { return n == null ? '—' : _MEM_FMT.format(Math.round(n)); }

// === Modal: edit member's teams (multi-select) ===
// === Modal: member's site access (view + add/remove direct grants) ===
async function showMemberSitesModal(memberId, memberName) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal modal-wide">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap">
        <div>
          <h3 style="margin:0 0 4px;font-size:17px;font-weight:700">🌐 สิทธิ์เข้าถึง Platform</h3>
          <div style="font-size:13px;color:var(--text-muted)">${escapeHtml(memberName)}</div>
        </div>
        <button class="btn" id="ms-close" style="font-size:13px;padding:6px 14px">✕ ปิด</button>
      </div>

      <div class="hint" style="margin-bottom:14px;color:var(--text-muted);font-size:12.5px;line-height:1.6">
        🟢 = เข้าถึงผ่าน <strong>ทีม</strong> (ลบไม่ได้จากนี่ — ต้องไปหน้า Teams)<br/>
        🔵 = <strong>Direct grant</strong> โดยตรง (กดเพิ่ม/ลบได้)<br/>
        ⚪ = ยังไม่มีสิทธิ์ — กด "เพิ่มสิทธิ์" จะให้ direct grant ทุก credential ของ site
      </div>

      <div style="position:relative;margin-bottom:12px">
        <input id="ms-search" type="text" placeholder="🔍 ค้นหา site..." autocomplete="off"
               style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text)" />
      </div>

      <div id="ms-list" style="display:flex;flex-direction:column;gap:6px;max-height:480px;overflow-y:auto;padding:2px">
        <div class="empty" style="padding:30px">กำลังโหลด…</div>
      </div>
    </div>
  `;
  document.body.appendChild(bg);

  const close = () => bg.remove();
  bg.querySelector('#ms-close').addEventListener('click', close);
  bg.addEventListener('click', e => { if (e.target === bg) close(); });

  let sites = [];
  const reload = async () => {
    try {
      const data = await fetchJson(`/api/admin/members/${memberId}/site-access`);
      sites = data.sites || [];
      renderList();
    } catch (e) {
      bg.querySelector('#ms-list').innerHTML = `<div class="empty">โหลดไม่สำเร็จ: ${escapeHtml(e.message)}</div>`;
    }
  };

  const renderList = () => {
    const q = bg.querySelector('#ms-search').value.toLowerCase().trim();
    const filtered = q
      ? sites.filter(s => (s.name + ' ' + s.url_pattern).toLowerCase().includes(q))
      : sites;
    const listEl = bg.querySelector('#ms-list');
    if (filtered.length === 0) {
      listEl.innerHTML = `<div class="empty" style="padding:24px">${q ? 'ไม่เจอ site ที่ตรงกับคำค้น' : 'ยังไม่มี site ในระบบ'}</div>`;
      return;
    }
    listEl.innerHTML = filtered.map(s => renderMsRow(s)).join('');
    listEl.querySelectorAll('button[data-ms-action]').forEach(btn => {
      btn.addEventListener('click', () => handleMsToggle(btn, memberId, reload));
    });
  };

  const search = bg.querySelector('#ms-search');
  search.addEventListener('input', renderList);

  await reload();
}

function renderMsRow(s) {
  const initial = (s.name || '?').trim().charAt(0).toUpperCase();
  const avatar = s.logo_data
    ? `<div style="width:36px;height:36px;border-radius:9px;background:#fff;border:1px solid var(--border);overflow:hidden;flex-shrink:0;padding:4px"><img src="${s.logo_data}" alt="${escapeHtml(s.name)}" style="width:100%;height:100%;object-fit:contain" /></div>`
    : `<div style="width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-weight:700;font-size:14px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${escapeHtml(initial)}</div>`;

  const teamBadges = (s.via_teams || []).map(t =>
    `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;background:rgba(16,185,129,.10);color:var(--green)">🟢 ${escapeHtml(t.name)} (${t.access_type})</span>`
  ).join(' ');
  const directBadge = s.direct_credentials > 0
    ? `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;background:rgba(37,99,235,.10);color:var(--primary)">🔵 Direct (${s.direct_credentials}/${s.total_creds || 0})</span>`
    : '';
  const noAccessBadge = !s.has_access
    ? `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:500;background:var(--bg-soft);color:var(--text-muted)">⚪ ไม่มีสิทธิ์</span>`
    : '';
  const badges = [teamBadges, directBadge, noAccessBadge].filter(Boolean).join(' ');

  // Action button — เพิ่ม/ลบ direct grant
  let actionBtn;
  if (s.direct_credentials > 0) {
    actionBtn = `<button class="btn danger" data-ms-action="revoke" data-site-id="${s.id}" data-site-name="${escapeHtml(s.name)}" style="font-size:11.5px;padding:5px 11px;white-space:nowrap">✕ ถอน Direct</button>`;
  } else if (s.via_teams && s.via_teams.length > 0) {
    actionBtn = `<button class="btn primary" data-ms-action="grant" data-site-id="${s.id}" data-site-name="${escapeHtml(s.name)}" style="font-size:11.5px;padding:5px 11px;white-space:nowrap" title="เพิ่มสิทธิ์โดยตรง (เผื่อ team เปลี่ยน)">+ Direct grant</button>`;
  } else {
    actionBtn = `<button class="btn primary" data-ms-action="grant" data-site-id="${s.id}" data-site-name="${escapeHtml(s.name)}" style="font-size:11.5px;padding:5px 11px;white-space:nowrap">+ ให้สิทธิ์</button>`;
  }

  return `
    <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px">
      ${avatar}
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.name)}</div>
        <div style="font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:ui-monospace,Menlo,monospace">${escapeHtml(s.url_pattern)}</div>
        ${badges ? `<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">${badges}</div>` : ''}
      </div>
      ${actionBtn}
    </div>
  `;
}

async function handleMsToggle(btn, memberId, reload) {
  const action = btn.dataset.msAction;
  const siteId = parseInt(btn.dataset.siteId, 10);
  const siteName = btn.dataset.siteName;
  const verb = action === 'grant' ? 'ให้สิทธิ์' : 'ถอนสิทธิ์ direct';
  if (!confirm(`ยืนยัน${verb} "${siteName}"?`)) return;
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⏳';
  try {
    await fetchJson(`/api/admin/members/${memberId}/site-direct-access/${siteId}`, {
      method: 'PUT',
      body: JSON.stringify({ grant: action === 'grant' }),
    });
    showSavedToast(action === 'grant' ? '✓ ให้สิทธิ์แล้ว' : '✓ ถอนสิทธิ์แล้ว');
    await reload();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = orig;
    showSavedToast('❌ ' + e.message, 'error');
  }
}

async function handleMemberAction(btn) {
  const id = btn.dataset.id;
  const act = btn.dataset.act;

  if (act === 'edit-teams') {
    const name = btn.dataset.name;
    showEditMemberTeamsModal(parseInt(id, 10), name);
    return;
  }

  if (act === 'stats') {
    const name = btn.dataset.name;
    showMemberStatsModal(parseInt(id, 10), name);
    return;
  }

  if (act === 'sites') {
    const name = btn.dataset.name;
    showMemberSitesModal(parseInt(id, 10), name);
    return;
  }

  if (act === 'role') {
    const isCurrentlyAdmin = btn.dataset.current === '1';
    const name = btn.dataset.name;
    const action = isCurrentlyAdmin ? 'ถอดสิทธิ์ admin จาก' : 'แต่งตั้ง admin ให้';
    if (!confirm(`ยืนยัน${action} "${name}"?`)) return;
    try {
      await fetchJson(`/api/admin/members/${id}/admin`, {
        method: 'PATCH',
        body: JSON.stringify({ is_admin: !isCurrentlyAdmin }),
      });
      await loadMembersList();
    } catch (e) {
      alert('ทำรายการไม่สำเร็จ: ' + e.message);
    }
    return;
  }

  if (act === 'reset') {
    const name = btn.dataset.name;
    showResetPasswordModal(id, name);
    return;
  }

  if (act === 'toggle') {
    const wasEnabled = btn.dataset.enabled === '1';
    const action = wasEnabled ? 'ระงับ' : 'เปิดใช้งาน';
    if (!confirm(`ยืนยัน${action}บัญชีนี้?`)) return;
    try {
      await fetchJson(`/api/admin/members/${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ enabled: !wasEnabled }),
      });
      await loadMembersList();
    } catch (e) {
      alert('ทำรายการไม่สำเร็จ: ' + e.message);
    }
    return;
  }

  if (act === 'delete') {
    const name = btn.dataset.name;
    if (!confirm(`ลบบัญชี "${name}" ถาวร?\n\nข้อมูลทั้งหมดจะหายไปและกู้คืนไม่ได้`)) return;
    try {
      await fetchJson(`/api/admin/members/${id}`, { method: 'DELETE' });
      await loadMembersList();
    } catch (e) {
      alert('ลบไม่สำเร็จ: ' + e.message);
    }
    return;
  }
}

function showResetPasswordModal(memberId, memberName) {
  showModal({
    title: `Reset Password — ${memberName}`,
    body: `
      <div class="hint" style="margin-bottom:14px;color:var(--text-muted)">
        ตั้งรหัสผ่านใหม่ (อย่างน้อย 4 ตัว) — member จะใช้รหัสนี้ login ครั้งหน้า
      </div>
      <div class="field">
        <label>รหัสผ่านใหม่</label>
        <input id="rst-pw" type="password" autocomplete="new-password" />
      </div>
      <div class="field">
        <label>ยืนยันรหัสผ่าน</label>
        <input id="rst-confirm" type="password" autocomplete="new-password" />
      </div>
    `,
    onSubmit: async () => {
      const password = document.getElementById('rst-pw').value;
      const confirm = document.getElementById('rst-confirm').value;
      if (password.length < 4) throw new Error('รหัสผ่านอย่างน้อย 4 ตัว');
      if (password !== confirm) throw new Error('รหัสผ่านยืนยันไม่ตรงกัน');
      await fetchJson(`/api/admin/members/${memberId}`, {
        method: 'PATCH',
        body: JSON.stringify({ password }),
      });
      await loadMembersList();
    },
  });
}

async function renderAdminAccountPage() {
  $('main').innerHTML = `

    </div>
    <div class="warning-box">

      </div>
    </div>

    <div class="card" style="display:block">
      <h3 style="margin:0 0 12px;font-size:15px;font-weight:600">เปลี่ยน Username / Password</h3>
      <div class="hint" style="margin-bottom:14px;font-size:12.5px;color:var(--text-muted)">
        เว้นช่องที่ไม่ต้องการเปลี่ยนได้ (กรอกเฉพาะที่ต้องการแก้ไข)
      </div>

      <div class="field">
        <label>Username ใหม่</label>
        <input id="new-username" type="text" autocomplete="username" placeholder="เช่น admin@gmail.com" />
      </div>
      <div class="field">
        <label>Password ใหม่ (อย่างน้อย 4 ตัว)</label>
        <input id="new-password" type="password" autocomplete="new-password" placeholder="ปล่อยว่างถ้าไม่เปลี่ยน" />
      </div>
      <div class="field">
        <label>ยืนยัน Password ใหม่</label>
        <input id="confirm-password" type="password" autocomplete="new-password" />
      </div>

      <div class="hint" id="acc-msg" style="margin-bottom:10px;display:none"></div>
      <button class="btn primary" id="save-acc-btn">บันทึก</button>
    </div>
  `;

  // โหลด state ปัจจุบัน
  try {
    const s = await fetch('/api/admin/state', { credentials: 'same-origin' }).then(r => r.json());
    $('cur-username').textContent = s.username || '—';
  } catch {}

  function setMsg(text, isErr) {
    const el = $('acc-msg');
    el.textContent = text;
    el.style.display = '';
    el.style.color = isErr ? 'var(--critical)' : 'var(--green)';
  }

  $('save-acc-btn').addEventListener('click', async () => {
    const username = $('new-username').value.trim();
    const password = $('new-password').value;
    const confirm = $('confirm-password').value;

    if (!username && !password) {
      setMsg('กรอกอย่างน้อย username หรือ password ใหม่', true);
      return;
    }
    if (password && password !== confirm) {
      setMsg('Password ยืนยันไม่ตรงกัน', true);
      return;
    }
    if (password && password.length < 4) {
      setMsg('Password ต้องมีอย่างน้อย 4 ตัว', true);
      return;
    }

    const body = {};
    if (username) body.username = username;
    if (password) body.password = password;

    $('save-acc-btn').disabled = true;
    try {
      const res = await fetchJson('/api/admin/credentials', {
        method: 'PATCH',
        body: JSON.stringify(body),
      });
      setMsg('บันทึกสำเร็จ — username ใหม่: ' + res.username, false);
      $('cur-username').textContent = res.username;
      $('new-username').value = '';
      $('new-password').value = '';
      $('confirm-password').value = '';
      // อัพเดท sidebar footer ด้วย
      $('who').textContent = '👤 ' + res.username;
    } catch (e) {
      setMsg(e.message, true);
    } finally {
      $('save-acc-btn').disabled = false;
    }
  });
}

// Polling reference สำหรับ extension status (ต้อง stop ตอนนำทางออก)
let _extStatusTimer = null;
function stopExtStatusPolling() {
  if (_extStatusTimer) { clearInterval(_extStatusTimer); _extStatusTimer = null; }
}

function fmtRelativeTh(iso) {
  if (!iso) return '—';
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec < 0) return 'อนาคต';
  if (sec < 5) return 'เมื่อสักครู่';
  if (sec < 60) return sec + ' วินาทีที่แล้ว';
  if (sec < 3600) return Math.floor(sec/60) + ' นาทีที่แล้ว';
  if (sec < 86400) return Math.floor(sec/3600) + ' ชั่วโมงที่แล้ว';
  return Math.floor(sec/86400) + ' วันที่แล้ว';
}

// ดึง pairing status จาก extension ผ่าน postMessage (รอผล + timeout)
function probePairing(timeoutMs = 1500) {
  return new Promise((resolve) => {
    const requestId = 'fct_pairing_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const handler = (ev) => {
      if (ev.source !== window) return;
      const d = ev.data;
      if (!d || d.type !== 'FCT_PAIRING_RESULT' || d.requestId !== requestId) return;
      cleanup();
      resolve({ found: true, pairedUser: d.pairedUser });
    };
    const cleanup = () => {
      window.removeEventListener('message', handler);
      clearTimeout(timer);
    };
    const timer = setTimeout(() => {
      cleanup();
      resolve({ found: false });   // extension ไม่ตอบ
    }, timeoutMs);
    window.addEventListener('message', handler);
    window.postMessage({ type: 'FCT_GET_PAIRING', requestId }, '*');
  });
}

async function loadExtensionStatus() {
  // เรียกพร้อมกัน: backend status + extension pairing probe
  let s = null, p = null;
  try {
    [s, p] = await Promise.all([
      fetchJson('/api/admin/extension/status').catch(() => null),
      probePairing(1500),
    ]);
  } catch { return; }

  const card = document.getElementById('ext-status-card');
  const icon = document.getElementById('ext-status-icon');
  const text = document.getElementById('ext-status-text');
  const sub = document.getElementById('ext-status-sub');
  const meta = document.getElementById('ext-status-meta');
  const cta = document.getElementById('ext-status-cta');
  if (!card) return;  // หน้าเปลี่ยนแล้ว

  // ====== ตัดสินสถานะรวม (5 states) ======
  // ext-alive: backend เห็น heartbeat ภายใน 5 นาที
  // pair-found: postMessage ตอบกลับ (extension รันอยู่จริงในเครื่องนี้)
  const extAlive = !!(s && s.connected);
  const pairFound = p && p.found;
  const pairedUser = (p && p.pairedUser) || null;
  const isAdminPair = pairedUser && (pairedUser.role === 'admin' || pairedUser.member_id == null);
  const isMemberPair = pairedUser && pairedUser.role === 'member' && pairedUser.member_id != null;

  // กำหนดสไตล์ตาม state
  let bgColor, borderColor, textColor;
  let iconStr, mainText, subText, ctaHtml = '';

  if (!s || (!s.last_seen && !pairFound)) {
    // ============================ State 1: ยังไม่พบเลย ============================
    bgColor = '#fef2f2'; borderColor = '#fca5a5'; textColor = '#991b1b';
    iconStr = '❌';
    mainText = 'ยังไม่พบ Extension';
    subText = 'ติดตั้ง extension จากปุ่มดาวน์โหลดด้านล่าง + Reload หน้านี้';
  } else if (pairFound && !pairedUser) {
    // ============================ State 2: ติดตั้งแล้ว แต่ Unpaired ============================
    bgColor = '#fff7ed'; borderColor = '#fdba74'; textColor = '#9a3412';
    iconStr = '🔒';
    mainText = 'ยังใช้งานไม่ได้ — ต้อง Pair ก่อน';
    subText = 'Extension ติดตั้งแล้ว แต่ยังไม่ได้เชื่อมกับบัญชี → autofill จะไม่แสดงบนเว็บใดเลย';
    ctaHtml = '<a href="#" id="ext-cta-scroll" style="display:inline-block;padding:8px 14px;background:var(--primary);color:#fff;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none">↓ ไปที่ปุ่ม Pair</a>';
  } else if (pairFound && isAdminPair) {
    // ============================ State 3: Paired เป็น Admin (bypass) ============================
    bgColor = '#fefce8'; borderColor = '#fcd34d'; textColor = '#854d0e';
    iconStr = '⚠️';
    mainText = `ใช้งานได้แบบ Admin — เห็นทุก site (bypass team filter)`;
    subText = `Paired เป็น <strong>${escapeHtml(pairedUser.label || 'admin')}</strong> (member_id=null) · หากต้องการทดสอบ team filter ให้กด Unpair แล้ว pair ใหม่ในฐานะ member`;
  } else if (pairFound && isMemberPair) {
    // ============================ State 4: พร้อมใช้งาน (member-paired) ============================
    bgColor = '#f0fdf4'; borderColor = '#86efac'; textColor = '#15803d';
    iconStr = '✅';
    mainText = 'พร้อมใช้งาน';
    subText = `Paired กับ <strong>${escapeHtml(pairedUser.label)}</strong> (member, ID ${escapeHtml(String(pairedUser.member_id))}) · autofill แสดงตามสิทธิ์ใน Team`;
  } else if (s.connected && !pairFound) {
    // ============================ State 5: Backend เห็น heartbeat แต่หน้านี้ไม่เจอ extension ============================
    // (น่าจะเปิดอีก browser/profile หรือ extension ของหน้านี้ปิดอยู่)
    bgColor = '#fefce8'; borderColor = '#fcd34d'; textColor = '#854d0e';
    iconStr = '⚠️';
    mainText = 'Extension ทำงานบนเครื่องอื่น';
    subText = `Backend เห็น heartbeat ล่าสุด ${fmtRelativeTh(s.last_seen)} แต่หน้านี้ไม่เจอ extension — อาจเปิดบน browser/profile อื่น หรือต้อง Reload extension ในเครื่องนี้`;
  } else {
    // ============================ State 6: เคยทำงาน แต่หายไป ============================
    bgColor = '#fff7ed'; borderColor = '#fdba74'; textColor = '#9a3412';
    iconStr = '⚠️';
    mainText = 'Extension ไม่ตอบ';
    subText = `เห็นล่าสุด ${fmtRelativeTh(s.last_seen)} — ไป chrome://extensions แล้วกด Reload`;
  }

  // เขียน UI
  card.style.background = bgColor;
  card.style.borderColor = borderColor;
  icon.textContent = iconStr;
  text.style.color = textColor;
  text.innerHTML = mainText;
  sub.style.color = textColor;
  sub.innerHTML = subText;
  cta.innerHTML = ctaHtml;

  // metadata (small text below)
  const parts = [];
  if (s && s.last_seen) parts.push(`เห็นล่าสุด ${fmtRelativeTh(s.last_seen)}`);
  if (s && s.call_count > 0) parts.push(`${s.call_count.toLocaleString('th-TH')} requests`);
  if (s && s.last_snapshot) {
    const snap = s.last_snapshot;
    if (snap.host_name) parts.push(`💻 ${escapeHtml(snap.host_name)}`);
    if (snap.user_agent) {
      const m = snap.user_agent.match(/Chrome\/[\d.]+/);
      if (m) parts.push(`🌐 ${m[0]}`);
    }
  }
  meta.innerHTML = parts.length ? parts.join(' &nbsp;·&nbsp; ') : '';

  // wire CTA scroll
  const scrollBtn = document.getElementById('ext-cta-scroll');
  if (scrollBtn) {
    scrollBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const pairBtn = document.getElementById('pair-btn');
      if (pairBtn) {
        pairBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
        pairBtn.style.outline = '3px solid var(--primary)';
        setTimeout(() => { pairBtn.style.outline = ''; }, 2000);
      }
    });
  }
}

function startExtStatusPolling() {
  stopExtStatusPolling();
  loadExtensionStatus();
  _extStatusTimer = setInterval(loadExtensionStatus, 5000);
}

/**
 * Active probe — ส่ง postMessage ให้ content.js ของ extension ที่รันบนหน้านี้
 * extension จะส่งต่อให้ background → fetch backend ทันที → ตอบกลับผ่าน postMessage
 * Returns: {ok, backend, status, error, reason: 'timeout'|'extension'|'backend'}
 */
function activeProbeExtension(timeoutMs = 4000) {
  return new Promise((resolve) => {
    const requestId = 'fct_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const handler = (event) => {
      if (event.source !== window) return;
      const d = event.data;
      if (!d || d.type !== 'FCT_PING_RESULT' || d.requestId !== requestId) return;
      cleanup();
      resolve(d);
    };
    const cleanup = () => {
      window.removeEventListener('message', handler);
      clearTimeout(timer);
    };
    const timer = setTimeout(() => {
      cleanup();
      resolve({ ok: false, reason: 'timeout' });
    }, timeoutMs);
    window.addEventListener('message', handler);
    window.postMessage({ type: 'FCT_FORCE_PING', requestId }, '*');
  });
}

async function manualRefreshStatus() {
  const dot = $('ext-status-dot');
  const text = $('ext-status-text');
  const sub = $('ext-status-sub');
  const meta = $('ext-status-meta');
  if (!dot) return;

  // Probing state
  stopExtStatusPolling();
  dot.style.background = '#94a3b8';
  dot.style.boxShadow = '0 0 0 6px rgba(148,163,184,.15)';
  text.textContent = '⏳ กำลัง probe extension…';
  text.style.color = 'var(--text-muted)';
  sub.textContent = 'ส่งคำสั่งให้ extension ping backend ตอนนี้';
  meta.innerHTML = '';

  const result = await activeProbeExtension(4000);

  if (result.ok) {
    // ปิงสำเร็จ — refresh status จาก backend (heartbeat ใหม่ updated)
    await loadExtensionStatus();
    startExtStatusPolling();
    return;
  }

  if (result.reason === 'timeout') {
    dot.style.background = 'var(--critical)';
    dot.style.boxShadow = '0 0 0 6px rgba(220,38,38,.12)';
    text.textContent = '❌ Extension ไม่ตอบ';
    text.style.color = 'var(--critical)';
    sub.innerHTML = 'ไม่ได้ install หรือ extension ปิดอยู่ — เปิด <code>chrome://extensions</code> เช็คว่า "FEFL Beat" enabled + reload';
    meta.innerHTML = '';
  } else {
    // Extension ตอบกลับ แต่ ping backend ไม่ผ่าน
    dot.style.background = 'var(--critical)';
    dot.style.boxShadow = '0 0 0 6px rgba(220,38,38,.12)';
    text.textContent = '❌ Extension ติดต่อ backend ไม่ได้';
    text.style.color = 'var(--critical)';

    let reason = '';
    if (result.status === 401) {
      reason = 'API Key ใน extension ไม่ตรง — copy ใหม่จาก step 2.2 ด้านล่าง';
    } else if (result.status === 0 || (result.error || '').toLowerCase().includes('failed to fetch')) {
      reason = 'Backend URL ใน extension ผิด — ตั้งเป็น URL จาก step 2.1 ด้านล่าง';
    } else if (result.status) {
      reason = `Backend ตอบกลับ HTTP ${result.status}`;
    } else if (result.error) {
      reason = `Error: ${result.error}`;
    } else {
      reason = 'ไม่ทราบสาเหตุ';
    }
    sub.textContent = reason;
    meta.innerHTML = result.backend
      ? `Backend URL ที่ extension ตั้งไว้: <code style="font-size:11px;background:var(--bg-soft);padding:1px 5px;border-radius:4px">${escapeHtml(result.backend)}</code>`
      : '';
  }
}

function renderVersionCard(cl) {
  const cur = cl.current_entry;
  const ver = cl.current_version || '?';
  const olderVersions = (cl.versions || []).filter(v => v.version !== ver);

  const headerLine = cur
    ? `<span style="font-size:18px;font-weight:700;color:var(--primary)">v${escapeHtml(ver)}</span>
       <span style="margin-left:8px;font-size:14px;color:var(--text)">— ${escapeHtml(cur.title)}</span>`
    : `<span style="font-size:18px;font-weight:700;color:var(--primary)">v${escapeHtml(ver)}</span>
       <span style="margin-left:8px;font-size:13px;color:var(--text-muted)">(ไม่มี changelog entry)</span>`;

  const summary = cur && cur.summary
    ? `<div style="margin:6px 0 0;color:var(--text-muted);font-size:13px">${escapeHtml(cur.summary)}</div>`
    : '';

  const changesList = cur && cur.changes && cur.changes.length
    ? `<div style="margin-top:14px">
         <div style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">✨ ใหม่ในเวอร์ชันนี้</div>
         <ul style="margin:0;padding-left:20px;line-height:1.7;color:var(--text);font-size:13.5px">
           ${cur.changes.map(c => `<li>${escapeHtml(c)}</li>`).join('')}
         </ul>
       </div>`
    : '';

  const olderSection = olderVersions.length > 0
    ? `<details style="margin-top:18px">
         <summary style="cursor:pointer;font-size:13px;color:var(--primary);font-weight:500;list-style:none">
           ▼ ดูประวัติเวอร์ชันที่ผ่านมา (${olderVersions.length})
         </summary>
         <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:14px">
           ${olderVersions.map(v => `
             <div style="padding:12px 14px;background:var(--bg-soft);border-radius:8px;border:1px solid var(--border)">
               <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                 <span style="font-weight:700;color:var(--primary)">v${escapeHtml(v.version)}</span>
                 <span style="font-size:13px;font-weight:600">${escapeHtml(v.title || '—')}</span>
                 <span style="margin-left:auto;font-size:11.5px;color:var(--text-soft)">${escapeHtml(v.date || '')}</span>
               </div>
               ${v.summary ? `<div style="color:var(--text-muted);font-size:12.5px;margin-bottom:8px">${escapeHtml(v.summary)}</div>` : ''}
               ${v.changes && v.changes.length ? `
                 <ul style="margin:0;padding-left:18px;font-size:12.5px;color:var(--text);line-height:1.65">
                   ${v.changes.map(c => `<li>${escapeHtml(c)}</li>`).join('')}
                 </ul>
               ` : ''}
             </div>
           `).join('')}
         </div>
       </details>`
    : '';

  return `
    <div class="card" style="display:block;margin-bottom:14px;padding:20px 22px;background:linear-gradient(135deg, rgba(37,99,235,.04), rgba(124,58,237,.04));border-color:var(--primary-soft)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:10px">

          <div>${headerLine}</div>
        </div>
        <a href="/api/admin/extension/download" class="btn primary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:12.5px;padding:7px 14px">
          📥 ดาวน์โหลดเวอร์ชันนี้
        </a>
      </div>
      ${summary}
      ${changesList}

      <div style="margin-top:18px;padding:12px 14px;background:var(--bg-soft);border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:6px">🔄 วิธีอัพเดท extension (ไม่ต้อง remove)</div>
        <ol style="margin:0;padding-left:20px;line-height:1.7;color:var(--text);font-size:12.5px">
          <li>ดาวน์โหลด ZIP ใหม่ (ปุ่มด้านบน) — แตก <strong>ทับ folder เดิม</strong> (replace files)

          <li>เสร็จ — ไม่ต้อง re-pair, config เดิมยังอยู่</li>

  `;
}

        </div>

        <div>
          <div style="font-weight:600;margin-bottom:4px">❌ Service worker ค้าง</div>
          <div style="color:var(--text-muted);padding-left:14px">→ chrome://extensions → กดลิงก์ "service worker" สีน้ำเงินใน card → DevTools เปิด → ดู error / กด reload extension</div>

  `;

  // Auto-detect device label จาก userAgentData → fill input
  (async () => {
    const inp = $('device-label-input');
    if (!inp) return;
    let label = '';
    try {
      if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
        const data = await navigator.userAgentData.getHighEntropyValues(['platform']);
        const brand = (navigator.userAgentData.brands || [])
          .find(b => /Chrome|Edge/.test(b.brand));
        const browserLabel = brand ? brand.brand.replace('Google ', '') + ' ' + brand.version : 'Chrome';
        label = (data.platform || 'Unknown') + ' · ' + browserLabel;
      }
    } catch {}
    if (!label) {
      // Fallback: parse user-agent
      const ua = navigator.userAgent;
      let os = 'Unknown';
      if (/Mac OS X|Macintosh/.test(ua)) os = 'macOS';
      else if (/Windows/.test(ua)) os = 'Windows';
      else if (/Linux/.test(ua)) os = 'Linux';
      else if (/Android/.test(ua)) os = 'Android';
      else if (/iPhone|iPad/.test(ua)) os = 'iOS';
      const m = ua.match(/Chrome\/([\d.]+)/);
      const chrome = m ? 'Chrome ' + m[1].split('.')[0] : 'Chrome';
      label = os + ' · ' + chrome;
    }
    inp.value = label;
  })();

  // pair button → ส่ง config ผ่าน postMessage ไปให้ extension
  const pairBtn = $('pair-btn');
  if (pairBtn) {
    pairBtn.addEventListener('click', async () => {
      const status = $('pair-status');
      pairBtn.disabled = true;
      status.style.display = '';
      status.style.color = 'var(--text-muted)';
      status.textContent = '⏳ กำลังเชื่อม...';

      // เก็บ config — ทั้ง admin และ member ได้ API key (ดึงจาก /api/admin/api-key)
      let myApiKey = apiKey;
      let pairedUser = null;

      // หา label ของ user ที่ login ปัจจุบัน
      const deviceLabel = ($('device-label-input')?.value || '').trim() || null;
      try {
        if (currentRole === 'admin') {
          const s = await fetch('/api/admin/state', { credentials: 'same-origin' }).then(r => r.json());
          pairedUser = {
            role: 'admin', label: s.username, member_id: null,
            deviceLabel, paired_at: new Date().toISOString(),
          };
        } else {
          const m = await fetch('/api/member/me', { credentials: 'same-origin' }).then(r => r.json());
          if (m.logged_in && m.member) {
            const md = m.member;
            pairedUser = {
              role: 'member',
              label: md.display_name || md.email || md.phone,
              member_id: md.id,
              deviceLabel,
              paired_at: new Date().toISOString(),
            };
          }
        }
      } catch {}

      const config = {
        backendUrl: backendUrl,
        apiKey: myApiKey || null,    // member อาจไม่มี
        pairedUser,
      };

      // ส่ง postMessage รอ reply
      const requestId = 'fct_pair_' + Date.now();
      const handler = (ev) => {
        if (ev.source !== window) return;
        const d = ev.data;
        if (!d || d.type !== 'FCT_PAIR_RESULT' || d.requestId !== requestId) return;
        cleanup();
        if (d.ok) {
          status.style.color = 'var(--green)';
          status.innerHTML = `✓ เชื่อมสำเร็จ — extension รู้แล้วว่าคุณคือ <strong>${escapeHtml(pairedUser?.label || 'unknown')}</strong>` +
            (deviceLabel ? ` จาก <strong>${escapeHtml(deviceLabel)}</strong>` : '');
          // refresh status widget
          setTimeout(() => loadExtensionStatus(), 500);
        } else {
          status.style.color = 'var(--critical)';
          status.textContent = '❌ เชื่อมไม่สำเร็จ: ' + (d.error || 'extension ไม่ตอบ');
        }
        pairBtn.disabled = false;
      };
      const timer = setTimeout(() => {
        cleanup();
        status.style.color = 'var(--critical)';
        status.innerHTML = '❌ Extension ไม่ตอบใน 4 วินาที — install + reload extension แล้วลองใหม่';
        pairBtn.disabled = false;
      }, 4000);
      const cleanup = () => {
        window.removeEventListener('message', handler);
        clearTimeout(timer);
      };

      window.addEventListener('message', handler);
      window.postMessage({ type: 'FCT_PAIR', requestId, config }, '*');
    });
  }

  // ----- Unpair button -----
  const unpairBtn = $('unpair-btn');
  if (unpairBtn) {
    unpairBtn.addEventListener('click', async () => {
      if (!confirm('ลบ pairing ของ extension? (extension จะกลับเป็น unpaired — ไม่มี member_id ส่งไป backend)')) return;
      const status = $('pair-status');
      unpairBtn.disabled = true;
      status.style.display = '';
      status.style.color = 'var(--text-muted)';
      status.textContent = '⏳ กำลัง unpair...';

      const requestId = 'fct_unpair_' + Date.now();
      const handler = (ev) => {
        if (ev.source !== window) return;
        const d = ev.data;
        if (!d || d.type !== 'FCT_UNPAIR_RESULT' || d.requestId !== requestId) return;
        cleanup();
        if (d.ok) {
          status.style.color = '#15803d';
          status.innerHTML = '✓ Unpaired แล้ว — extension จะ <strong>ไม่แสดง autofill widget</strong> บนเว็บใดทั้งสิ้น จนกว่าจะ pair ใหม่<br/><span style="color:var(--text-muted);font-size:12px">หาก reload หน้าเว็บที่เคยมี widget แล้วยังโผล่ ให้ <code>chrome://extensions</code> → Reload extension อีกครั้ง</span>';
          // refresh top status widget
          setTimeout(() => loadExtensionStatus(), 300);
        } else {
          status.style.color = 'var(--critical)';
          status.textContent = '❌ Unpair ไม่สำเร็จ: ' + (d.error || 'extension ไม่ตอบ');
        }
        unpairBtn.disabled = false;
      };
      const timer = setTimeout(() => {
        cleanup();
        status.style.color = 'var(--critical)';
        status.innerHTML = '❌ Extension ไม่ตอบใน 4 วินาที — reload extension แล้วลองใหม่';
        unpairBtn.disabled = false;
      }, 4000);
      const cleanup = () => {
        window.removeEventListener('message', handler);
        clearTimeout(timer);
      };
      window.addEventListener('message', handler);
      window.postMessage({ type: 'FCT_UNPAIR', requestId }, '*');
    });
  }

  // wire copy buttons
  document.querySelectorAll('button[data-copy]').forEach(b => {
    b.addEventListener('click', () => {
      navigator.clipboard.writeText(b.dataset.copy);
      const orig = b.textContent;
      b.textContent = '✓ คัดลอกแล้ว';
      setTimeout(() => { b.textContent = orig; }, 1200);
    });
  });
  if (apiKey) {
    const btn = $('ext-copy-apikey');
    if (btn) {
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(apiKey);
        const orig = btn.textContent;
        btn.textContent = '✓ คัดลอกแล้ว';
        setTimeout(() => { btn.textContent = orig; }, 1200);
      });
    }
  }

  // Start polling status (admin + member)
  startExtStatusPolling();
  const refreshBtn = $('ext-refresh');
  if (refreshBtn) refreshBtn.addEventListener('click', manualRefreshStatus);
}

// ---------- modal helper ----------
function showModal({ title, body, onSubmit, size }) {
  // size: 'wide' (720px) | 'xwide' (920px) | undefined (440px default)
  const sizeClass = size === 'wide' ? ' modal-wide' : size === 'xwide' ? ' modal-xwide' : '';
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal${sizeClass}">
      <h3>${escapeHtml(title)}</h3>
      <div id="modal-body">${body}</div>
      <div class="modal-actions">
        <button class="btn" id="m-cancel">ยกเลิก</button>
        <button class="btn primary" id="m-ok">บันทึก</button>
      </div>
      <div class="hint" id="m-err" style="color:var(--critical);margin-top:6px;display:none"></div>
    </div>
  `;
  document.body.appendChild(bg);

  const close = () => bg.remove();
  bg.querySelector('#m-cancel').addEventListener('click', close);
  bg.addEventListener('click', e => { if (e.target === bg) close(); });
  bg.querySelector('#m-ok').addEventListener('click', async () => {
    const errEl = bg.querySelector('#m-err');
    errEl.style.display = 'none';
    try {
      await onSubmit();
      close();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = '';
    }
  });
}

// ---------- bootstrap ----------
// Hamburger / sister-sites menu
(() => {
  const btn = $('hamburgerBtn'); const menu = $('brandMenu');
  if (!btn || !menu) return;
  btn.addEventListener('click', (e) => {
    e.stopPropagation(); menu.hidden = !menu.hidden;
  });

// ===== Multi-profile localStorage =====
const PROFILES_KEY = 'fct_profiles';
function getProfiles() {
  try { return JSON.parse(localStorage.getItem(PROFILES_KEY) || '[]'); } catch { return []; }
}
function saveProfiles(arr) { localStorage.setItem(PROFILES_KEY, JSON.stringify(arr)); }
function removeProfile(token) { saveProfiles(getProfiles().filter(p => p.token !== token)); }

let currentLabel = null;       // ชื่อ active profile
let currentLogoutPath = null;  // /api/admin/logout หรือ /api/member/logout
let currentIsSuper = false;    // true ถ้า super admin (admin_users), false ถ้า admin-member
let currentAvatar = null;      // base64 data URL ของ avatar (member)

async function detectActiveSession() {
  // ลอง super admin ก่อน
  try {
    const a = await fetch('/api/admin/state', { credentials: 'same-origin' }).then(r => r.json());
    if (a.logged_in) {
      return { role: 'admin', label: a.username, logoutPath: '/api/admin/logout', isSuper: true };
    }
  } catch {}
  // member — เช็ค is_admin → upgrade เป็น admin
  try {
    const m = await fetch('/api/member/me', { credentials: 'same-origin' }).then(r => r.json());
    if (m.logged_in) {
      const md = m.member;
      const display = md.display_name || md.email || md.phone;
      const role = md.is_admin ? 'admin' : 'member';
      return { role, label: display, logoutPath: '/api/member/logout', isSuper: false, memberId: md.id, avatar: md.avatar_data };
    }
  } catch {}
  return null;
}

function renderProfileSwitcherFooter() {
  // current profile pill
  $('who').textContent = currentLabel || '—';
  $('who-role').textContent = currentIsSuper
    ? 'super admin'
    : currentRole === 'admin' ? 'admin (member)' : 'สมาชิก';
  const avatarEl = $('profile-avatar');
  if (currentAvatar) {
    // Replace text with image
    avatarEl.style.background = '#fff';
    avatarEl.style.padding = '0';
    avatarEl.style.overflow = 'hidden';
    avatarEl.innerHTML = `<img src="${currentAvatar}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit" />`;
  } else {
    avatarEl.style.background = '';
    avatarEl.style.padding = '';
    avatarEl.style.overflow = '';
    avatarEl.textContent = (currentLabel || '?').trim().charAt(0).toUpperCase();
  }

  // dropdown content
  const list = $('profile-list');
  const profiles = getProfiles();

  $('profile-count').textContent = `บัญชีในเครื่องนี้ (${profiles.length})`;

  if (profiles.length === 0) {
    list.innerHTML = `<div style="padding:8px 10px;color:var(--text-muted);font-size:12px">
      ไม่พบ profile อื่น — กด "เพิ่มบัญชีอื่น" ด้านล่าง
    </div>`;
    return;
  }

  list.innerHTML = profiles.map(p => {
    const isCurrent = p.label === currentLabel && p.role === currentRole;
    const initial = (p.label || '?').trim().charAt(0).toUpperCase();
    return `
      <button class="profile-item ${isCurrent ? 'active' : ''}" data-token="${escapeHtml(p.token)}" type="button">
        <span class="profile-avatar" style="width:28px;height:28px;font-size:12px">${escapeHtml(initial)}</span>
        <span class="profile-item-info">
          <span class="profile-item-name">${escapeHtml(p.label || '—')}</span>
          <span class="profile-item-role">${p.role === 'admin' ? 'admin' : 'สมาชิก'}</span>
        </span>
        ${isCurrent ? '<span class="profile-item-check">✓</span>' : ''}
      </button>
    `;
  }).join('');

  list.querySelectorAll('.profile-item').forEach(btn => {
    btn.addEventListener('click', async () => {
      const token = btn.dataset.token;
      // ถ้า active อยู่แล้ว → ปิด menu
      if (btn.classList.contains('active')) {
        $('profile-menu').hidden = true;
        return;
      }
      try {
        const res = await fetch('/api/auth/switch', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        if (!res.ok) {
          // token หมดอายุแล้ว — ลบจาก localStorage
          removeProfile(token);
          alert('Session นั้นหมดอายุแล้ว — กรุณา login ใหม่');
          return;
        }
        // reload เพื่อ pick up cookie ใหม่
        location.reload();
      } catch (e) {
        alert('สลับบัญชีไม่สำเร็จ: ' + e.message);
      }
    });
  });
}

function attachSidebarHandlers() {
  // toggle dropdown
  $('profile-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    $('profile-menu').hidden = !$('profile-menu').hidden;
  });
  document.addEventListener('click', (e) => {
    const m = $('profile-menu');
    if (!m.hidden && !m.contains(e.target) && !$('profile-toggle').contains(e.target)) {
      m.hidden = true;
    }
  });

  // add profile → ไป /login (current cookie จะถูกแทนใน logon ใหม่ แต่ profile เดิมยังอยู่ใน localStorage)
  $('add-profile-btn').addEventListener('click', () => {
    location.href = '/login';
  });

  // logout this account (ลบ session ฝั่ง server + ลบ profile จาก localStorage)
  $('logout-btn').addEventListener('click', async () => {
    try { await fetch(currentLogoutPath, { method: 'POST', credentials: 'same-origin' }); } catch {}
    // ลบ profile ปัจจุบันจาก localStorage (match ด้วย label+role เพราะไม่มี token ที่ active)
    saveProfiles(getProfiles().filter(p => !(p.label === currentLabel && p.role === currentRole)));
    // ถ้ายังมี profile อื่น → switch ไปอันแรก
    const remaining = getProfiles();
    if (remaining.length > 0) {
      try {
        await fetch('/api/auth/switch', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: remaining[0].token }),
        });
        location.reload();
        return;
      } catch {}
    }
    location.replace('/');
  });

  // logout จากทุกบัญชี — เคลียร์ session ทั้งฝั่ง admin + member + localStorage
  $('logout-all-btn').addEventListener('click', async () => {
    const profiles = getProfiles();
    const n = profiles.length;
    const msg = n > 0
      ? `ออกจากทุกบัญชี (${n} บัญชี) ในเครื่องนี้?\n\nระบบจะลบ session ฝั่ง server และล้างข้อมูล profile ทั้งหมดในเบราว์เซอร์นี้`
      : 'ออกจากระบบและล้าง session ทั้งหมดในเครื่องนี้?';
    if (!confirm(msg)) return;

    // ลบ session ฝั่ง server — ทั้ง admin และ member endpoints (ทำพร้อมกันเพราะ cookies แยกกัน)
    await Promise.allSettled([
      fetch('/api/admin/logout',  { method: 'POST', credentials: 'same-origin' }),
      fetch('/api/member/logout', { method: 'POST', credentials: 'same-origin' }),
    ]);

    // ล้าง localStorage ที่เกี่ยวกับ profile/auth ทั้งหมด
    try { localStorage.removeItem(PROFILES_KEY); } catch {}
    try { sessionStorage.clear(); } catch {}

    location.replace('/login');
  });
}

(async () => {
  const session = await detectActiveSession();
  if (!session) {
    location.replace('/login');
    return;
  }
  currentRole = session.role;
  currentLabel = session.label;
  currentLogoutPath = session.logoutPath;
  currentIsSuper = !!session.isSuper;
  currentAvatar = session.avatar || null;

  // ซ่อน admin-only ทั้ง section + items ถ้าเป็น member
  if (currentRole === 'member') {
    document.querySelectorAll('.nav-section[data-admin-section]').forEach(s => {
      s.style.display = 'none';
    });
    // เผื่อ items แต่ละตัวที่ admin-only แต่ดันอยู่ใน section ทั่วไป
    document.querySelectorAll('.nav a[data-route]').forEach(a => {
      if (HIDE_FROM_MEMBER_NAV.has(a.dataset.route)) a.style.display = 'none';
    });
  }

  attachSidebarHandlers();
  renderProfileSwitcherFooter();

  // Default route — admin → dashboard, member → platforms
  if (!location.hash) {
    // หน้าแรกของทุกบทบาทคือ dashboard
    location.hash = '#/dashboard';
  }
  await navigate();

  // Admin: poll Access Request badge ทุก 60 วินาที
  if (currentRole === 'admin') {
    refreshAccessRequestBadge();
    setInterval(refreshAccessRequestBadge, 60_000);
  }
})();
</script>
