<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FEFL Beat · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f6f9ff;
      --bg-card: #ffffff;
      --bg-input: #ffffff;
      --bg-hover: #f1f5fd;
      --border: #e3eaf5;
      --border-strong: #c8d4ec;
      --text: #0f172a;
      --text-muted: #5b6b85;
      --text-soft: #8895ab;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #dbeafe;
      --accent: #7c3aed;
      --green: #10b981;
      --warning: #f59e0b;
      --critical: #dc2626;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05);
      --shadow-md: 0 4px 16px rgba(37, 99, 235, .08);
      --shadow-lg: 0 12px 40px rgba(37, 99, 235, .12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg-soft);
      color: var(--text);
      display: flex; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Sidebar */
    aside {
      width: 240px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 22px 0;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-sm);
    }
    .brand {
      padding: 0 18px 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .brand-row {
      display: flex; align-items: center; gap: 10px; position: relative;
    }
    .brand a.logo {
      display: inline-block;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .brand a.logo:hover { text-decoration: none; }
    .brand a.logo strong { color: var(--primary); font-weight: 700; }
    .brand .sub { font-size: 11.5px; color: var(--text-muted); margin-top: 6px; padding-left: 4px; }

    /* Hamburger + sister-sites menu */
    .hamburger-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 34px; height: 34px;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted);
      transition: all .12s; padding: 0;
    }
    .hamburger-btn:hover {
      background: var(--bg-soft); color: var(--primary);
      border-color: var(--border-strong);
    }
    .brand-menu {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, .15);
      min-width: 280px;
      padding: 6px;
      z-index: 200;
    }
    .brand-menu-head {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); font-weight: 600;
      padding: 10px 12px 6px;
    }
    .brand-menu-item {
      display: block; padding: 10px 12px;
      border-radius: 8px; text-decoration: none;
      color: var(--text); transition: background .1s;
    }
    .brand-menu-item:hover { background: var(--bg-soft); text-decoration: none; }
    .brand-menu-item .name { display: block; font-size: 14px; font-weight: 600; }
    .brand-menu-item .name strong { color: var(--primary); font-weight: 700; }
    .brand-menu-item .desc { display: block; font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
    .brand-menu-item.current { background: var(--bg-soft); }
    .brand-menu-item.current .name::after {
      content: '· ปัจจุบัน';
      color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 6px;
    }

    .nav { flex: 1; padding: 0 12px; overflow-y: auto; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 13px;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 3px;
      transition: all .12s;
    }
    .nav a:hover { background: var(--bg-hover); color: var(--text); text-decoration: none; }
    .nav a.active {
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-weight: 600;
    }

    /* Sidebar sections */
    .nav-section + .nav-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .nav-section-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-soft);
      font-weight: 600;
      padding: 2px 13px 8px;
    }
    .nav-section-label .icon { opacity: .7; font-size: 12px; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      position: relative;
    }

    /* Profile switcher */
    .profile-switcher { position: relative; }
    .profile-current {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 8px 10px;
      background: transparent; border: 1px solid transparent;
      border-radius: 10px;
      cursor: pointer; font-family: inherit;
      transition: all .12s;
      text-align: left;
    }
    .profile-current:hover {
      background: var(--bg-hover);
      border-color: var(--border);
    }
    .profile-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff; font-weight: 700; font-size: 13px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-role {
      font-size: 11px; color: var(--text-muted);
      margin-top: 1px;
    }
    .profile-caret {
      color: var(--text-muted); flex-shrink: 0;
    }

    .profile-menu {
      position: absolute;
      bottom: calc(100% + 4px); left: 12px; right: 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 -8px 24px rgba(15, 23, 42, .15);
      padding: 6px;
      z-index: 100;
      max-height: 400px; overflow-y: auto;
    }
    .profile-menu-head {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted); font-weight: 600;
      padding: 8px 10px 4px;
    }
    .profile-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%;
      padding: 8px 10px;
      background: transparent; border: none;
      border-radius: 8px; cursor: pointer;
      font-family: inherit; text-align: left;
      transition: background .1s;
      color: var(--text);
    }
    .profile-item:hover { background: var(--bg-hover); }
    .profile-item.active { background: var(--bg-soft); }
    .profile-item-info { flex: 1; min-width: 0; }
    .profile-item-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-item-role { font-size: 11px; color: var(--text-muted); }
    .profile-item-check { color: var(--green); font-weight: 700; }

    .profile-menu hr {
      border: none; border-top: 1px solid var(--border);
      margin: 4px 6px;
    }
    .profile-action {
      display: flex; align-items: center; gap: 10px;
      width: 100%;
      padding: 9px 10px;
      background: transparent; border: none;
      border-radius: 8px; cursor: pointer;
      font-family: inherit; text-align: left;
      font-size: 13px; color: var(--text);
      transition: background .1s;
    }
    .profile-action:hover { background: var(--bg-hover); }
    .profile-action.danger { color: var(--critical); }
    .profile-action.danger:hover { background: rgba(220,38,38,.06); }
    .profile-action-icon {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; opacity: .8;
    }

    /* Main */
    main { flex: 1; padding: 32px 36px; overflow-y: auto; }
    main.no-pad { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
    main.no-pad iframe { flex: 1; width: 100%; border: 0; background: var(--bg); }

    .page-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
    }
    h2.page-title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .crumb { color: var(--text-muted); font-size: 13px; margin-bottom: 8px; }
    .crumb a { color: var(--text-muted); }

    button.btn, .btn {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .12s;
    }
    button.btn:hover {
      background: var(--bg-hover); border-color: var(--border-strong);
    }
    button.btn.primary {
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-md);
    }
    button.btn.primary:hover {
      background: linear-gradient(135deg, #1d4ed8 0%, #4338ca 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(37, 99, 235, .3);
    }
    button.btn.danger {
      background: transparent; color: var(--critical);
      border-color: rgba(220, 38, 38, .25);
    }
    button.btn.danger:hover { background: rgba(220, 38, 38, .06); border-color: var(--critical); }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
      transition: all .15s;
      box-shadow: var(--shadow-sm);
    }
    .card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
    .card-clickable { cursor: pointer; }
    .card-clickable:hover { border-color: var(--primary); }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-sub { color: var(--text-muted); font-size: 12.5px; margin-top: 3px; }
    .card-sub code {
      background: var(--bg-soft);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    .empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, .35);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px;
      width: 440px;
      max-width: 92vw;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .25);
    }
    .modal h3 { margin: 0 0 14px; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-top: 18px;
    }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%;
      background: var(--bg-input); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-size: 13px; font-family: inherit;
      transition: border .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    .hint { color: var(--text-muted); font-size: 11.5px; margin-top: 4px; line-height: 1.5; }
    .hint code {
      background: var(--bg-soft); padding: 1px 5px; border-radius: 4px; font-size: 11px;
    }

    /* Credentials list */
    .cred-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 14px;
      align-items: center;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
    }
    .cred-row:hover { border-color: var(--border-strong); }
    .cred-row .col-label { font-weight: 600; }
    .cred-row .col-pw { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .pw-mask { color: var(--text-muted); }
    .pw-show { color: var(--text); user-select: all; }
    .copy-btn {
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 13px; padding: 3px 5px;
      border-radius: 4px;
    }
    .copy-btn:hover { color: var(--primary); background: var(--bg-hover); }

    .warning-box {
      background: linear-gradient(135deg, rgba(245, 158, 11, .06), rgba(245, 158, 11, .12));
      border: 1px solid rgba(245, 158, 11, .35);
      color: #92400e;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .warning-box code {
      background: rgba(146, 64, 14, .12); padding: 1px 5px; border-radius: 4px;
    }

    /* Platforms grid */
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .platform-card {
      display: block;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      transition: all .15s;
    }
    .platform-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      text-decoration: none;
    }
    .platform-avatar {
      width: 44px; height: 44px; border-radius: 11px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      color: #fff; font-weight: 700; font-size: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(37, 99, 235, .25);
    }
    .platform-name {
      font-size: 15.5px; font-weight: 600; letter-spacing: -0.01em;
    }
    .platform-url {
      font-size: 12px; color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      margin-top: 4px; word-break: break-all;
    }
    .platform-meta {
      font-size: 11.5px; color: var(--text-soft);
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .platform-meta .open {
      color: var(--primary); font-weight: 500;
    }

    /* Code/key display block */
    .key-block {
      display: flex; gap: 8px; align-items: center;
      font-family: ui-monospace, Menlo, monospace; font-size: 13px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      padding: 13px 14px;
      border-radius: 10px;
    }
    .key-block .val {
      flex: 1; word-break: break-all; user-select: all; color: var(--text);
    }
  </style>
</head>
<body>
  <aside>
    <div class="brand">
      <div class="brand-row">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="สลับเว็บในเครือ">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>

          </svg>
        </button>
        <div class="brand-menu" id="brandMenu" hidden>
          <div class="brand-menu-head">เว็บในเครือ</div>
          <a href="https://2026beat-production.up.railway.app" class="brand-menu-item" target="_top" data-host="2026beat-production.up.railway.app">

            <span class="desc">AI Solution Hub for Marketing</span>
          </a>
          <a href="https://web-production-8eb90.up.railway.app" class="brand-menu-item" target="_top" data-host="web-production-8eb90.up.railway.app">

    <nav class="nav">
      <!-- ส่วนทั่วไป (เมนูใช้งานประจำ) -->
      <div class="nav-section">
        <a href="#/dashboard" data-route="dashboard">📊 Dashboard</a>
        <a href="#/platforms" data-route="platforms">🚀 Platforms</a>
        <a href="#/extension" data-route="extension">🧩 Extension</a>

      </div>

      <!-- ภาพรวมระบบ (admin-only — ซ่อนทั้ง section สำหรับ member) -->

        <a href="#/members" data-route="members">👥 Members</a>

    <div class="sidebar-footer">

          <div id="profile-list"></div>
          <hr/>
          <button class="profile-action" id="add-profile-btn" type="button">
            <span class="profile-action-icon">＋</span>

          </button>
          <button class="profile-action danger" id="logout-btn" type="button">
            <span class="profile-action-icon">↪</span>
            <span>ออกจากบัญชีนี้</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <main id="main"></main>

<script>
const $ = id => document.getElementById(id);
const API = '';

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let currentRole = null;  // 'admin' | 'member' | null

async function fetchJson(path, opts = {}) {
  const res = await fetch(API + path, {
    credentials: 'same-origin',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    ...opts,
  });
  if (res.status === 401) {
    location.replace('/login');
    throw new Error('unauthorized');
  }
  if (res.status === 403) {
    throw new Error('คุณไม่มีสิทธิ์ทำรายการนี้');
  }
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    throw new Error(j.detail || ('HTTP ' + res.status));
  }
  return res.json();
}

// admin-only routes — member ห้ามเข้า (bounce ไป default)
const ADMIN_ONLY_ROUTES = new Set(['security', 'members', 'sites', 'logs']);
// menu items ที่ซ่อนใน sidebar สำหรับ member
const HIDE_FROM_MEMBER_NAV = new Set(['dashboard', 'security', 'members', 'sites', 'logs']);

// ---------- routing ----------
const routes = {
  'dashboard': renderDashboardEmbed,
  'platforms': renderPlatformsPage,
  'sites':     renderSitesList,
  'members':   renderMembersPage,
  'logs':      renderLogsPage,
  'extension': renderExtensionPage,
  'security':  renderSecurityPage,
  'account':   renderAccountPage,
};

function setActive(route) {
  document.querySelectorAll('.nav a[data-route]').forEach(a => {
    a.classList.toggle('active', a.dataset.route === route);
  });
}
function resetMainPadding() { $('main').classList.remove('no-pad'); }

async function navigate() {
  const hash = location.hash.replace(/^#\/?/, '') || 'dashboard';
  const parts = hash.split('/');
  const route = parts[0];

  // Member ห้ามเข้า admin-only routes
  if (currentRole === 'member' && (ADMIN_ONLY_ROUTES.has(route) || HIDE_FROM_MEMBER_NAV.has(route))) {
    location.hash = '#/platforms';
    return;
  }

  // ออกจากหน้า extension → หยุด polling status
  if (route !== 'extension' && typeof stopExtStatusPolling === 'function') {
    stopExtStatusPolling();
  }

  resetMainPadding();
  if (route === 'sites' && parts[1]) {
    setActive('sites');
    await renderSiteDetail(parseInt(parts[1], 10));
  } else if (routes[route]) {
    setActive(route);
    await routes[route]();
  } else {
    location.hash = '#/dashboard';
  }
}

/**
 * แปลง URL pattern (เช่น *.freepik.com/*) → URL ที่กดเข้าได้จริง
 *  - ตัด protocol ออกก่อน, แทน '*.' ด้วย 'www.', ตัด '/* ' ท้าย
 *  - แล้วใส่ https:// กลับเข้าไป
 */
function patternToUrl(pattern) {
  if (!pattern) return '';
  let url = String(pattern).replace(/^https?:\/\//i, '');
  url = url.replace(/^\*\./, 'www.');     // *.freepik.com → www.freepik.com
  url = url.replace(/\/\*$|\*$/, '/');    // /* หรือ * ท้าย → /
  url = url.replace(/\*/g, '');           // ลบ wildcard ที่เหลือ (ถ้ามี)
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  return url;
}

function shortUserAgent(ua) {
  if (!ua) return '—';
  // Chrome/147.0 (Mac) — สั้นๆ
  const browser = (ua.match(/(Chrome|Firefox|Safari|Edge)\/[\d.]+/) || ['—'])[0];
  let os = '';
  if (/Mac OS|Macintosh/.test(ua)) os = 'Mac';
  else if (/Windows/.test(ua)) os = 'Win';
  else if (/Linux/.test(ua)) os = 'Linux';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/iPhone|iPad/.test(ua)) os = 'iOS';
  return browser + (os ? ' · ' + os : '');
}

async function handleMemberAction(btn) {
  const id = btn.dataset.id;
  const act = btn.dataset.act;

  if (act === 'reset') {
    const name = btn.dataset.name;
    showResetPasswordModal(id, name);
    return;
  }

  if (act === 'toggle') {
    const wasEnabled = btn.dataset.enabled === '1';
    const action = wasEnabled ? 'ระงับ' : 'เปิดใช้งาน';
    if (!confirm(`ยืนยัน${action}บัญชีนี้?`)) return;
    try {
      await fetchJson(`/api/admin/members/${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ enabled: !wasEnabled }),
      });
      await loadMembersList();
    } catch (e) {
      alert('ทำรายการไม่สำเร็จ: ' + e.message);
    }
    return;
  }

  if (act === 'delete') {
    const name = btn.dataset.name;
    if (!confirm(`ลบบัญชี "${name}" ถาวร?\n\nข้อมูลทั้งหมดจะหายไปและกู้คืนไม่ได้`)) return;
    try {
      await fetchJson(`/api/admin/members/${id}`, { method: 'DELETE' });
      await loadMembersList();
    } catch (e) {
      alert('ลบไม่สำเร็จ: ' + e.message);
    }
    return;
  }
}

function showResetPasswordModal(memberId, memberName) {
  showModal({
    title: `Reset Password — ${memberName}`,
    body: `
      <div class="hint" style="margin-bottom:14px;color:var(--text-muted)">
        ตั้งรหัสผ่านใหม่ (อย่างน้อย 4 ตัว) — member จะใช้รหัสนี้ login ครั้งหน้า
      </div>

        <input id="rst-pw" type="password" autocomplete="new-password" />

      <div class="field">
        <label>ยืนยันรหัสผ่าน</label>
        <input id="rst-confirm" type="password" autocomplete="new-password" />
      </div>
    `,
    onSubmit: async () => {
      const password = document.getElementById('rst-pw').value;
      const confirm = document.getElementById('rst-confirm').value;
      if (password.length < 4) throw new Error('รหัสผ่านอย่างน้อย 4 ตัว');

        method: 'PATCH',

    },
  });
}

let _extStatusTimer = null;
function stopExtStatusPolling() {
  if (_extStatusTimer) { clearInterval(_extStatusTimer); _extStatusTimer = null; }

function fmtRelativeTh(iso) {
  if (!iso) return '—';
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec < 0) return 'อนาคต';
  if (sec < 5) return 'เมื่อสักครู่';
  if (sec < 60) return sec + ' วินาทีที่แล้ว';
  if (sec < 3600) return Math.floor(sec/60) + ' นาทีที่แล้ว';
  if (sec < 86400) return Math.floor(sec/3600) + ' ชั่วโมงที่แล้ว';
  return Math.floor(sec/86400) + ' วันที่แล้ว';
}

  if (!dot) return;  // หน้าเปลี่ยนแล้ว

  if (s.connected) {
    dot.style.background = 'var(--green)';
    dot.style.boxShadow = '0 0 0 6px rgba(16,185,129,.15)';
    text.textContent = '✓ Extension เชื่อมต่อแล้ว';
    text.style.color = 'var(--green)';
    sub.textContent = `เห็นล่าสุด ${fmtRelativeTh(s.last_seen)}`;
  } else if (s.last_seen) {
    dot.style.background = 'var(--warning)';
    dot.style.boxShadow = '0 0 0 6px rgba(245,158,11,.15)';
    text.textContent = '⚠️ เคยเชื่อมต่อแต่หายไปสักพัก';
    text.style.color = '#b45309';
    sub.textContent = `เห็นล่าสุด ${fmtRelativeTh(s.last_seen)} — ลอง reload extension`;
  } else {
    dot.style.background = 'var(--critical)';
    dot.style.boxShadow = '0 0 0 6px rgba(220,38,38,.12)';
    text.textContent = '❌ ยังไม่เคยเห็น Extension';
    text.style.color = 'var(--critical)';
    sub.textContent = 'ติดตั้ง extension + ตั้งค่า Backend URL + API Key ตามขั้นตอนด้านล่าง';
  }

  // metadata
  const parts = [];
  if (s.call_count > 0) parts.push(`<strong>${s.call_count.toLocaleString('th-TH')}</strong> request`);
  if (s.last_snapshot) {
    const snap = s.last_snapshot;
    if (snap.host_name) parts.push(`💻 ${escapeHtml(snap.host_name)}`);
    if (snap.host_ip)   parts.push(`📡 ${escapeHtml(snap.host_ip)}`);
    if (snap.user_agent) {
      // ตัด user-agent ให้สั้นลง — เอาเฉพาะส่วน Chrome/xxx
      const ua = snap.user_agent;
      const m = ua.match(/Chrome\/[\d.]+/);
      if (m) parts.push(`🌐 ${m[0]}`);
    }
  }
  meta.innerHTML = parts.length ? parts.join(' &nbsp;·&nbsp; ') : '';
}

function startExtStatusPolling() {
  stopExtStatusPolling();
  loadExtensionStatus();
  _extStatusTimer = setInterval(loadExtensionStatus, 5000);
}

/**
 * Active probe — ส่ง postMessage ให้ content.js ของ extension ที่รันบนหน้านี้
 * extension จะส่งต่อให้ background → fetch backend ทันที → ตอบกลับผ่าน postMessage
 * Returns: {ok, backend, status, error, reason: 'timeout'|'extension'|'backend'}
 */
function activeProbeExtension(timeoutMs = 4000) {
  return new Promise((resolve) => {
    const requestId = 'fct_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const handler = (event) => {
      if (event.source !== window) return;
      const d = event.data;
      if (!d || d.type !== 'FCT_PING_RESULT' || d.requestId !== requestId) return;
      cleanup();
      resolve(d);
    };
    const cleanup = () => {
      window.removeEventListener('message', handler);
      clearTimeout(timer);
    };
    const timer = setTimeout(() => {
      cleanup();
      resolve({ ok: false, reason: 'timeout' });
    }, timeoutMs);
    window.addEventListener('message', handler);
    window.postMessage({ type: 'FCT_FORCE_PING', requestId }, '*');
  });
}

async function manualRefreshStatus() {
  const dot = $('ext-status-dot');
  const text = $('ext-status-text');
  const sub = $('ext-status-sub');
  const meta = $('ext-status-meta');
  if (!dot) return;

  // Probing state
  stopExtStatusPolling();
  dot.style.background = '#94a3b8';
  dot.style.boxShadow = '0 0 0 6px rgba(148,163,184,.15)';
  text.textContent = '⏳ กำลัง probe extension…';
  text.style.color = 'var(--text-muted)';
  sub.textContent = 'ส่งคำสั่งให้ extension ping backend ตอนนี้';
  meta.innerHTML = '';

  const result = await activeProbeExtension(4000);

  if (result.ok) {
    // ปิงสำเร็จ — refresh status จาก backend (heartbeat ใหม่ updated)
    await loadExtensionStatus();
    startExtStatusPolling();
    return;
  }

  if (result.reason === 'timeout') {
    dot.style.background = 'var(--critical)';
    dot.style.boxShadow = '0 0 0 6px rgba(220,38,38,.12)';
    text.textContent = '❌ Extension ไม่ตอบ';
    text.style.color = 'var(--critical)';
    sub.innerHTML = 'ไม่ได้ install หรือ extension ปิดอยู่ — เปิด <code>chrome://extensions</code> เช็คว่า "FEFL Beat" enabled + reload';
    meta.innerHTML = '';
  } else {
    // Extension ตอบกลับ แต่ ping backend ไม่ผ่าน
    dot.style.background = 'var(--critical)';
    dot.style.boxShadow = '0 0 0 6px rgba(220,38,38,.12)';
    text.textContent = '❌ Extension ติดต่อ backend ไม่ได้';
    text.style.color = 'var(--critical)';

    let reason = '';
    if (result.status === 401) {
      reason = 'API Key ใน extension ไม่ตรง — copy ใหม่จาก step 2.2 ด้านล่าง';
    } else if (result.status === 0 || (result.error || '').toLowerCase().includes('failed to fetch')) {
      reason = 'Backend URL ใน extension ผิด — ตั้งเป็น URL จาก step 2.1 ด้านล่าง';
    } else if (result.status) {
      reason = `Backend ตอบกลับ HTTP ${result.status}`;
    } else if (result.error) {
      reason = `Error: ${result.error}`;
    } else {
      reason = 'ไม่ทราบสาเหตุ';
    }
    sub.textContent = reason;
    meta.innerHTML = result.backend
      ? `Backend URL ที่ extension ตั้งไว้: <code style="font-size:11px;background:var(--bg-soft);padding:1px 5px;border-radius:4px">${escapeHtml(result.backend)}</code>`
      : '';
  }
}

      </div>
    </div>
  `;

  // Auto-detect device label จาก userAgentData → fill input
  (async () => {
    const inp = $('device-label-input');
    if (!inp) return;
    let label = '';
    try {
      if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
        const data = await navigator.userAgentData.getHighEntropyValues(['platform']);
        const brand = (navigator.userAgentData.brands || [])
          .find(b => /Chrome|Edge/.test(b.brand));
        const browserLabel = brand ? brand.brand.replace('Google ', '') + ' ' + brand.version : 'Chrome';
        label = (data.platform || 'Unknown') + ' · ' + browserLabel;
      }
    } catch {}
    if (!label) {
      // Fallback: parse user-agent
      const ua = navigator.userAgent;
      let os = 'Unknown';
      if (/Mac OS X|Macintosh/.test(ua)) os = 'macOS';
      else if (/Windows/.test(ua)) os = 'Windows';
      else if (/Linux/.test(ua)) os = 'Linux';
      else if (/Android/.test(ua)) os = 'Android';
      else if (/iPhone|iPad/.test(ua)) os = 'iOS';
      const m = ua.match(/Chrome\/([\d.]+)/);
      const chrome = m ? 'Chrome ' + m[1].split('.')[0] : 'Chrome';
      label = os + ' · ' + chrome;
    }
    inp.value = label;
  })();

  // pair button → ส่ง config ผ่าน postMessage ไปให้ extension
  const pairBtn = $('pair-btn');
  if (pairBtn) {
    pairBtn.addEventListener('click', async () => {
      const status = $('pair-status');
      pairBtn.disabled = true;
      status.style.display = '';
      status.style.color = 'var(--text-muted)';
      status.textContent = '⏳ กำลังเชื่อม...';

      // เก็บ config — admin มี API key, member ไม่มี
      let myApiKey = apiKey;
      let pairedUser = null;

      // หา label ของ user ที่ login ปัจจุบัน
      const deviceLabel = ($('device-label-input')?.value || '').trim() || null;
      try {
        if (currentRole === 'admin') {
          const s = await fetch('/api/admin/state', { credentials: 'same-origin' }).then(r => r.json());
          pairedUser = {
            role: 'admin', label: s.username, member_id: null,
            deviceLabel, paired_at: new Date().toISOString(),
          };
        } else {
          const m = await fetch('/api/member/me', { credentials: 'same-origin' }).then(r => r.json());
          if (m.logged_in && m.member) {
            const md = m.member;
            pairedUser = {
              role: 'member',
              label: md.display_name || md.email || md.phone,
              member_id: md.id,
              deviceLabel,
              paired_at: new Date().toISOString(),
            };
          }
        }
      } catch {}

      const config = {
        backendUrl: backendUrl,
        apiKey: myApiKey || null,    // member อาจไม่มี
        pairedUser,
      };

      // ส่ง postMessage รอ reply
      const requestId = 'fct_pair_' + Date.now();
      const handler = (ev) => {
        if (ev.source !== window) return;
        const d = ev.data;
        if (!d || d.type !== 'FCT_PAIR_RESULT' || d.requestId !== requestId) return;
        cleanup();
        if (d.ok) {
          status.style.color = 'var(--green)';
          status.innerHTML = `✓ เชื่อมสำเร็จ — extension รู้แล้วว่าคุณคือ <strong>${escapeHtml(pairedUser?.label || 'unknown')}</strong>` +
            (deviceLabel ? ` จาก <strong>${escapeHtml(deviceLabel)}</strong>` : '') +
            (myApiKey ? '' : '<br><small style="color:var(--warning)">⚠️ Member ไม่มี API Key — extension ยังต้องอาศัย admin ตั้งให้</small>');
          // refresh status widget
          setTimeout(() => loadExtensionStatus(), 500);
        } else {
          status.style.color = 'var(--critical)';
          status.textContent = '❌ เชื่อมไม่สำเร็จ: ' + (d.error || 'extension ไม่ตอบ');
        }
        pairBtn.disabled = false;
      };
      const timer = setTimeout(() => {
        cleanup();
        status.style.color = 'var(--critical)';
        status.innerHTML = '❌ Extension ไม่ตอบใน 4 วินาที — install + reload extension แล้วลองใหม่';
        pairBtn.disabled = false;
      }, 4000);
      const cleanup = () => {
        window.removeEventListener('message', handler);
        clearTimeout(timer);
      };

      window.addEventListener('message', handler);
      window.postMessage({ type: 'FCT_PAIR', requestId, config }, '*');
    });
  }

  // wire copy buttons
  document.querySelectorAll('button[data-copy]').forEach(b => {
    b.addEventListener('click', () => {
      navigator.clipboard.writeText(b.dataset.copy);
      const orig = b.textContent;
      b.textContent = '✓ คัดลอกแล้ว';
      setTimeout(() => { b.textContent = orig; }, 1200);
    });
  });
  if (apiKey) {
    const btn = $('ext-copy-apikey');
    if (btn) {
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(apiKey);
        const orig = btn.textContent;
        btn.textContent = '✓ คัดลอกแล้ว';
        setTimeout(() => { btn.textContent = orig; }, 1200);
      });
    }
  }

  // Start polling status (admin only)
  if (currentRole === 'admin') {
    startExtStatusPolling();
    const refreshBtn = $('ext-refresh');
    if (refreshBtn) refreshBtn.addEventListener('click', manualRefreshStatus);
  }
}

// ---------- modal helper ----------
function showModal({ title, body, onSubmit }) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h3>${escapeHtml(title)}</h3>
      <div id="modal-body">${body}</div>
      <div class="modal-actions">
        <button class="btn" id="m-cancel">ยกเลิก</button>
        <button class="btn primary" id="m-ok">บันทึก</button>
      </div>
      <div class="hint" id="m-err" style="color:var(--critical);margin-top:6px;display:none"></div>
    </div>
  `;
  document.body.appendChild(bg);

  const close = () => bg.remove();
  bg.querySelector('#m-cancel').addEventListener('click', close);
  bg.addEventListener('click', e => { if (e.target === bg) close(); });
  bg.querySelector('#m-ok').addEventListener('click', async () => {
    const errEl = bg.querySelector('#m-err');
    errEl.style.display = 'none';
    try {
      await onSubmit();
      close();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = '';
    }
  });
}

// ---------- bootstrap ----------
// Hamburger / sister-sites menu
(() => {
  const btn = $('hamburgerBtn'); const menu = $('brandMenu');
  if (!btn || !menu) return;
  btn.addEventListener('click', (e) => {
    e.stopPropagation(); menu.hidden = !menu.hidden;
  });
  document.addEventListener('click', (e) => {
    if (!menu.hidden && !menu.contains(e.target) && !btn.contains(e.target)) menu.hidden = true;
  });
  document.querySelectorAll('.brand-menu-item[data-host]').forEach(a => {
    if (a.dataset.host === location.hostname) a.classList.add('current');
  });
})();

// ===== Multi-profile localStorage =====
const PROFILES_KEY = 'fct_profiles';
function getProfiles() {
  try { return JSON.parse(localStorage.getItem(PROFILES_KEY) || '[]'); } catch { return []; }
}
function saveProfiles(arr) { localStorage.setItem(PROFILES_KEY, JSON.stringify(arr)); }
function removeProfile(token) { saveProfiles(getProfiles().filter(p => p.token !== token)); }

let currentLabel = null;       // ชื่อ active profile
let currentLogoutPath = null;  // /api/admin/logout หรือ /api/member/logout

async function detectActiveSession() {
  // ลอง admin ก่อน
  try {
    const a = await fetch('/api/admin/state', { credentials: 'same-origin' }).then(r => r.json());
    if (a.logged_in) {
      return { role: 'admin', label: a.username, logoutPath: '/api/admin/logout' };
    }
  } catch {}
  // member
  try {
    const m = await fetch('/api/member/me', { credentials: 'same-origin' }).then(r => r.json());
    if (m.logged_in) {
      const md = m.member;
      const display = md.display_name || md.email || md.phone;
      return { role: 'member', label: display, logoutPath: '/api/member/logout' };
    }
  } catch {}
  return null;
}

function renderProfileSwitcherFooter() {
  // current profile pill
  $('who').textContent = currentLabel || '—';
  $('who-role').textContent = currentRole === 'admin' ? 'admin' : 'สมาชิก';
  $('profile-avatar').textContent = (currentLabel || '?').trim().charAt(0).toUpperCase();

  // dropdown content
  const list = $('profile-list');
  const profiles = getProfiles();

  $('profile-count').textContent = `บัญชีในเครื่องนี้ (${profiles.length})`;

  if (profiles.length === 0) {
    list.innerHTML = `<div style="padding:8px 10px;color:var(--text-muted);font-size:12px">
      ไม่พบ profile อื่น — กด "เพิ่มบัญชีอื่น" ด้านล่าง
    </div>`;
    return;
  }

  list.innerHTML = profiles.map(p => {
    const isCurrent = p.label === currentLabel && p.role === currentRole;
    const initial = (p.label || '?').trim().charAt(0).toUpperCase();
    return `
      <button class="profile-item ${isCurrent ? 'active' : ''}" data-token="${escapeHtml(p.token)}" type="button">
        <span class="profile-avatar" style="width:28px;height:28px;font-size:12px">${escapeHtml(initial)}</span>
        <span class="profile-item-info">
          <span class="profile-item-name">${escapeHtml(p.label || '—')}</span>
          <span class="profile-item-role">${p.role === 'admin' ? 'admin' : 'สมาชิก'}</span>
        </span>
        ${isCurrent ? '<span class="profile-item-check">✓</span>' : ''}
      </button>
    `;
  }).join('');

  list.querySelectorAll('.profile-item').forEach(btn => {
    btn.addEventListener('click', async () => {
      const token = btn.dataset.token;
      // ถ้า active อยู่แล้ว → ปิด menu
      if (btn.classList.contains('active')) {
        $('profile-menu').hidden = true;
        return;
      }
      try {
        const res = await fetch('/api/auth/switch', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        if (!res.ok) {
          // token หมดอายุแล้ว — ลบจาก localStorage
          removeProfile(token);
          alert('Session นั้นหมดอายุแล้ว — กรุณา login ใหม่');
          return;
        }
        // reload เพื่อ pick up cookie ใหม่
        location.reload();
      } catch (e) {
        alert('สลับบัญชีไม่สำเร็จ: ' + e.message);
      }
    });
  });
}

function attachSidebarHandlers() {
  // toggle dropdown
  $('profile-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    $('profile-menu').hidden = !$('profile-menu').hidden;
  });
  document.addEventListener('click', (e) => {
    const m = $('profile-menu');
    if (!m.hidden && !m.contains(e.target) && !$('profile-toggle').contains(e.target)) {
      m.hidden = true;
    }
  });

  // add profile → ไป /login (current cookie จะถูกแทนใน logon ใหม่ แต่ profile เดิมยังอยู่ใน localStorage)
  $('add-profile-btn').addEventListener('click', () => {
    location.href = '/login';
  });

  // logout this account (ลบ session ฝั่ง server + ลบ profile จาก localStorage)
  $('logout-btn').addEventListener('click', async () => {
    try { await fetch(currentLogoutPath, { method: 'POST', credentials: 'same-origin' }); } catch {}
    // ลบ profile ปัจจุบันจาก localStorage (match ด้วย label+role เพราะไม่มี token ที่ active)
    saveProfiles(getProfiles().filter(p => !(p.label === currentLabel && p.role === currentRole)));
    // ถ้ายังมี profile อื่น → switch ไปอันแรก
    const remaining = getProfiles();
    if (remaining.length > 0) {
      try {
        await fetch('/api/auth/switch', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: remaining[0].token }),
        });
        location.reload();
        return;
      } catch {}
    }
    location.replace('/');
  });
}

(async () => {
  const session = await detectActiveSession();
  if (!session) {
    location.replace('/login');
    return;
  }
  currentRole = session.role;
  currentLabel = session.label;
  currentLogoutPath = session.logoutPath;

  // ซ่อน admin-only ทั้ง section + items ถ้าเป็น member
  if (currentRole === 'member') {
    document.querySelectorAll('.nav-section[data-admin-section]').forEach(s => {
      s.style.display = 'none';
    });
    // เผื่อ items แต่ละตัวที่ admin-only แต่ดันอยู่ใน section ทั่วไป
    document.querySelectorAll('.nav a[data-route]').forEach(a => {
      if (HIDE_FROM_MEMBER_NAV.has(a.dataset.route)) a.style.display = 'none';
    });
  }

  attachSidebarHandlers();
  renderProfileSwitcherFooter();

  // Default route — admin → dashboard, member → platforms
  if (!location.hash) {
    location.hash = currentRole === 'admin' ? '#/dashboard' : '#/platforms';
  }
  await navigate();
})();
</script>
