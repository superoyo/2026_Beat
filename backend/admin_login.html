<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FEFL Beat · Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f6f9ff;
      --bg-card: #ffffff;
      --border: #e3eaf5;
      --border-strong: #c8d4ec;
      --text: #0f172a;
      --text-muted: #5b6b85;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --critical: #dc2626;
      --green: #10b981;
      --shadow-md: 0 10px 40px rgba(37, 99, 235, .12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(900px 400px at 80% -10%, rgba(124, 58, 237, .08), transparent 60%),
        radial-gradient(700px 350px at 10% 110%, rgba(37, 99, 235, .10), transparent 60%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 380px;
      max-width: 92vw;
      box-shadow: var(--shadow-md);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 22px;
    }
    .brand-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 50%, #06b6d4 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 16px;
      box-shadow: 0 4px 12px rgba(37, 99, 235, .3);
    }
    .brand-text { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }

    h1 { margin: 0 0 6px; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .field input {
      width: 100%;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 14px;
      font-family: inherit;
      transition: border .15s, box-shadow .15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: transform .1s, box-shadow .15s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37, 99, 235, .3); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .err {
      background: rgba(220, 38, 38, .08);
      border: 1px solid rgba(220, 38, 38, .25);
      color: var(--critical);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    .ok-msg {
      background: rgba(16, 185, 129, .08);
      border: 1px solid rgba(16, 185, 129, .25);
      color: var(--green);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .footer-link {
      text-align: center; margin-top: 18px;
      font-size: 13px; color: var(--text-muted);
    }
    .footer-link a { color: var(--primary); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="brand-logo">F</span>
      <span class="brand-text">FEFL Beat</span>
    </div>

    <h1 id="title">Admin Login</h1>
    <div class="sub" id="subtitle">เข้าสู่ระบบเพื่อจัดการ Website / Credentials</div>

    <div class="err" id="err"></div>
    <div class="ok-msg" id="ok"></div>

    <form id="form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password" />
      </div>
      <div class="field" id="confirm-field" style="display:none">
        <label for="confirm">ยืนยัน Password</label>
        <input id="confirm" type="password" autocomplete="new-password" />
      </div>
      <button type="submit" id="submit">เข้าสู่ระบบ</button>
    </form>

    <div class="footer-link">
      <a href="/">← กลับหน้าแรก</a>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
let mode = 'login';

function showErr(msg) { $('err').textContent = msg; $('err').style.display = ''; $('ok').style.display = 'none'; }
function showOk(msg)  { $('ok').textContent = msg; $('ok').style.display = ''; $('err').style.display = 'none'; }
function clearMsg()   { $('err').style.display = 'none'; $('ok').style.display = 'none'; }

async function init() {
  const r = await fetch('/api/admin/state').then(r => r.json());
  if (r.logged_in) {
    location.replace('/admin');
    return;
  }
  if (!r.has_admin) {
    mode = 'setup';
    $('title').textContent = 'ตั้งค่าครั้งแรก';
    $('subtitle').textContent = 'สร้าง username / password สำหรับ admin (ครั้งแรกเท่านั้น)';
    $('confirm-field').style.display = '';
    $('submit').textContent = 'สร้างบัญชี';
    $('password').setAttribute('autocomplete', 'new-password');
    showOk('ยังไม่มี admin ในระบบ — กรอกข้อมูลด้านล่างเพื่อสร้างบัญชีแรก');
  }
}

$('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsg();
  $('submit').disabled = true;

  const username = $('username').value.trim();
  const password = $('password').value;

  try {
    if (mode === 'setup') {
      if (password.length < 6) { showErr('Password ต้องมี 6 ตัวอักษรขึ้นไป'); return; }
      if (password !== $('confirm').value) { showErr('Password ไม่ตรงกัน'); return; }
      const res = await fetch('/api/admin/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        showErr('สร้างบัญชีไม่สำเร็จ: ' + (j.detail || res.status));
        return;
      }
    } else {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        showErr('เข้าสู่ระบบไม่สำเร็จ: ' + (j.detail || res.status));
        return;
      }
    }
    location.replace('/admin');
  } finally {
    $('submit').disabled = false;
  }
});

init();
</script>
</body>
</html>
